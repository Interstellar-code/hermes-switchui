<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hermes · Chat — Sessions Sidebar</title>
<link rel="stylesheet" href="matrix-system.css"/>
<style>
  html, body { height: 100%; }
  body { background: var(--m-bg); }

  /* ── 3-column shell ─────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-columns: 232px 320px 1fr;
    transition: grid-template-columns var(--m-dur-base) var(--m-ease-out);
  }
  .shell.sess-collapsed {
    grid-template-columns: 232px 44px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── primary nav ────────────────────────────────────────── */
  .nav {
    background: var(--m-sidebar);
    border-right: 1px solid var(--m-border);
    padding: 14px 10px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .nav .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 14px;
    border-bottom: 1px solid var(--m-border-subtle);
    margin-bottom: 10px;
  }
  .nav .brand .glyph {
    width: 28px; height: 28px;
    border: 1.5px solid var(--m-green-500);
    color: var(--m-green-500);
    font-family: var(--m-font-mono); font-weight: 700; font-size: 14px;
    border-radius: 4px; display: grid; place-items: center;
    box-shadow: var(--m-glow-sm), inset 0 0 8px rgba(0,255,65,.12);
  }
  .nav .brand b {
    font: 700 13px/1 var(--m-font-mono);
    letter-spacing: .22em;
    color: var(--m-text-strong);
    text-shadow: var(--m-text-glow);
  }
  .nav .brand .ver {
    font: 500 9px/1 var(--m-font-mono);
    color: var(--m-text-faint);
    margin-top: 3px;
    letter-spacing: .15em;
  }
  .nav-grp {
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .22em;
    color: var(--m-text-faint);
    padding: 14px 10px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: var(--m-radius-md);
    font: 500 12.5px var(--m-font-mono);
    color: var(--m-text-muted);
    cursor: pointer;
    transition: all var(--m-dur-fast) var(--m-ease-out);
    border: 1px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: var(--m-fill-subtle); color: var(--m-text); }
  .nav-item.active {
    background: var(--m-fill);
    color: var(--m-green-500);
    border-color: var(--m-border);
    box-shadow: inset 2px 0 0 var(--m-green-500);
  }
  .ico { width: 14px; height: 14px; flex: none; }
  .nav-item .ico { width: 14px; height: 14px; flex: none; }
  .nav-item .badge-mini {
    margin-left: auto;
    font: 500 9px var(--m-font-mono);
    padding: 1px 6px;
    border-radius: 9999px;
    background: var(--m-fill);
    color: var(--m-green-500);
    border: 1px solid var(--m-border);
  }
  .nav-foot {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--m-border-subtle);
    display: flex; gap: 8px; align-items: center;
    font: 500 11px var(--m-font-mono);
    color: var(--m-text-muted);
  }

  /* ── sessions panel (secondary sidebar) ─────────────────── */
  .sess {
    background: var(--m-panel);
    border-right: 1px solid var(--m-border);
    display: grid;
    grid-template-rows: auto auto auto auto 1fr auto;
    grid-template-columns: minmax(0, 1fr);
    overflow: hidden;
    min-width: 0;
  }
  /* collapsed rail */
  .sess.is-collapsed {
    grid-template-rows: auto 1fr auto;
    grid-template-columns: minmax(0, 1fr);
  }
  .sess-rail {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 0;
    gap: 8px;
    height: 100%;
  }
  .sess-rail .vlabel {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .3em;
    color: var(--m-text-faint);
    margin-top: 14px;
  }
  /* date popover */
  .date-pop {
    position: absolute;
    top: 44px; right: 8px;
    z-index: 200;
    width: 268px;
    background: var(--m-card);
    border: 1px solid var(--m-border-strong);
    border-radius: var(--m-radius-lg);
    box-shadow: var(--m-glow-md), 0 18px 54px rgba(0,0,0,.7);
    padding: 12px;
    font-family: var(--m-font-mono);
  }
  .date-pop .lbl { font-size: 10px; color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .2em; margin-bottom: 8px; }
  .date-pop .presets { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
  .date-pop .presets button { background: transparent; color: var(--m-text-muted); border: 1px solid var(--m-border-subtle); border-radius: 4px; padding: 5px 8px; font: 500 10.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .1em; cursor: pointer; transition: all 120ms; }
  .date-pop .presets button:hover { color: var(--m-green-500); border-color: var(--m-border); }
  .date-pop .presets button.on { background: var(--m-fill); color: var(--m-green-500); border-color: var(--m-border-strong); box-shadow: var(--m-glow-sm); }
  .date-pop .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-top: 6px; }
  .date-pop .cal .dow { font-size: 9px; color: var(--m-text-faint); text-align: center; padding: 4px 0; letter-spacing: .1em; }
  .date-pop .cal .d { font-size: 10.5px; color: var(--m-text-muted); text-align: center; padding: 5px 0; cursor: pointer; border-radius: 3px; transition: all 120ms; }
  .date-pop .cal .d:hover { background: var(--m-fill-subtle); color: var(--m-text); }
  .date-pop .cal .d.in { background: rgba(0,255,65,.10); color: var(--m-green-500); border-radius: 0; }
  .date-pop .cal .d.start, .date-pop .cal .d.end { background: var(--m-green-500); color: var(--m-bg); box-shadow: var(--m-glow-sm); border-radius: 3px; }
  .date-pop .cal .d.muted { color: var(--m-text-ghost); }
  .date-pop .nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .date-pop .nav .mo { font-size: 11px; color: var(--m-text-strong); letter-spacing: .15em; text-transform: uppercase; }
  .date-pop .nav button { background: transparent; border: 1px solid var(--m-border-subtle); color: var(--m-text-muted); width: 22px; height: 22px; border-radius: 4px; cursor: pointer; }
  .date-pop .nav button:hover { color: var(--m-green-500); border-color: var(--m-border-strong); }
  .date-pop .foot { display: flex; gap: 6px; justify-content: flex-end; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--m-border-subtle); }

  .sess-rail .badge-n {
    font: 500 10px var(--m-font-mono);
    color: var(--m-green-500);
    border: 1px solid var(--m-border);
    border-radius: 9999px;
    padding: 1px 6px;
  }
  .sess-head {
    display: flex; align-items: center;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--m-border-subtle);
  }
  .sess-head h3 {
    margin: 0;
    font: 600 11px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .22em;
    color: var(--m-text-strong);
  }
  .sess-head .ct {
    margin-left: 8px;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
  }
  .sess-head .actions {
    margin-left: auto;
    display: flex; gap: 4px;
    flex-shrink: 0;
    flex-wrap: nowrap;
  }
  .sess-head h3 { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sess-head { min-width: 0; }
  .sess-head .ct { flex-shrink: 0; margin-right: 4px; }
  .sess-head .actions .ico-btn { flex: 0 0 26px; min-width: 26px; }
  .sess-head .actions .ico-btn .ico { width: 14px; height: 14px; }
  .ico-btn {
    display: inline-grid; place-items: center;
    width: 26px; height: 26px;
    border-radius: var(--m-radius-md);
    color: var(--m-text-muted);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .ico-btn:hover { background: var(--m-fill-subtle); color: var(--m-green-500); border-color: var(--m-border-subtle); }
  .ico-btn.active { background: var(--m-fill); color: var(--m-green-500); border-color: var(--m-border); box-shadow: var(--m-glow-sm); }

  .sess-search {
    padding: 10px 14px;
    border-bottom: 1px solid var(--m-border-subtle);
  }

  /* filter chip rail */
  .chip-rail {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--m-border-subtle);
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 9px;
    font: 500 10.5px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--m-text-muted);
    border: 1px solid var(--m-border-subtle);
    border-radius: 9999px;
    cursor: pointer;
    background: transparent;
    user-select: none;
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .chip:hover { color: var(--m-text); border-color: var(--m-border); }
  .chip.on {
    background: var(--m-fill);
    color: var(--m-green-500);
    border-color: var(--m-border-strong);
    box-shadow: var(--m-glow-sm);
  }
  .chip .ico { width: 11px; height: 11px; }
  .chip .ct {
    font-size: 9px;
    padding: 0 5px;
    background: var(--m-fill);
    border-radius: 9999px;
    color: var(--m-text-muted);
    line-height: 1.5;
  }
  .chip.on .ct { background: var(--m-green-500); color: var(--m-bg); }

  /* date / sort row */
  .sess-meta {
    display: flex; gap: 8px; align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--m-border-subtle);
    font: 500 10.5px var(--m-font-mono);
    color: var(--m-text-muted);
    text-transform: uppercase;
    letter-spacing: .12em;
  }
  .sess-meta .seg {
    display: flex;
    border: 1px solid var(--m-border-subtle);
    border-radius: var(--m-radius-md);
    overflow: hidden;
  }
  .sess-meta .seg button {
    background: transparent;
    color: var(--m-text-muted);
    border: none;
    padding: 4px 8px;
    font: 500 10px var(--m-font-mono);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .12em;
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .sess-meta .seg button:hover { color: var(--m-text); }
  .sess-meta .seg button.on {
    background: var(--m-fill);
    color: var(--m-green-500);
    box-shadow: inset 0 -2px 0 var(--m-green-500);
  }

  /* list */
  .sess-list { overflow: auto; padding: 6px 8px 8px; }
  .day-label {
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .22em;
    color: var(--m-text-faint);
    padding: 14px 10px 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .day-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--m-border-subtle);
  }
  .day-label .n {
    color: var(--m-green-500);
    font-size: 9px;
    padding: 1px 5px;
    border: 1px solid var(--m-border);
    border-radius: 9999px;
    margin-left: 0;
  }

  .sess-card {
    display: grid;
    grid-template-columns: 8px 1fr auto;
    gap: 10px;
    align-items: start;
    padding: 10px 10px 10px 6px;
    margin-bottom: 4px;
    border-radius: var(--m-radius-md);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all var(--m-dur-fast) var(--m-ease-out);
    position: relative;
  }
  .sess-card:hover {
    background: var(--m-fill-subtle);
    border-color: var(--m-border-subtle);
  }
  .sess-card.active {
    background: var(--m-fill);
    border-color: var(--m-border-strong);
    box-shadow: inset 2px 0 0 var(--m-green-500), var(--m-glow-sm);
  }
  .sess-card .rail {
    width: 3px;
    height: 100%;
    border-radius: 2px;
    background: var(--m-text-faint);
  }
  .sess-card.src-chat   .rail { background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); }
  .sess-card.src-cron   .rail { background: var(--m-warning); }
  .sess-card.src-task   .rail { background: var(--m-info); }
  .sess-card.src-tg     .rail { background: var(--m-pink); }
  .sess-card.src-mem    .rail { background: #c2ffd2; }
  .sess-card.src-tool   .rail { background: var(--m-green-700); }

  .sess-card .body { min-width: 0; }
  .sess-card .title {
    font: 500 12.5px/1.35 var(--m-font-mono);
    color: var(--m-text-strong);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sess-card.active .title { color: var(--m-green-500); }
  .sess-card .meta {
    display: flex; gap: 6px; align-items: center;
    font: 400 10.5px var(--m-font-mono);
    color: var(--m-text-muted);
    margin-top: 4px;
  }
  .sess-card .meta .src-tag {
    text-transform: lowercase;
    color: var(--m-text-faint);
  }
  .sess-card .meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--m-text-faint); }
  .sess-card .right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    font: 400 10px var(--m-font-mono);
    color: var(--m-text-faint);
    white-space: nowrap;
  }
  .sess-card .right .live {
    color: var(--m-green-500);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .sess-card .right .tok {
    color: var(--m-text-muted);
    font-variant-numeric: tabular-nums;
  }
  .sess-card .badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .sess-card .badges .b {
    font: 500 8.5px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 1px 5px;
    border: 1px solid var(--m-border-subtle);
    border-radius: 9999px;
    color: var(--m-text-muted);
    background: transparent;
  }
  .sess-card .badges .b.acc { color: var(--m-green-500); border-color: var(--m-border); background: var(--m-fill-subtle); }
  .sess-card .badges .b.warn { color: var(--m-warning); border-color: rgba(214,255,95,.3); }
  .sess-card .badges .b.err { color: var(--m-danger); border-color: rgba(255,95,109,.3); }
  .sess-card .badges .b.info { color: var(--m-info); border-color: rgba(95,207,255,.3); }
  .sess-card .badges .b.pink { color: var(--m-pink); border-color: rgba(255,95,162,.3); }

  .sess-foot {
    border-top: 1px solid var(--m-border);
    padding: 10px 12px;
    background: var(--m-sidebar);
  }

  /* ── chat column ────────────────────────────────────────── */
  .chat {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    overflow: hidden;
    background: var(--m-bg);
    position: relative;
  }
  .chat-top {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 22px;
    border-bottom: 1px solid var(--m-border);
    background: var(--m-sidebar);
  }
  .chat-top .title {
    font: 500 13px/1.2 var(--m-font-mono);
    color: var(--m-text-strong);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .chat-top .title .src {
    color: var(--m-green-500);
    margin-right: 8px;
  }
  .chat-top .src-tabs {
    display: flex;
    gap: 2px;
    background: var(--m-bg-deep);
    border: 1px solid var(--m-border-subtle);
    border-radius: var(--m-radius-md);
    padding: 2px;
  }
  .chat-top .src-tabs .t {
    padding: 4px 10px;
    font: 500 10.5px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--m-text-muted);
    border-radius: var(--m-radius-sm);
    cursor: pointer;
    display: inline-flex; gap: 6px; align-items: center;
  }
  .chat-top .src-tabs .t.on {
    background: var(--m-fill);
    color: var(--m-green-500);
    box-shadow: 0 0 0 1px var(--m-border-strong) inset;
  }
  .chat-top .actions { display: flex; gap: 4px; }

  .chat-meta-bar {
    display: flex; align-items: center; gap: 14px;
    padding: 7px 22px;
    border-bottom: 1px solid var(--m-border-subtle);
    background: var(--m-bg);
    font: 500 10.5px var(--m-font-mono);
    color: var(--m-text-muted);
    text-transform: uppercase;
    letter-spacing: .15em;
  }
  .chat-meta-bar .sep { width: 1px; height: 12px; background: var(--m-border-subtle); }

  .chat-stream {
    overflow: auto;
    padding: 26px 22px 18px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .chat-stream .turn { display: flex; gap: 12px; max-width: 880px; width: 100%; margin: 0 auto; }
  .chat-stream .turn.user { justify-content: flex-end; }
  .chat-stream .turn.user .bubble {
    background: var(--m-fill);
    border: 1px solid var(--m-border-strong);
    border-radius: 12px 12px 2px 12px;
    color: var(--m-text-strong);
    max-width: 75%;
  }
  .chat-stream .turn.assist .bubble {
    background: var(--m-card);
    border: 1px solid var(--m-border-subtle);
    border-radius: 12px 12px 12px 2px;
    color: var(--m-text);
    max-width: 90%;
  }
  .chat-stream .bubble {
    padding: 12px 14px;
    font: 400 13.5px/1.65 var(--m-font-sans);
  }
  .chat-stream .bubble code {
    font-family: var(--m-font-mono);
    background: var(--m-fill-subtle);
    border: 1px solid var(--m-border-subtle);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 12.5px;
    color: var(--m-green-300);
  }
  .chat-stream .meta {
    font: 500 9.5px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .2em;
    color: var(--m-text-faint);
    margin-top: 4px;
  }
  .chat-stream .turn.user .meta { text-align: right; }

  .avatar-h { width: 28px; height: 28px; border-radius: 6px; background: var(--m-fill); border: 1px solid var(--m-border-strong); display: grid; place-items: center; font: 700 11px var(--m-font-mono); color: var(--m-green-500); flex: none; box-shadow: var(--m-glow-sm); }
  .avatar-u { width: 28px; height: 28px; border-radius: 6px; background: var(--m-card-2); border: 1px solid var(--m-border); display: grid; place-items: center; font: 600 11px var(--m-font-mono); color: var(--m-text); flex: none; }

  /* tool activity card */
  .tool-card {
    background: var(--m-card-2);
    border: 1px solid var(--m-border-subtle);
    border-radius: 8px;
    overflow: hidden;
    max-width: 680px;
  }
  .tool-card .hd {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--m-border-subtle);
    background: var(--m-card);
    font: 600 10px var(--m-font-mono);
    color: var(--m-text-muted);
    text-transform: uppercase; letter-spacing: .2em;
  }
  .tool-card .hd .right { margin-left: auto; color: var(--m-green-500); display: flex; gap: 8px; align-items: center; }
  .tool-card .body { padding: 10px 12px; }
  .tool-card .row { display: flex; align-items: center; gap: 10px; padding: 4px 0; font: 500 12px var(--m-font-mono); color: var(--m-text); }
  .tool-card .row .ok { color: var(--m-green-500); }
  .tool-card .row .name { color: var(--m-text-strong); }
  .tool-card .row .sub { color: var(--m-text-muted); font-size: 10.5px; margin-left: auto; }

  /* composer */
  .composer-wrap {
    border-top: 1px solid var(--m-border);
    background: var(--m-sidebar);
    padding: 14px 22px 16px;
  }
  .composer {
    max-width: 880px; margin: 0 auto;
    background: var(--m-bg-deep);
    border: 1px solid var(--m-border-strong);
    border-radius: 10px;
    box-shadow: var(--m-glow-sm), inset 0 0 12px rgba(0,255,65,.04);
    overflow: hidden;
    transition: box-shadow var(--m-dur-base) var(--m-ease-out);
  }
  .composer.streaming { animation: m-glow-pulse 2.4s var(--m-ease-in-out) infinite; }
  .composer .inp {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px;
  }
  .composer .inp::before {
    content: "▸";
    color: var(--m-green-500);
    font: 700 14px var(--m-font-mono);
    line-height: 1.4;
  }
  .composer textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--m-text);
    font: 400 13.5px/1.55 var(--m-font-mono);
    resize: none;

            onChange={(e) => setQ(e.target.value)}

          {q ?
          <span className="ico-btn" onClick={() => setQ('')} style={{ width: 22, height: 22 }}>{Ico.x}</span>
          : null}
        </div>
      </div>

      <div className="chip-rail">
        {SOURCES.map((s) =>
        <button key={s.id}
        className={`chip ${source === s.id ? 'on' : ''}`}
        onClick={() => setSource(s.id)}>
            {s.ico}<span>{s.label}</span><span className="ct">{s.count}</span>
          </button>
        )}
      </div>

      <div className="sess-meta">
        <span>State</span>
        <div className="seg">
          {STATES.map((s) =>
          <button key={s.id} className={state === s.id ? 'on' : ''} onClick={() => setState(s.id)}>{s.label}</button>
          )}
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>{Ico.sort}<span>{sort}</span></span>
        </div>
      </div>

      <div className="sess-list">
        {Object.entries(grouped).map(([day, items]) =>
        <React.Fragment key={day}>
            <div className="day-label">
              <span>{dayLabels[day]}</span>
              <span className="n">{items.length}</span>
            </div>
            {items.map((s) =>
          <div key={s.id}
          className={`sess-card src-${s.src} ${activeId === s.id ? 'active' : ''}`}
          onClick={() => onSelect(s.id)}>
                <span className="rail" />
                <div className="body">
                  <div className="title">
                    {s.pinned && <span style={{ color: 'var(--m-green-500)', marginRight: 4 }}>★</span>}
                    {s.title}
                  </div>
                  <div className="meta">
                    <span className="src-tag">{s.src}</span>
                    <span className="dot" />
                    <span style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.sub}</span>
                  </div>
                  <div className="badges">
                    {(s.badges || []).map((b, i) => {
                  const map = { live: 'acc', tools: '', system: 'info', err: 'err', ok: 'acc', done: '', tg: 'pink', running: 'acc', archived: '' };
                  const lbl = b === 'tools' ? 'tools' : b === 'tg' ? 'TG' : b;
                  return <span key={i} className={`b ${map[b] || ''}`}>{b === 'live' ? <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}><span className="m-dot m-dot-pulse" style={{ width: 5, height: 5 }} />{lbl}</span> : lbl}</span>;
                })}
                  </div>
                </div>
                <div className="right">
                  <span className={s.live ? 'live' : ''}>{s.when}</span>
                  <span className="tok">{s.tok}</span>
                </div>
              </div>
          )}
          </React.Fragment>
        )}
        {list.length === 0 &&
        <div style={{ padding: '40px 18px', textAlign: 'center', fontFamily: 'var(--m-font-mono)', color: 'var(--m-text-faint)', fontSize: 12, lineHeight: 1.7 }}>
            <div style={{ marginBottom: 8, fontSize: 24, color: 'var(--m-text-faint)' }}>∅</div>
            no sessions match.<br />
            <span style={{ color: 'var(--m-text-muted)' }}>try clearing filters or widening the date range.</span>
          </div>
        }
      </div>

      <div className="sess-foot">
        <button className="m-btn m-btn-primary" style={{ justifyContent: 'center', width: '100%' }}>
          <span style={{ width:14, height:14, display:'inline-grid', placeItems:'center', flex:'none' }}>{Ico.plus}</span>
          <span>new chat</span>
        </button>
      </div>
    </aside>);

}
