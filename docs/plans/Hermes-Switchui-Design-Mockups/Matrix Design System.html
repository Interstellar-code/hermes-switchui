<style>
  /* canvas chrome stays neutral; artboards are matrix-themed inside */
  body { background: #050505; }
  .ds-art {
    background: var(--m-bg);
    color: var(--m-text);
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }
  .ds-pad   { padding: 32px; height: 100%; overflow: auto; }
  .ds-pad-lg{ padding: 40px; height: 100%; overflow: auto; }
  .ds-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .ds-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .ds-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .ds-grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }

  /* swatch */
  .sw {
    border-radius: var(--m-radius-md);
    border: 1px solid var(--m-border-subtle);
    overflow: hidden;
    font-family: var(--m-font-mono);
    font-size: 11px;
  }
  .sw-chip { aspect-ratio: 1.6 / 1; }
  .sw-meta { padding: 8px 10px; background: var(--m-card); border-top: 1px solid var(--m-border-subtle); }
  .sw-meta b { color: var(--m-text-strong); display: block; font-weight: 600; }
  .sw-meta span { color: var(--m-text-muted); }

  .type-row { display: grid; grid-template-columns: 110px 1fr 110px; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px dashed var(--m-border-subtle); }
  .type-row .lbl { color: var(--m-text-muted); font: 500 11px var(--m-font-mono); text-transform: uppercase; letter-spacing: .15em; }
  .type-row .meta { color: var(--m-text-faint); font: 400 11px var(--m-font-mono); text-align: right; }

  /* matrix rain canvas */
  .rain-wrap { position: relative; height: 320px; border: 1px solid var(--m-border); border-radius: var(--m-radius-lg); overflow: hidden; background: var(--m-bg-deep); }
  .rain-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .rain-wrap .overlay { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }

  /* hero h1 inside artboard */
  .ds-title {
    font: 600 14px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .2em;
    color: var(--m-green-500);
    margin: 0 0 6px 0;
  }
  .ds-subtitle {
    font: 400 13px var(--m-font-mono);
    color: var(--m-text-muted);
    margin: 0 0 28px 0;
  }
  .ds-section-rule {
    height: 1px;
    background: linear-gradient(90deg, var(--m-green-500), transparent);
    margin: 4px 0 28px 0;
  }

  /* iconography svgs use currentColor */
  .ico { width: 16px; height: 16px; flex: none; }

  /* nav-mock */
  .navmock { width: 220px; padding: 18px 12px; background: var(--m-sidebar); border-right: 1px solid var(--m-border); height: 100%; }
  .navmock .brand { display: flex; align-items: center; gap: 10px; padding: 8px 6px 18px; border-bottom: 1px solid var(--m-border-subtle); margin-bottom: 12px; }
  .navmock .brand b { color: var(--m-green-500); font: 600 14px var(--m-font-mono); letter-spacing: .15em; text-shadow: var(--m-text-glow); }

  /* dialog mock */
  .dlg-scrim { position: absolute; inset: 0; background: rgba(2,8,4,.78); backdrop-filter: blur(2px); display: grid; place-items: center; padding: 32px; }
  .dlg { width: min(460px, 100%); background: var(--m-card); border: 1px solid var(--m-border-strong); border-radius: var(--m-radius-lg); box-shadow: var(--m-glow-md), var(--m-shadow-3); overflow: hidden; }

  /* dashboard mock */
  .dash { display: grid; grid-template-columns: 220px 1fr; height: 100%; }
  .dash-main { padding: 20px 24px; overflow: auto; }

  /* code block w line numbers */
  .codeblk { font-family: var(--m-font-mono); font-size: 12px; line-height: 1.6; }
  .codeblk .ln { display: inline-block; width: 22px; color: var(--m-text-faint); user-select: none; text-align: right; margin-right: 12px; }

  /* table */
  .tbl { width: 100%; border-collapse: collapse; font-family: var(--m-font-mono); font-size: 12px; }
  .tbl th, .tbl td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--m-border-subtle); }
  .tbl th { color: var(--m-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .15em; font-size: 10px; background: var(--m-card-2); }
  .tbl tr:hover td { background: var(--m-fill-subtle); }

  /* spacing demo */
  .sp-row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
  .sp-bar { background: var(--m-green-500); height: 12px; box-shadow: var(--m-glow-sm); }
  .sp-row .lbl { width: 100px; font: 500 11px var(--m-font-mono); color: var(--m-text-muted); text-transform: uppercase; letter-spacing: .15em; }
  .sp-row .val { font: 400 11px var(--m-font-mono); color: var(--m-text-faint); }

  /* radius demo */
  .rd-box { aspect-ratio: 1.2 / 1; background: var(--m-fill); border: 1px solid var(--m-border-strong); display: grid; place-items: end center; padding: 10px; font: 500 11px var(--m-font-mono); color: var(--m-green-500); }

  /* shadow demo */
  .sh-box { background: var(--m-card); border: 1px solid var(--m-border); border-radius: var(--m-radius-lg); padding: 24px; text-align: center; font: 500 11px var(--m-font-mono); color: var(--m-text-muted); text-transform: uppercase; letter-spacing: .15em; }

  /* logo lockup */
  .lock {
    display: inline-flex; align-items: center; gap: 12px;
    font: 700 22px var(--m-font-mono);
    color: var(--m-text-strong);
    letter-spacing: .15em;
  }
  .lock .glyph {
    width: 36px; height: 36px;
    border: 1.5px solid var(--m-green-500);
    display: grid; place-items: center;
    color: var(--m-green-500);
    font-size: 18px;
    box-shadow: var(--m-glow-sm), inset 0 0 12px rgba(0,255,65,.12);
    border-radius: 4px;
  }
  .lock .glyph::before { content: "ᕼ"; font-family: var(--m-font-mono); font-weight: 700; }
  .lock .tag { font: 500 11px var(--m-font-mono); color: var(--m-text-muted); letter-spacing: .3em; padding-left: 10px; border-left: 1px solid var(--m-border); }
</style>

/* ─────────────────────────────────────────────────────────────
   MATRIX RAIN — animated katakana + green tail.
   ───────────────────────────────────────────────────────────── */
function MatrixRain({ density = 1, speed = 1, hue = '#00ff41' }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const ctx = cv.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    let raf, drops, cols, w, h;
    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF<>/$#'.split('');
    function size() {
      const r = cv.getBoundingClientRect();
      w = r.width; h = r.height;
      cv.width = w * dpr; cv.height = h * dpr;
      ctx.scale(dpr, dpr);
      cols = Math.floor(w / 14);
      drops = Array.from({ length: cols }, () => Math.random() * h / 14);
    }
    size();
    const ro = new ResizeObserver(size); ro.observe(cv);
    function frame() {
      ctx.fillStyle = 'rgba(2,8,4,0.10)';
      ctx.fillRect(0, 0, w, h);
      ctx.font = '14px JetBrains Mono, monospace';
      for (let i = 0; i < cols; i++) {
        const t = chars[(Math.random() * chars.length) | 0];
        const x = i * 14;
        const y = drops[i] * 14;
        // head — bright
        ctx.fillStyle = '#eaffef';
        ctx.shadowColor = hue; ctx.shadowBlur = 8;
        ctx.fillText(t, x, y);
        // tail — dimmer green just above
        ctx.shadowBlur = 0;
        ctx.fillStyle = hue;
        ctx.fillText(chars[(Math.random()*chars.length)|0], x, y - 14);
        if (y > h && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.45 * speed * (1 + Math.random() * 0.4);
      }
      raf = requestAnimationFrame(frame);
    }
    frame();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, [density, speed, hue]);
  return <canvas ref={ref} />;
}

          <div className="m-surface m-p-4" style={{minHeight:80, display:'grid', placeItems:'center', background:'radial-gradient(ellipse at center, var(--m-card-2) 0%, var(--m-bg) 100%)'}}>
            <span className="m-label m-label-accent">VIGNETTE / RADIAL</span>
          </div>
        </div>
      </div>

      <div className="m-label m-mt-8 m-mb-3">VOICE · TONE</div>
      <div className="ds-grid-3">
        {[
          ['Terminal', 'Imperative, mono, lowercase. "execute", "abort", "trace". No emoji. ALL_CAPS for state.'],
          ['Operator',  'Compressed and unsentimental. "session saved · 42k tokens · 14m". Numbers always tabular.'],
          ['Signal',    'Reserve adjectives. "live", "streaming", "throttled" carry their own light.'],
        ].map(([t,d])=>(
          <div className="m-surface m-p-4" key={t}>
            <div className="m-label m-label-accent m-mb-2">{t.toUpperCase()}</div>
            <p className="m-mono" style={{margin:0, fontSize:12, color:'var(--m-text-muted)', lineHeight:1.7}}>{d}</p>
          </div>
        ))}
      </div>

      <div className="m-divider-glow"/>

      <div className="m-row" style={{justifyContent:'space-between', alignItems:'center'}}>
        <div>
          <div className="m-label m-label-accent">END_OF_TRANSMISSION</div>
          <div className="m-mono m-text-muted m-mt-1" style={{fontSize:11}}>HERMES · MATRIX · v1.0.0 — handoff complete</div>
        </div>
        <div className="m-mono" style={{fontSize:11, color:'var(--m-text-faint)'}}>
          <span className="m-cursor">// system.idle</span>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────
   ARTBOARD: ICONS + MISC
   ───────────────────────────────────────────────────────────── */
function IconsArtboard() {
  const all = Object.entries(Ico);
  return (
    <div className="ds-art ds-pad-lg">
      <div className="ds-title">06 · ICONS</div>
      <h2 className="m-h2" style={{margin:'0 0 4px'}}>Line-based · 1.6 stroke · currentColor</h2>
      <p className="ds-subtitle">All icons inherit color from text. Use at 14–18px in UI; 20–24px in headers; never filled unless the design calls for emphasis.</p>
      <div className="ds-section-rule"/>

      <div className="ds-grid-6">
        {all.map(([k, el]) => (
          <div key={k} className="m-surface m-p-4" style={{textAlign:'center'}}>
            <div style={{display:'grid', placeItems:'center', height:48, color:'var(--m-text)'}}>
              {React.cloneElement(el, {style:{width:22, height:22}})}
            </div>
            <div className="m-mono m-text-muted m-mt-2" style={{fontSize:11}}>{k}</div>
          </div>
        ))}
        {all.slice(0,6).map(([k, el]) => (
          <div key={k+'-2'} className="m-surface m-p-4" style={{textAlign:'center', borderColor:'var(--m-border-strong)', boxShadow:'var(--m-glow-sm)'}}>
            <div style={{display:'grid', placeItems:'center', height:48, color:'var(--m-green-500)'}}>
              {React.cloneElement(el, {style:{width:22, height:22, filter:'drop-shadow(0 0 6px rgba(0,255,65,.7))'}})}
            </div>
            <div className="m-mono m-mt-2" style={{fontSize:11, color:'var(--m-green-500)'}}>{k} · accent</div>
          </div>
        ))}
      </div>

      <div className="m-label m-mt-8 m-mb-3">AVATARS · IDENTITY</div>
      <div className="m-row m-gap-3" style={{alignItems:'center'}}>
        <div className="m-avatar m-avatar-glow">H</div>
        <div className="m-avatar">N</div>
        <div className="m-avatar" style={{background:'var(--m-fill-strong)', color:'var(--m-text-strong)'}}>JR</div>
        <div className="m-avatar" style={{borderRadius:'50%', boxShadow:'var(--m-glow-sm)'}}>{Ico.agent}</div>
        <div className="m-avatar" style={{width:48, height:48, fontSize:18, borderRadius:'50%'}}>U</div>
        <div className="m-avatar" style={{width:48, height:48, fontSize:18, borderRadius:8, background:'var(--m-green-500)', color:'var(--m-bg)', borderColor:'var(--m-green-500)', boxShadow:'var(--m-glow-md)'}}>★</div>
        <div className="m-avatar" style={{width:48, height:48, fontSize:18, borderRadius:'50%', borderStyle:'dashed', borderColor:'var(--m-border-strong)', color:'var(--m-text-faint)', background:'transparent'}}>?</div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────
   CANVAS
   ───────────────────────────────────────────────────────────── */
function App() {
  return (
    <DesignCanvas
      title="Hermes · Matrix Design System"
      subtitle="Tokens · components · atmosphere — for hermes-switchui"
    >
      <DCSection id="cover" title="Cover" defaultLabel="Cover">
        <DCArtboard id="cover-1" label="Cover · Matrix Rain" width={1200} height={780}>
          <CoverArtboard/>
        </DCArtboard>
      </DCSection>

      <DCSection id="foundations" title="Foundations" defaultLabel="Foundations">
        <DCArtboard id="color"   label="01 Color"             width={1320} height={1080}><ColorArtboard/></DCArtboard>
        <DCArtboard id="type"    label="02 Typography"        width={1320} height={1080}><TypeArtboard/></DCArtboard>
        <DCArtboard id="space"   label="03 Spacing · Radius · Shadow" width={1320} height={1080}><SpacingArtboard/></DCArtboard>
      </DCSection>

      <DCSection id="components" title="Components" defaultLabel="Components">
        <DCArtboard id="controls" label="04 Controls"      width={1320} height={1080}><ControlsArtboard/></DCArtboard>
        <DCArtboard id="cards"    label="05 Badges · KPIs · Cards" width={1320} height={1080}><CardsArtboard/></DCArtboard>
        <DCArtboard id="icons"    label="06 Icons · Avatars" width={1320} height={780}><IconsArtboard/></DCArtboard>
        <DCArtboard id="code"     label="07 Code · Terminal" width={1320} height={900}><CodeArtboard/></DCArtboard>
        <DCArtboard id="agent"    label="08 Agent Surfaces"  width={1320} height={1080}><AgentArtboard/></DCArtboard>
      </DCSection>

      <DCSection id="patterns" title="Patterns & Brand" defaultLabel="Patterns & Brand">
        <DCArtboard id="nav"      label="Dashboard / Nav"   width={1440} height={900}><NavArtboard/></DCArtboard>
        <DCArtboard id="brand"    label="09 Brand · Atmosphere" width={1320} height={1080}><BrandArtboard/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
