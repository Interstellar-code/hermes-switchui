<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hermes · Skills</title>
<link rel="stylesheet" href="matrix-system.css"/>
<link rel="stylesheet" href="primary-nav-v2.css"/>
<style>.nav { background: transparent !important; border: none !important; padding: 0 !important; }</style>
<style>
  html, body { height: 100%; }
  body { background: var(--m-bg); }

  /* ── 3-column shell ─────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-columns: 232px 280px 1fr;
    height: 100vh;
    overflow: hidden;
    transition: grid-template-columns var(--m-dur-base) var(--m-ease-out);
  }
  .shell.filters-collapsed { grid-template-columns: 232px 44px 1fr; }

  /* ── primary nav (cloned from chat page) ─────────────────── */
  .nav {
    background: var(--m-sidebar);
    border-right: 1px solid var(--m-border);
    padding: 14px 10px;
    display: flex; flex-direction: column;
    overflow: hidden; min-width: 0;
  }
  .nav .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 14px;
    border-bottom: 1px solid var(--m-border-subtle);
    margin-bottom: 10px;
  }
  .nav .brand .glyph {
    width: 28px; height: 28px;
    border: 1.5px solid var(--m-green-500);
    color: var(--m-green-500);
    font-family: var(--m-font-mono); font-weight: 700; font-size: 14px;
    border-radius: 4px; display: grid; place-items: center;
    box-shadow: var(--m-glow-sm), inset 0 0 8px rgba(0,255,65,.12);
  }
  .nav .brand b {
    font: 700 13px/1 var(--m-font-mono);
    letter-spacing: .22em;
    color: var(--m-text-strong);
    text-shadow: var(--m-text-glow);
  }
  .nav .brand .ver {
    font: 500 9px/1 var(--m-font-mono);
    color: var(--m-text-faint);
    margin-top: 3px;
    letter-spacing: .15em;
  }
  .nav-grp {
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
    padding: 14px 10px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: var(--m-radius-md);
    font: 500 12.5px var(--m-font-mono);
    color: var(--m-text-muted);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all var(--m-dur-fast) var(--m-ease-out);
    user-select: none;
  }
  .nav-item:hover { background: var(--m-fill-subtle); color: var(--m-text); }
  .nav-item.active {
    background: var(--m-fill);
    color: var(--m-green-500);
    border-color: var(--m-border);
    box-shadow: inset 2px 0 0 var(--m-green-500);
  }
  .ico { width: 14px; height: 14px; flex: none; }
  .nav-item .badge-mini {
    margin-left: auto;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
    padding: 1px 6px;
    border-radius: 9999px;
    border: 1px solid var(--m-border-subtle);
    background: var(--m-fill-subtle);
  }
  .nav-item.active .badge-mini { color: var(--m-green-500); border-color: var(--m-border); }
  .nav-foot {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--m-border-subtle);
    display: flex; gap: 8px; align-items: center;
    font: 500 11px var(--m-font-mono); color: var(--m-text-muted);
  }

  /* ── filters panel ──────────────────────────────────────── */
  .filt {
    background: var(--m-panel);
    border-right: 1px solid var(--m-border);
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    grid-template-columns: minmax(0,1fr);
    overflow: hidden;
  }
  .filt-head {
    display: flex; align-items: center;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--m-border-subtle);
  }
  .filt-head h3 {
    margin: 0;
    font: 600 11px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-strong);
  }
  .filt-head .ct {
    margin-left: 8px;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
  }
  .filt-head .actions { margin-left: auto; display: flex; gap: 4px; }

  .ico-btn {
    display: inline-grid; place-items: center;
    width: 26px; height: 26px;
    border-radius: var(--m-radius-md);
    color: var(--m-text-muted);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .ico-btn:hover { background: var(--m-fill-subtle); color: var(--m-green-500); border-color: var(--m-border-subtle); }
  .ico-btn.active { background: var(--m-fill); color: var(--m-green-500); border-color: var(--m-border); box-shadow: var(--m-glow-sm); }

  .filt-search { padding: 10px 14px; border-bottom: 1px solid var(--m-border-subtle); }

  .filt-body { overflow: auto; padding: 4px 0 12px; }
  .filt-grp { padding: 14px 14px 4px; }
  .filt-grp h4 {
    margin: 0 0 8px;
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
  }
  .opt-row {
    display: flex; align-items: center;
    padding: 5px 10px;
    margin: 0 4px;
    border-radius: var(--m-radius-md);
    font: 500 12px var(--m-font-mono);
    color: var(--m-text-muted);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all var(--m-dur-fast) var(--m-ease-out);
    user-select: none;
  }
  .opt-row:hover { background: var(--m-fill-subtle); color: var(--m-text); }
  .opt-row.on {
    background: var(--m-fill);
    color: var(--m-green-500);
    border-color: var(--m-border);
    box-shadow: inset 2px 0 0 var(--m-green-500);
  }
  .opt-row .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--m-text-faint);
    margin-right: 9px; flex: none;
  }
  .opt-row.on .dot { background: var(--m-green-500); box-shadow: var(--m-glow-sm); }
  .opt-row .ct {
    margin-left: auto;
    font-size: 10px;
    color: var(--m-text-faint);
    padding: 1px 6px;
    border: 1px solid var(--m-border-subtle);
    border-radius: 9999px;
    background: var(--m-bg-deep);
  }
  .opt-row.on .ct { color: var(--m-green-500); border-color: var(--m-border); }

  /* segmented (Status: Installed / Marketplace / All) */
  .seg-stack {
    display: grid; gap: 2px;
    margin: 0 10px;
    border: 1px solid var(--m-border-subtle);
    border-radius: var(--m-radius-md);
    background: var(--m-bg-deep);
    padding: 2px;
  }
  .seg-stack button {
    background: transparent;
    color: var(--m-text-muted);
    border: none;
    padding: 6px 10px;
    font: 500 11px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .12em;
    cursor: pointer; text-align: left;
    border-radius: 4px;
    display: flex; align-items: center; gap: 8px;
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .seg-stack button:hover { color: var(--m-text); }
  .seg-stack button.on {
    background: var(--m-fill);
    color: var(--m-green-500);
    box-shadow: inset 2px 0 0 var(--m-green-500);
  }
  .seg-stack button .ct { margin-left: auto; font-size: 10px; color: var(--m-text-faint); }
  .seg-stack button.on .ct { color: var(--m-green-500); }

  .filt-foot {
    border-top: 1px solid var(--m-border-subtle);
    padding: 10px 12px;
    display: grid; gap: 6px;
  }

  /* collapsed rail */
  .filt.is-collapsed { grid-template-rows: auto 1fr auto; }
  .filt-rail {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; padding: 10px 0;
  }
  .filt-rail .vlabel {
    writing-mode: vertical-rl; transform: rotate(180deg);
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .3em;
    color: var(--m-text-faint);
    margin-top: 14px;
  }
  .filt-rail .badge-n {
    font: 500 10px var(--m-font-mono);
    color: var(--m-green-500);
    border: 1px solid var(--m-border);
    border-radius: 9999px;
    padding: 1px 6px;
  }

  /* ── main column ────────────────────────────────────────── */
  .main {
    display: grid;
    grid-template-rows: auto auto 1fr;
    overflow: hidden;
    background: var(--m-bg);
  }
  .top {
    display: flex; align-items: flex-end; gap: 18px;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--m-border-subtle);
  }
  .top .crumbs {
    font: 500 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
  }
  .top .crumbs .sep { color: var(--m-text-ghost); margin: 0 8px; }
  .top h1 {
    margin: 4px 0 2px;
    font: 600 22px var(--m-font-mono);
    color: var(--m-text-strong);
    letter-spacing: .04em;
    text-shadow: var(--m-text-glow);
  }
  .top .sub {
    font: 400 13px var(--m-font-sans);
    color: var(--m-text-muted);
    max-width: 540px;
  }
  .top .right {
    margin-left: auto;
    display: flex; align-items: center; gap: 12px;
  }
  .top .stat {
    display: grid;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .15em;
    text-align: right;
    border-left: 1px solid var(--m-border-subtle);
    padding-left: 12px;
  }
  .top .stat b {
    font: 600 16px var(--m-font-mono);
    color: var(--m-green-500);
    text-shadow: var(--m-text-glow);
    letter-spacing: .04em;
  }

  /* toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--m-border-subtle);
    background: var(--m-bg-deep);
  }
  .toolbar .grow { flex: 1; min-width: 0; }
  .toolbar .sort {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    border: 1px solid var(--m-border-subtle);
    border-radius: var(--m-radius-md);
    background: var(--m-bg);
    color: var(--m-text-muted);
    font: 500 11px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .12em;
    cursor: pointer;
  }
  .toolbar .sort:hover { color: var(--m-text); border-color: var(--m-border); }

  .view-toggle {
    display: inline-flex;
    border: 1px solid var(--m-border-subtle);
    border-radius: var(--m-radius-md);
    overflow: hidden;
    background: var(--m-bg);
  }
  .view-toggle button {
    background: transparent;
    color: var(--m-text-muted);
    border: none;
    padding: 6px 12px;
    font: 500 11px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .12em;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .view-toggle button:hover { color: var(--m-text); }
  .view-toggle button.on {
    background: var(--m-fill);
    color: var(--m-green-500);
    box-shadow: inset 0 -2px 0 var(--m-green-500);
  }
  .view-toggle button svg { width: 12px; height: 12px; }

  .canvas { overflow: auto; padding: 18px 24px 32px; }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--m-panel);
    border: 1px solid var(--m-border-subtle);
    border-radius: var(--m-radius-md);
    padding: 14px;
    display: grid;
    gap: 10px;
    transition: all var(--m-dur-fast) var(--m-ease-out);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--m-text-ghost);
    transition: background var(--m-dur-fast) var(--m-ease-out);
  }
  .card.installed::before { background: var(--m-green-500); box-shadow: 0 0 8px rgba(0,255,65,.4); }
  .card.disabled::before { background: var(--m-text-faint); }
  .card.market::before { background: #5fcfff; }
  .card:hover {
    border-color: var(--m-border-strong);
    background: var(--m-fill-subtle);
    transform: translateY(-1px);
  }
  .card .hd { display: flex; align-items: flex-start; gap: 8px; }
  .card .hd .glyph {
    width: 28px; height: 28px;
    border: 1px solid var(--m-border);
    border-radius: 5px;
    display: grid; place-items: center;
    background: var(--m-bg-deep);
    color: var(--m-green-500);
    font: 700 12px var(--m-font-mono);
    flex: none;
  }
  .card .hd .name {
    font: 600 13.5px var(--m-font-mono);
    color: var(--m-text-strong);
    letter-spacing: .04em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card .hd .by {
    font: 400 11px var(--m-font-mono);
    color: var(--m-text-faint);
    margin-top: 2px;
  }
  .card .hd .right { margin-left: auto; display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }

  .desc {
    font: 400 12.5px/1.5 var(--m-font-sans);
    color: var(--m-text-muted);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font: 500 9.5px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .12em;
    padding: 2px 7px;
    border: 1px solid var(--m-border-subtle);
    border-radius: 9999px;
    color: var(--m-text-muted);
    background: var(--m-bg-deep);
  }
  .tag.cat { color: var(--m-green-500); border-color: var(--m-border); }
  .tag.scan { color: #d6ff5f; border-color: rgba(214,255,95,.35); }
  .tag.scan.warn { color: #ffb347; border-color: rgba(255,179,71,.35); }
  .tag.scan.risk { color: #ff5fa2; border-color: rgba(255,95,162,.35); }
  .tag.origin { color: #5fcfff; border-color: rgba(95,207,255,.35); }
  .tag.builtin { color: var(--m-text); border-color: var(--m-border); background: var(--m-fill); }
  .tag.market { color: #5fcfff; border-color: rgba(95,207,255,.35); background: rgba(95,207,255,.06); }

  .meta {
    display: flex; align-items: center; gap: 10px;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .14em;
    padding-top: 6px;
    border-top: 1px dashed var(--m-border-subtle);
  }
  .meta .sep { width: 3px; height: 3px; background: var(--m-text-ghost); border-radius: 50%; }
  .meta .right { margin-left: auto; display: inline-flex; gap: 8px; align-items: center; }

  /* status pill (Enabled / Disabled / Marketplace) */
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font: 500 9.5px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .12em;
    padding: 2px 7px;
    border-radius: 9999px;
    border: 1px solid var(--m-border-subtle);
    color: var(--m-text-muted);
  }
  .status-pill.on { color: var(--m-green-500); border-color: var(--m-border); background: var(--m-fill); }
  .status-pill.off { color: var(--m-text-faint); }
  .status-pill.market { color: #5fcfff; border-color: rgba(95,207,255,.35); background: rgba(95,207,255,.06); }
  .status-pill .d { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* TABLE */
  .tbl {
    width: 100%;
    border-collapse: collapse;
    font: 400 12.5px var(--m-font-mono);
    color: var(--m-text);
  }
  .tbl thead th {
    position: sticky; top: 0; z-index: 1;
    background: var(--m-bg-deep);
    text-align: left;
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
    padding: 10px 12px;
    border-bottom: 1px solid var(--m-border);
    white-space: nowrap;
  }
  .tbl tbody td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--m-border-subtle);
    vertical-align: middle;
  }
  .tbl tbody tr {
    cursor: pointer;
    transition: background var(--m-dur-fast) var(--m-ease-out);
  }
  .tbl tbody tr:hover { background: var(--m-fill-subtle); }
  .tbl tbody tr.installed td:first-child { box-shadow: inset 2px 0 0 var(--m-green-500); }
  .tbl tbody tr.disabled td:first-child { box-shadow: inset 2px 0 0 var(--m-text-faint); }
  .tbl tbody tr.market td:first-child { box-shadow: inset 2px 0 0 #5fcfff; }
  .tbl .name-cell { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .tbl .name-cell .glyph {
    width: 22px; height: 22px;
    border: 1px solid var(--m-border-subtle);
    border-radius: 4px;
    display: grid; place-items: center;
    background: var(--m-bg-deep);
    color: var(--m-green-500);
    font: 700 10px var(--m-font-mono);
    flex: none;
  }
  .tbl .name-cell .ttl {
    font: 600 12.5px var(--m-font-mono);
    color: var(--m-text-strong);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tbl .name-cell .by {
    font: 400 10.5px var(--m-font-mono);
    color: var(--m-text-faint);
  }
  .tbl .desc-cell {
    color: var(--m-text-muted);
    font: 400 12px/1.5 var(--m-font-sans);
    max-width: 380px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
  }
  .tbl .tag.row { font-size: 9px; padding: 1px 6px; }
  .tbl .actions { display: inline-flex; gap: 4px; }

  /* ── DETAIL DRAWER ──────────────────────────────────────── */
  .scrim {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,12,4,.62);
    backdrop-filter: blur(2px);
    display: none;
  }
  .scrim.open { display: block; animation: m-fade-in var(--m-dur-base) var(--m-ease-out); }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(820px, 92vw);
    background: var(--m-panel);
    border-left: 1px solid var(--m-green-500);
    box-shadow: -2px 0 24px rgba(0,255,65,.18), -1px 0 0 rgba(0,255,65,.4);
    z-index: 51;
    display: none;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
    transform: translateX(20px);
    opacity: 0;
    transition: transform var(--m-dur-base) var(--m-ease-out), opacity var(--m-dur-base) var(--m-ease-out);
  }
  .drawer.open { display: grid; transform: translateX(0); opacity: 1; }
  .drawer .scan {
    position: absolute; left: 0; right: 0; top: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--m-green-500), transparent);
    opacity: .65;
    animation: m-scan 6s linear infinite;
    pointer-events: none;
  }
  @keyframes m-scan { 0% { transform: translateY(0); } 100% { transform: translateY(100vh); } }
  @keyframes m-fade-in { from { opacity: 0; } to { opacity: 1; } }

  .dr-head {
    padding: 16px 22px 14px;
    border-bottom: 1px solid var(--m-border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: start;
  }
  .dr-head .ttl-row { display: flex; align-items: center; gap: 12px; }
  .dr-head .glyph {
    width: 36px; height: 36px;
    border: 1px solid var(--m-green-500);
    border-radius: 6px;
    display: grid; place-items: center;
    background: var(--m-bg-deep);
    color: var(--m-green-500);
    font: 700 14px var(--m-font-mono);
    box-shadow: var(--m-glow-sm), inset 0 0 8px rgba(0,255,65,.12);
  }
  .dr-head h2 {
    margin: 0;
    font: 600 18px var(--m-font-mono);
    color: var(--m-text-strong);
    letter-spacing: .03em;
    text-shadow: var(--m-text-glow);
  }
  .dr-head .meta-line {
    margin-top: 4px;
    font: 500 11px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .14em;
  }
  .dr-head .meta-line span + span::before { content: " · "; color: var(--m-text-ghost); }
  .dr-head .actions { display: flex; gap: 6px; }

  .dr-body { overflow: auto; padding: 16px 22px 24px; display: grid; gap: 18px; }

  .panel-card {
    background: var(--m-bg-deep);
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    overflow: hidden;
  }
  .panel-card .hd {
    padding: 9px 12px;
    border-bottom: 1px solid var(--m-border-subtle);
    display: flex; align-items: center; gap: 10px;
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
    background: var(--m-panel);
  }
  .panel-card .hd .right { margin-left: auto; display: flex; gap: 6px; align-items: center; }

  - notes.write

# apple-notes

Bridge between Hermes and Apple Notes. Uses the \`memo\` CLI to perform CRUD operations against your local Notes database without bouncing through iCloud.

## When to use

Use this skill when the user wants to:
- create a new note in a specific folder
- find a note by title or content
- append or replace the body of an existing note

## How it works

1. The agent receives an intent like "save this as a note in Inbox".
2. The skill normalizes the title, body, and folder.
3. \`memo\` is invoked in non-interactive mode.
4. The resulting note id is returned to the agent.

## Examples

# github-pr

A high-leverage skill for working with GitHub pull requests directly from chat.

## Capabilities

- **List** open PRs in a repo, filtered by reviewer, label, or branch
- **Summarize** a PR's diff at three densities (one-line / paragraph / file-by-file)
- **Comment** on lines, files, or the conversation thread
- **Merge** with squash / rebase / merge-commit, gated on required reviews
- **Detect conflicts** before requesting a merge

## Required env

\`GITHUB_TOKEN\` with \`repo\` scope. The token is read from the host's keychain — never logged.

# shell-exec  ⚠

Runs shell commands inside a tightly scoped subshell with the network disabled and a per-call CPU/wall-clock budget.

> Like a lobster shell, security has layers — review code before you run it.

## Allowed binaries

Only binaries listed in \`policy.yaml\` are executable. Adding new binaries requires bumping the skill version and re-signing the manifest.

## Failure modes

function makeMd(s) {
  if (MD_TEMPLATES[s.id]) return MD_TEMPLATES[s.id];
  return `---
name: ${s.name}
description: ${s.desc}
author: ${s.author}
version: ${s.ver}
${s.triggers.length ? `triggers: [${s.triggers.map(t=>`"${t}"`).join(', ')}]` : 'triggers: []'}
---

# ${s.name}

${s.desc}

## When to use

The agent reaches for this skill whenever the prompt matches one of the trigger phrases above, or when planning explicitly names \`${s.name}\` as a tool.

## Behaviour

- Reads inputs from the agent's structured payload
- Validates the call against the skill's capability manifest
- Returns a structured result the agent can compose with downstream skills`;
}

function highlightMd(src) {
  // light syntax shading for the mock MD viewer
  const lines = src.split('\n');
  return lines.map((ln, i) => {
    let cls = '';
    let html = ln
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    if (/^---\s*$/.test(ln)) cls = 'cm';
    else if (/^# /.test(ln)) { cls = 'h1'; }
    else if (/^## /.test(ln)) { cls = 'h2'; }
    else if (/^[a-zA-Z_-]+:\s/.test(ln) && i < 30) {
      html = html.replace(/^([a-zA-Z_-]+):/, '<span class="key">$1</span>:');
    } else if (/^\s*-\s/.test(ln)) {
      cls = 'li';
      html = html.replace(/^\s*-\s/, '');
    } else if (/^>\s/.test(ln)) {
      cls = 'cm';
    }
    // backticked code spans
    html = html.replace(/`([^`]+)`/g, '<span class="code">$1</span>');
    return { html, cls };
  });
}

            </>
          )}

          {tab === 'files' && (
            <div className="panel-card">
              <div className="hd"><span>Bundle contents</span><span className="right" style={{ color: 'var(--m-green-500)' }}>{skill.files} files</span></div>
              <div>
                {[
                  { n: 'SKILL.md',     sz: '2.1 kb', lg: 'md'   },
                  { n: 'manifest.yaml',sz: '0.6 kb', lg: 'yaml' },
                  { n: 'handler.ts',   sz: '4.4 kb', lg: 'ts'   },
                  { n: 'fixtures/',    sz: '—',      lg: 'dir'  },
                ].slice(0, Math.max(skill.files, 1)).map((f, i) => (
                  <div key={i} className="file-row">
                    <span className="ic">{f.lg === 'dir' ? Ico.files : Ico.doc}</span>
                    <span className="nm">{f.n}</span>
                    <span className="sz">{f.sz}</span>
                    <span className="lg">{f.lg}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab === 'triggers' && (
            <div className="panel-card">
              <div className="hd"><span>Trigger phrases</span><span className="right" style={{ color: 'var(--m-text-muted)' }}>{skill.triggers.length}</span></div>
              <div className="bd">
                {skill.triggers.length === 0
                  ? <span className="trig-empty">No triggers listed</span>
                  : (
                    <div className="trig-list">
                      {skill.triggers.map(t => (
                        <span key={t} className="trig">{Ico.bolt}<code>{t}</code></span>
                      ))}
                    </div>
                  )}
              </div>
            </div>
          )}
        </div>

        <div className="dr-foot">
          {skill.source === 'builtin' && <span className="tag builtin">built-in</span>}
          {skill.source === 'market' && <span className="tag market">market</span>}
          <span className="src-line"><span className="lbl">Source:</span><code>{skill.path}</code></span>
          <span
            className={`switch ${skill.installed && skill.enabled ? 'on' : ''}`}
            onClick={() => onToggle(skill)}
            title={skill.enabled ? 'Disable' : 'Enable'}/>
          {skill.installed
            ? <button className="m-btn m-btn-sm">Uninstall</button>
            : <button className="m-btn m-btn-sm m-btn-primary">Install</button>}
          <button className="m-btn m-btn-sm" onClick={onClose}>Close</button>
        </div>
      </aside>
    </>
  );
}

/* ──────────────────────────────────────────────────────────
   APP
   ────────────────────────────────────────────────────────── */
function App() {
  const [q, setQ] = React.useState('');
  const [status, setStatus] = React.useState('installed');
  const [cat, setCat] = React.useState('all');
  const [origin, setOrigin] = React.useState('all');
  const [view, setView] = React.useState('grid');
  const [collapsed, setCollapsed] = React.useState(false);
  const [active, setActive] = React.useState(null);
  const [skills, setSkills] = React.useState(SKILLS);
  const [sort, setSort] = React.useState('name');

  const list = React.useMemo(() => {
    let l = skills.filter(s => {
      if (status === 'installed' && !s.installed) return false;
      if (status === 'enabled' && !(s.installed && s.enabled)) return false;
      if (status === 'market' && s.installed) return false;
      if (cat !== 'all' && s.cat !== cat) return false;
      if (origin !== 'all' && s.origin !== origin) return false;
      if (q) {
        const t = q.toLowerCase();
        if (!s.name.toLowerCase().includes(t) && !s.desc.toLowerCase().includes(t) && !s.author.toLowerCase().includes(t)) return false;
      }
      return true;
    });
    if (sort === 'name') l = [...l].sort((a,b) => a.name.localeCompare(b.name));
    if (sort === 'updated') l = [...l].sort((a,b) => a.updated.localeCompare(b.updated));
    return l;
  }, [skills, status, cat, origin, q, sort]);

  const onToggle = s => {
    setSkills(prev => prev.map(x => x.id === s.id ? { ...x, enabled: !x.enabled, installed: x.installed || !x.installed } : x));
    if (active && active.id === s.id) setActive(a => ({ ...a, enabled: !a.enabled }));
  };

  const enabledCount = skills.filter(s => s.installed && s.enabled).length;
  const installedCount = skills.filter(s => s.installed).length;

  return (
    <div className={`shell ${collapsed ? 'filters-collapsed' : ''}`}>
      <nav className="nav"><PrimaryNavV2 active="skills" sessionsBadge={142} /></nav>
      <FiltersPanel
        q={q} setQ={setQ}
        status={status} setStatus={setStatus}
        cat={cat} setCat={setCat}
        origin={origin} setOrigin={setOrigin}
        count={list.length}
        collapsed={collapsed} setCollapsed={setCollapsed}/>
      <main className="main">
        <div className="top">
          <div>
            <div className="crumbs">Hermes Workspace<span className="sep">·</span>Marketplace<span className="sep">·</span>Skills</div>
            <h1>Skills Browser</h1>
            <div className="sub">Discover, install, and manage skills across your local workspace and Skills Hub.</div>
          </div>
          <div className="right">
            <div className="stat"><span>Installed</span><b>{installedCount}</b></div>
            <div className="stat"><span>Enabled</span><b style={{ color: 'var(--m-green-500)' }}>{enabledCount}</b></div>
            <div className="stat"><span>Marketplace</span><b style={{ color: '#5fcfff', textShadow: '0 0 6px rgba(95,207,255,.4)' }}>{skills.length - installedCount}</b></div>
          </div>
        </div>

        <div className="toolbar">
          <span style={{ font: '500 11px var(--m-font-mono)', color: 'var(--m-text-faint)', textTransform: 'uppercase', letterSpacing: '.18em' }}>
            {list.length} of {skills.length}
          </span>
          <span className="grow"/>
          <span className="sort" onClick={() => setSort(s => s === 'name' ? 'updated' : 'name')}>
            sort · {sort === 'name' ? 'name a–z' : 'recently updated'}
          </span>
          <div className="view-toggle" role="tablist" aria-label="View toggle">
            <button className={view==='grid'?'on':''} onClick={() => setView('grid')}>{Ico.grid}<span>grid</span></button>
            <button className={view==='table'?'on':''} onClick={() => setView('table')}>{Ico.rows}<span>table</span></button>
          </div>
        </div>

        <div className="canvas">
          {list.length === 0 ? (
            <div className="empty">
              <div className="glyph">∅</div>
              no skills match.<br/>
              <span style={{ color: 'var(--m-text-muted)' }}>try clearing filters or searching by tag.</span>
            </div>
          ) : view === 'grid' ? (
            <div className="grid">
              {list.map(s => <Card key={s.id} s={s} onOpen={setActive} onToggle={onToggle}/>)}
            </div>
          ) : (
            <Table list={list} onOpen={setActive} onToggle={onToggle}/>
          )}
        </div>
      </main>

      <Drawer skill={active} onClose={() => setActive(null)} onToggle={onToggle}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
