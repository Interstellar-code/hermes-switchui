<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hermes · Terminal</title>
<link rel="stylesheet" href="matrix-system.css"/>
<link rel="stylesheet" href="primary-nav-v2.css"/>
<style>.nav { background: transparent !important; border: none !important; padding: 0 !important; }</style>
<style>
  html, body { height: 100%; }
  body { background: var(--m-bg); }

  .shell {
    display: grid;
    grid-template-columns: 232px 240px minmax(0, 1fr) 320px;
    height: 100vh; overflow: hidden;
    transition: grid-template-columns var(--m-dur-base) var(--m-ease-out);
  }
  .shell.sidebar-collapsed { grid-template-columns: 232px 44px minmax(0, 1fr) 320px; }
  .nav { display: block; min-width: 0; }

  /* sessions sidebar */
  .sb { background: var(--m-panel); border-right: 1px solid var(--m-border); display: grid; grid-template-rows: auto auto 1fr auto; overflow: hidden; }
  .sb-head { display: flex; align-items: center; padding: 12px 14px 10px; border-bottom: 1px solid var(--m-border-subtle); }
  .sb-head h3 { margin: 0; font: 600 11px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-text-strong); }
  .sb-head .ct { margin-left: 8px; font: 500 10px var(--m-font-mono); color: var(--m-text-faint); }
  .sb-head .actions { margin-left: auto; display: flex; gap: 4px; }
  .ico-btn { display: inline-grid; place-items: center; width: 26px; height: 26px; border-radius: var(--m-radius-md); color: var(--m-text-muted); cursor: pointer; border: 1px solid transparent; transition: all var(--m-dur-fast) var(--m-ease-out); }
  .ico-btn:hover { background: var(--m-fill-subtle); color: var(--m-green-500); border-color: var(--m-border-subtle); }
  .ico-btn.active { background: var(--m-fill); color: var(--m-green-500); border-color: var(--m-border); box-shadow: var(--m-glow-sm); }
  .ico { width: 14px; height: 14px; flex: none; }

  .sb-body { overflow: auto; padding: 6px 0; }
  .sb-grp { padding: 10px 10px 4px; }
  .sb-grp h4 { margin: 0 0 6px; padding: 0 4px; font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-text-faint); display: flex; align-items: center; gap: 6px; }
  .sb-grp h4 .ct { margin-left: auto; color: var(--m-text-ghost); }
  .term-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center; gap: 8px;
    padding: 6px 8px; margin: 0 4px;
    border-radius: var(--m-radius-md);
    font: 500 12px var(--m-font-mono);
    color: var(--m-text-muted);
    cursor: pointer;
    border: 1px solid transparent;
  }
  .term-row:hover { background: var(--m-fill-subtle); color: var(--m-text); }
  .term-row.on {
    background: var(--m-fill); color: var(--m-green-500);
    border-color: var(--m-border);
    box-shadow: inset 2px 0 0 var(--m-green-500);
  }
  .term-row .d { width: 7px; height: 7px; border-radius: 50%; background: var(--m-text-faint); }
  .term-row.live .d { background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); animation: m-pulse 2s infinite; }
  .term-row.warn .d { background: #ffb347; box-shadow: 0 0 6px #ffb347; }
  .term-row .meta { font-size: 9.5px; color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .14em; }
  .term-row.on .meta { color: var(--m-green-500); }
  .term-row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .term-row .name .pwd { display: block; font-size: 10px; color: var(--m-text-faint); margin-top: 1px; }
  @keyframes m-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }

  .sb-foot { border-top: 1px solid var(--m-border-subtle); padding: 10px 12px; display: grid; gap: 6px; }
  .sb.is-collapsed { grid-template-rows: auto 1fr auto; }
  .sb-rail { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px 0; }
  .sb-rail .vlabel { writing-mode: vertical-rl; transform: rotate(180deg); font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .3em; color: var(--m-text-faint); margin-top: 14px; }
  .sb-rail .badge-n { font: 500 10px var(--m-font-mono); color: var(--m-green-500); border: 1px solid var(--m-border); border-radius: 9999px; padding: 1px 6px; }

  /* main */
  .main { display: grid; grid-template-rows: auto 1fr auto; min-width: 0; overflow: hidden; background: var(--m-bg); }

  .workspace-strip {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--m-border-subtle);
    background:
      radial-gradient(circle at left top, rgba(0,255,65,.08), transparent 38%),
      linear-gradient(180deg, rgba(5,28,16,.98), rgba(2,14,8,.92));
  }
  .workspace-strip .title {
    display: flex; align-items: center; gap: 12px; min-width: 0;
  }
  .workspace-strip .eyebrow {
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
  }
  .workspace-strip h1 {
    margin: 2px 0 0;
    font: 600 18px/1.1 var(--m-font-sans, Inter, system-ui, sans-serif);
    color: #f0ffe8;
  }
  .workspace-strip p {
    margin: 4px 0 0;
    font: 500 11px var(--m-font-mono);
    color: var(--m-text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .signal {
    width: 10px; height: 10px; border-radius: 9999px;
    background: var(--m-green-500);
    box-shadow: 0 0 0 5px rgba(0,255,65,.12), 0 0 14px rgba(0,255,65,.45);
    animation: m-pulse 2s infinite;
    flex: none;
  }
  .workspace-strip .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    height: 28px; padding: 0 10px;
    border-radius: 9999px;
    border: 1px solid rgba(120,255,170,.14);
    background: rgba(0,20,10,.78);
    color: var(--m-text-strong);
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .16em;
  }
  .chip b { color: var(--m-green-500); font-weight: 700; }
  .chip .dot {
    width: 6px; height: 6px; border-radius: 9999px;
    background: var(--m-green-500);
    box-shadow: 0 0 6px rgba(0,255,65,.55);
  }

  /* tab strip */
  .tabs {
    display: flex; align-items: stretch;
    border-bottom: 1px solid var(--m-border);
    background: var(--m-panel);
    overflow-x: auto; min-height: 38px;
  }
  .tab {
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px;
    border-right: 1px solid var(--m-border-subtle);
    font: 500 12px var(--m-font-mono);
    color: var(--m-text-muted);
    cursor: pointer;
    position: relative;
    white-space: nowrap;
  }
  .tab:hover { color: var(--m-text); background: var(--m-fill-subtle); }
  .tab.on {
    color: var(--m-green-500); background: var(--m-bg);
    box-shadow: inset 0 -2px 0 var(--m-green-500);
  }
  .tab .d { width: 6px; height: 6px; border-radius: 50%; background: var(--m-text-faint); }
  .tab.live .d { background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); animation: m-pulse 2s infinite; }
  .tab.warn .d { background: #ffb347; box-shadow: 0 0 6px #ffb347; }
  .tab .ic { width: 14px; height: 14px; color: var(--m-text-faint); }
  .tab.on .ic { color: var(--m-green-500); }
  .tab .x { width: 16px; height: 16px; display: inline-grid; place-items: center; border-radius: 3px; color: var(--m-text-faint); margin-left: 4px; }
  .tab .x:hover { background: var(--m-fill); color: var(--m-text); }
  .tab .name { font-weight: 500; }
  .tab .badge { font-size: 9px; color: var(--m-text-faint); padding: 1px 5px; border: 1px solid var(--m-border-subtle); border-radius: 9999px; }
  .tab.on .badge { color: var(--m-green-500); border-color: var(--m-border); }
  .tabs .add {
    display: inline-grid; place-items: center;
    width: 36px; color: var(--m-text-faint);
    border-right: 1px solid var(--m-border-subtle);
    cursor: pointer;
  }
  .tabs .add:hover { color: var(--m-green-500); background: var(--m-fill-subtle); }
  .tabs .right-cluster {
    margin-left: auto;
    display: flex; align-items: center; gap: 4px;
    padding: 0 10px;
    border-left: 1px solid var(--m-border-subtle);
  }

  .overview {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--m-border-subtle);
    background: rgba(0,8,2,.78);
  }
  .metric {
    min-width: 0;
    padding: 12px 12px 10px;
    border-radius: 12px;
    border: 1px solid rgba(120,255,170,.1);
    background: linear-gradient(180deg, rgba(4,18,10,.96), rgba(2,10,6,.92));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
  }
  .metric .k {
    font: 600 9px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .22em;
  }
  .metric .v {
    margin-top: 8px;
    font: 600 19px/1.05 var(--m-font-sans, Inter, system-ui, sans-serif);
    color: #f5fff0;
  }
  .metric .sub {
    margin-top: 5px;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* terminal canvas area */
  .term-area {
    position: relative;
    overflow: hidden;
    background: #000;
    display: grid;
    grid-template-rows: 1fr;
    grid-template-columns: 1fr;
    min-height: 0;
  }
  .term-area.split-h { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; gap: 1px; background: var(--m-border); }
  .term-area.split-v { grid-template-rows: 1fr 1fr; grid-template-columns: 1fr; gap: 1px; background: var(--m-border); }

  .term-pane {
    position: relative;
    background: #000;
    min-height: 0; min-width: 0; height: 100%;
    overflow: hidden;
  }
  .term-pane.focused::before {
    content: ""; position: absolute; inset: 0;
    border: 1px solid rgba(0,255,65,.32);
    pointer-events: none; z-index: 10;
  }
  .pane-meta {
    position: absolute;
    top: 12px; left: 14px; z-index: 6;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 9px;
    border-radius: 9999px;
    border: 1px solid rgba(0,255,65,.16);
    background: rgba(0,10,3,.72);
    backdrop-filter: blur(4px);
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .18em;
    color: var(--m-text-strong);
  }
  .pane-meta .sep {
    width: 1px; height: 10px; background: rgba(255,255,255,.08);
  }
  .pane-meta .live-dot {
    width: 6px; height: 6px; border-radius: 9999px;
    background: var(--m-green-500); box-shadow: 0 0 6px rgba(0,255,65,.6);
  }
  .matrix-bg {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: .42;
    z-index: 0;
  }
  .matrix-bg::after {
    /* edge vignette so rain fades at top/bottom of pane */
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,0) 18%, rgba(0,0,0,0) 78%, rgba(0,0,0,.65) 100%);
    pointer-events: none;
  }
  .matrix-bg.dim { opacity: .22; }

  .term-content {
    position: relative; z-index: 1;
    padding: 48px 18px 56px;
    height: 100%; overflow: auto;
    font: 500 13px/1.55 var(--m-font-mono);
    color: #c5ffd0;
    text-shadow: 0 0 6px rgba(0,255,65,.18);
  }
  .term-content::-webkit-scrollbar { width: 8px; }
  .term-content::-webkit-scrollbar-track { background: transparent; }
  .term-content::-webkit-scrollbar-thumb { background: rgba(0,255,65,.18); border-radius: 4px; }

  .ln { display: block; white-space: pre-wrap; word-break: break-word; }
  .ln.warn { color: #ffb347; }
  .ln.err  { color: #ff5fa2; }
  .ln.dim  { color: rgba(197,255,208,.5); }
  .ln.cmd .pmt { color: var(--m-green-500); font-weight: 700; }
  .ln.cmd .at { color: #d6ff5f; }
  .ln.cmd .pwd { color: #5fcfff; }
  .ln.cmd .pct { color: var(--m-green-500); margin-right: 6px; }
  .ln.cmd .input { color: #fff; }
  .ln.ok   { color: var(--m-green-500); }
  .ln.key  { color: #5fcfff; }
  .ln.path { color: #5fcfff; }

  .caret {
    display: inline-block; width: 8px; height: 14px;
    background: var(--m-green-500);
    box-shadow: 0 0 8px var(--m-green-500);
    vertical-align: -2px;
    animation: m-blink 1.05s steps(2,start) infinite;
  }
  @keyframes m-blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }

  /* hud */
  .hud {
    position: absolute; top: 8px; right: 12px; z-index: 5;
    display: flex; gap: 8px; align-items: center;
    font: 500 9.5px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .14em;
    padding: 4px 8px;
    border: 1px solid var(--m-border-subtle);
    border-radius: 9999px;
    background: rgba(0,8,2,.65);
    backdrop-filter: blur(2px);
  }
  .hud .d { width: 6px; height: 6px; border-radius: 50%; background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); }
  .hud b { color: var(--m-text-strong); font-weight: 600; }

  /* command input bar pinned to bottom of pane */
  .cmd-bar {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 4;
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 10px;
    padding: 8px 14px;
    background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.85));
    border-top: 1px solid rgba(0,255,65,.18);
    font: 500 13px var(--m-font-mono);
  }
  .cmd-bar .pmt { color: var(--m-green-500); font-weight: 700; text-shadow: 0 0 6px rgba(0,255,65,.5); }
  .cmd-bar input {
    background: transparent; border: none; outline: none;
    color: #fff;
    font: 500 13px var(--m-font-mono);
    width: 100%;
  }
  .cmd-bar .hint { font-size: 10px; color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .14em; }
  .cmd-bar .hint kbd { font: 500 10px var(--m-font-mono); padding: 1px 5px; border: 1px solid var(--m-border-subtle); border-radius: 3px; background: var(--m-bg); margin-right: 4px; color: var(--m-green-500); }

  .intel {
    display: grid;
    grid-template-rows: auto auto auto 1fr auto;
    gap: 10px;
    padding: 14px;
    border-left: 1px solid var(--m-border);
    background:
      linear-gradient(180deg, rgba(4,14,10,.98), rgba(1,8,6,.98)),
      var(--m-panel);
    overflow: auto;
  }
  .intel-card {
    border: 1px solid rgba(120,255,170,.11);
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(6,24,14,.96), rgba(4,10,8,.92));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    overflow: hidden;
  }
  .intel-card .head {
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding: 12px 12px 10px;
    border-bottom: 1px solid rgba(255,255,255,.05);
  }
  .intel-card .head h3 {
    margin:0;
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
  }
  .intel-card .body { padding: 12px; }
  .stack { display:grid; gap:10px; }
  .inline-stat {
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    font: 500 11px var(--m-font-mono);
    color: var(--m-text);
  }
  .inline-stat b { color: var(--m-green-500); font-weight: 700; }
  .timeline { display:grid; gap:9px; }
  .timeline .item {
    display:grid; grid-template-columns:auto 1fr; gap:9px;
    align-items:flex-start;
    font: 500 10.5px var(--m-font-mono);
    color: var(--m-text-muted);
  }
  .timeline .item .dot {
    width: 8px; height: 8px; border-radius: 9999px;
    margin-top: 4px;
    background: rgba(0,255,65,.35);
    box-shadow: 0 0 8px rgba(0,255,65,.25);
  }
  .timeline .item strong { color: #efffe8; font-weight: 600; }
  .skill-list { display:grid; gap:8px; }
  .skill-pill {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding: 9px 10px;
    border-radius: 10px;
    border: 1px solid rgba(120,255,170,.08);
    background: rgba(0,0,0,.18);
    font: 500 10.5px var(--m-font-mono);
    color: var(--m-text);
  }
  .skill-pill .tag {
    color: var(--m-green-500);
    font-weight: 700;
    letter-spacing: .08em;
  }
  .queue {
    display:grid; gap:8px;
  }
  .queue .row {
    display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(255,255,255,.02);
    font: 500 10.5px var(--m-font-mono);
    color: var(--m-text-muted);
  }
  .queue .row .badge {
    padding: 2px 6px;
    border-radius: 9999px;
    border: 1px solid rgba(120,255,170,.12);
    color: var(--m-green-500);
  }
  .intel-foot {
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px dashed rgba(120,255,170,.16);
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
    letter-spacing: .14em;
    text-transform: uppercase;
  }

  /* palette */
  .palette {
    position: absolute; left: 50%; top: 18%; transform: translateX(-50%);
    width: min(560px, 90%);
    background: rgba(0,12,4,.92);
    border: 1px solid var(--m-green-500);
    box-shadow: 0 8px 36px rgba(0,255,65,.22), 0 0 0 1px rgba(0,255,65,.4);
    border-radius: var(--m-radius-md);
    z-index: 30;
    overflow: hidden;
    display: none;
  }
  .palette.open { display: block; animation: m-pop var(--m-dur-base) var(--m-ease-out); }
  @keyframes m-pop { from { opacity: 0; transform: translate(-50%, -8px); } to { opacity: 1; transform: translateX(-50%); } }
  .palette .pinp {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--m-border);
    font: 500 13px var(--m-font-mono);
  }
  .palette .pinp input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font: inherit; }
  .palette .pinp .pmt { color: var(--m-green-500); }
  .palette .plist { padding: 6px 0; max-height: 320px; overflow: auto; }
  .palette .pitem {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 10px; align-items: center;
    padding: 8px 14px;
    cursor: pointer;
    font: 500 12px var(--m-font-mono);
    color: var(--m-text);
  }
  .palette .pitem:hover, .palette .pitem.on { background: rgba(0,255,65,.08); color: var(--m-green-500); }
  .palette .pitem .ic { color: var(--m-text-faint); }
  .palette .pitem.on .ic { color: var(--m-green-500); }
  .palette .pitem .desc { font-size: 11px; color: var(--m-text-muted); margin-top: 2px; }
  .palette .pitem.on .desc { color: var(--m-green-500); opacity: .8; }
  .palette .pitem kbd { font: 500 10px var(--m-font-mono); padding: 1px 5px; border: 1px solid var(--m-border-subtle); border-radius: 3px; background: var(--m-bg-deep); color: var(--m-text-faint); }

  /* status footer */
  .pg-foot {
    border-top: 1px solid var(--m-border);
    background: var(--m-sidebar);
    display: flex; align-items: center; gap: 22px;
    padding: 0 24px;
    height: 30px;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
    letter-spacing: .14em; text-transform: uppercase;
  }
  .pg-foot b { color: var(--m-text-strong); font-weight: 600; }
  .pg-foot .ok { color: var(--m-green-500); }
  .pg-foot .sep { width: 1px; height: 14px; background: var(--m-border-subtle); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

/* ── Matrix rain canvas ─────────────────────────────────── */
function MatrixRain({ density = 1, speed = 0.75, dim = false }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf, w = 0, h = 0, dpr = 1;
    const glyphs = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%*+-=<>";
    const fontSize = 15;
    const baseTrail = dim ? 18 : 24;
    let columns = [];
    let colCount = 0;
    let rowHeight = fontSize;
    let colWidth = fontSize * 0.9;
    let lastT = 0;
    const parent = canvas.parentElement;

    function randGlyph() {
      return glyphs[(Math.random() * glyphs.length) | 0];
    }

    function makeColumn(totalRows, seeded = false) {
      const trail = Math.max(10, Math.round(baseTrail + Math.random() * 18));
      return {
        row: seeded ? Math.random() * totalRows : -Math.random() * totalRows * 0.7,
        speed: (0.7 + Math.random() * 1.25) * speed,
        trail,
        drift: Math.random() * 0.2,
        glyphs: Array.from({ length: trail + 10 }, randGlyph),
        twinkle: Math.random(),
      };
    }

    function resize() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      const pw = parent.clientWidth || canvas.getBoundingClientRect().width;
      const ph = parent.clientHeight || canvas.getBoundingClientRect().height;
      if (!pw || !ph) return;
      w = canvas.width = Math.max(1, Math.floor(pw * dpr));
      h = canvas.height = Math.max(1, Math.floor(ph * dpr));
      canvas.style.width = pw + 'px';
      canvas.style.height = ph + 'px';
      rowHeight = fontSize * dpr;
      colWidth = Math.max(10 * dpr, fontSize * dpr * 0.78);
      const totalRows = Math.max(12, Math.ceil(h / rowHeight) + 4);
      colCount = Math.max(18, Math.floor((w / colWidth) * density));
      columns = Array.from({ length: colCount }, () => makeColumn(totalRows, true));
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';
    }
    resize();
    const ro = new ResizeObserver(resize); ro.observe(parent);
    const ro2 = new ResizeObserver(resize); ro2.observe(document.body);
    window.addEventListener('resize', resize);
    setTimeout(resize, 50); setTimeout(resize, 250); setTimeout(resize, 800);

    function draw(t) {
      raf = requestAnimationFrame(draw);
      const dt = Math.min(60, t - (lastT || t));
      lastT = t;
      const totalRows = Math.max(12, Math.ceil(h / rowHeight) + 4);
      const effectiveColWidth = w / Math.max(1, colCount);
      ctx.fillStyle = dim ? 'rgba(0,0,0,0.17)' : 'rgba(0,0,0,0.10)';
      ctx.fillRect(0, 0, w, h);
      ctx.font = `${rowHeight}px "JetBrains Mono", ui-monospace, monospace`;

      const gridAlpha = dim ? 0.018 : 0.03;
      ctx.strokeStyle = `rgba(0,255,90,${gridAlpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 0; x < w; x += effectiveColWidth) {
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, h);
      }
      for (let y = 0; y < h; y += rowHeight) {
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(w, y + 0.5);
      }
      ctx.stroke();

      for (let i = 0; i < columns.length; i++) {
        const col = columns[i];
        const x = Math.floor(i * effectiveColWidth + effectiveColWidth * 0.14);
        const headRow = col.row;
        const shimmer = 0.92 + Math.sin((t / 1000) * (0.8 + col.twinkle)) * 0.08;

        for (let tail = 0; tail < col.trail; tail++) {
          const row = headRow - tail;
          if (row < -2 || row > totalRows) continue;
          const y = row * rowHeight;
          if (y < -rowHeight || y > h + rowHeight) continue;

          const alpha =
            tail === 0
              ? (dim ? 0.9 : 1)
              : Math.max(0.02, (1 - tail / col.trail) * (dim ? 0.16 : 0.38) * shimmer);

          ctx.fillStyle =
            tail === 0
              ? `rgba(235,255,240,${alpha})`
              : tail < 3
                ? `rgba(120,255,170,${alpha})`
                : `rgba(0,255,90,${alpha})`;
          if (Math.random() < 0.075) {
            col.glyphs[tail] = randGlyph();
          }
          ctx.fillText(col.glyphs[tail] || randGlyph(), x, y);
        }

        col.row += (col.speed * dt) / 18;
        if (Math.random() < 0.045 + col.drift) {
          col.trail = Math.max(10, Math.min(38, col.trail + (Math.random() > 0.5 ? 1 : -1)));
        }
        if (col.row - col.trail > totalRows) {
          columns[i] = makeColumn(totalRows, false);
        }
      }

      const fade = ctx.createLinearGradient(0, 0, 0, h);
      fade.addColorStop(0, 'rgba(0,0,0,0.42)');
      fade.addColorStop(0.12, 'rgba(0,0,0,0)');
      fade.addColorStop(0.84, 'rgba(0,0,0,0)');
      fade.addColorStop(1, 'rgba(0,0,0,0.58)');
      ctx.fillStyle = fade;
      ctx.fillRect(0, 0, w, h);
    }
    raf = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); ro2.disconnect(); window.removeEventListener('resize', resize); };
  }, [density, speed, dim]);
  return <canvas ref={ref} className={`matrix-bg ${dim?'dim':''}`}/>;
}

/* ── Canned command sandbox ─────────────────────────────── */
function evalCommand(cmd, term) {
  const c = cmd.trim();
  if (!c) return { lines: [], exit: 0 };
  const [head, ...rest] = c.split(/\s+/);
  const arg = rest.join(' ');
  switch (head) {
    case 'help':
      return { exit:0, lines:[
        { k:'ok', t:'hermes-shell — canned commands:' },
        { k:'',   t:'  help · clear · pwd · whoami · date · uname · echo <…>' },
        { k:'',   t:'  ls · cat <file> · ps · hermes <status|skills|mcp>' },
        { k:'dim',t:'  ↑/↓ for history · ⌘K for palette' },
      ]};
    case 'pwd':    return { exit:0, lines:[{ k:'', t: term.pwd.replace('~', '/Users/rohits') }] };
    case 'whoami': return { exit:0, lines:[{ k:'', t:'rohits' }] };
    case 'date':   return { exit:0, lines:[{ k:'', t: new Date().toString() }] };
    case 'uname':  return { exit:0, lines:[{ k:'', t:'Darwin Rohits-Mac-mini 24.1.0 arm64' }] };
    case 'echo':   return { exit:0, lines:[{ k:'', t: arg }] };
    case 'clear':  return { exit:0, clear:true, lines:[] };
    case 'ls':     return { exit:0, lines:[
      { k:'path', t:'src/        components/   public/      package.json' },
      { k:'path', t:'tsconfig.json  vite.config.ts  README.md  .env' },
    ]};
    case 'cat':
      if (!arg) return { exit:1, lines:[{ k:'err', t:'cat: missing operand' }] };
      return { exit:0, lines:[{ k:'dim', t:`# ${arg}` }, { k:'', t:'(canned preview — sandbox mode)' }] };
    case 'ps':     return { exit:0, lines:[
      { k:'dim', t:'  PID TTY           TIME CMD' },
      { k:'',    t:' 1842 ttys001    0:00.21 -zsh' },
      { k:'',    t:' 7331 ttys002    0:18.04 hermes-agent serve' },
      { k:'',    t:' 9120 ttys003    0:02.55 node tanstack-start' },
    ]};
    case 'hermes': {
      if (arg === 'status') return { exit:0, lines:[
        { k:'ok',  t:'● hermes-agent — running (pid 7331, uptime 4h12m)' },
        { k:'key', t:'  listen   http://0.0.0.0:7331' },
        { k:'key', t:'  workers  8/8 ready · queue depth 0' },
      ]};
      if (arg === 'skills') return { exit:0, lines:[
        { k:'ok', t:'142 skills mounted · 9 active sessions' },
        { k:'',   t:'  conductor · operator · tasks · files · terminal · mcp · …' },
      ]};
      if (arg === 'mcp') return { exit:0, lines:[
        { k:'ok',  t:'mcp servers · 3 connected · 12 unknown' },
        { k:'',   t:'  ✓ context-mode      ✓ claude-mem    ✓ omc-tools' },
        { k:'warn',t:'  ? gmail (auth required)  ? gdrive (auth required)' },
      ]};
      return { exit:1, lines:[{ k:'err', t:`hermes: unknown subcommand "${arg||''}" — try: status · skills · mcp` }] };
    }
    default:
      return { exit:127, lines:[{ k:'err', t:`zsh: command not found: ${head}` }] };
  }
}

/* ── Pane ───────────────────────────────────────────────── */
function TermPane({ term, focused, rain, rainDim, onFocus, onRun }) {
  const scrollRef = React.useRef(null);
  const inputRef  = React.useRef(null);
  const [draft, setDraft] = React.useState('');
  const [hIdx, setHIdx]   = React.useState(-1);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [term.history.length]);

  React.useEffect(() => {
    if (focused && inputRef.current) inputRef.current.focus();
  }, [focused, term.id]);

  const cmdHistory = term.history.filter(h => h.k === 'cmd').map(h => h.cmd);

  const onKey = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      onRun(term.id, draft);
      setDraft(''); setHIdx(-1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (!cmdHistory.length) return;
      const next = hIdx < 0 ? cmdHistory.length - 1 : Math.max(0, hIdx - 1);
      setHIdx(next); setDraft(cmdHistory[next] || '');
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (hIdx < 0) return;
      const next = hIdx + 1;
      if (next >= cmdHistory.length) { setHIdx(-1); setDraft(''); }
      else { setHIdx(next); setDraft(cmdHistory[next]); }
    }
  };

  return (
    <div className={`term-pane ${focused?'focused':''}`} onClick={() => { onFocus(); inputRef.current?.focus(); }}>
      {rain && <MatrixRain dim={rainDim}/>}
      <div className="pane-meta">
        <span className="live-dot"/>
        <span>{term.name}</span>
        <span className="sep"/>
        <span>{term.state}</span>
      </div>
      <div className="hud">
        <span className="d"/>
        <span><b>{term.host}</b></span>
        <span style={{ color:'var(--m-text-ghost)' }}>·</span>
        <span>{term.shell}</span>
        <span style={{ color:'var(--m-text-ghost)' }}>·</span>
        <span>{term.pwd}</span>
      </div>
      <div className="term-content" ref={scrollRef}>
        {term.history.map((h, i) => h.k === 'cmd' ? (
          <span key={i} className="ln cmd">
            <span className="at">{term.host}</span>
            <span className="dim"> </span>
            <span className="pwd">{h.t}</span>
            <span className="pct"> %</span>
            <span className="input">{h.cmd}</span>
            {'\n'}
          </span>
        ) : (
          <span key={i} className={`ln ${h.k}`}>{h.t}{'\n'}</span>
        ))}
        {focused && (
          <span className="ln cmd">
            <span className="at">{term.host}</span>
            <span className="dim"> </span>
            <span className="pwd">{term.pwd}</span>
            <span className="pct"> %</span>
            <span className="input">{draft}</span>
            <span className="caret"/>
          </span>
        )}
      </div>
      <div className="cmd-bar">
        <span className="pmt">{term.pwd} %</span>
        <input
          ref={inputRef}
          value={draft}
          onChange={e => { setDraft(e.target.value); setHIdx(-1); }}
          onKeyDown={onKey}
          placeholder={focused ? "type a command — try 'help' · ↑/↓ history · ⌘K palette" : "click to focus this pane…"}/>
        <span className="hint"><kbd>⌘K</kbd>palette</span>
      </div>
    </div>
  );
}

        <div className="body timeline">
          {OPS_LOG.map((item) => (
            <div className="item" key={item.t + item.title}>
              <span className="dot"/>
              <div>
                <strong>{item.t} · {item.title}</strong>
                <div style={{ marginTop:4 }}>{item.body}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="intel-card">
        <div className="head">
          <h3>Queued automations</h3>
          <span style={{ font:'600 10px var(--m-font-mono)', color:'var(--m-green-500)' }}>3 pending</span>
        </div>
        <div className="body queue">
          <div className="row"><span className="badge">prep</span><span>Warm route-level screenshot worker for /terminal</span><span>1m</span></div>
          <div className="row"><span className="badge">sync</span><span>Persist terminal notes into claude-mem + project wiki</span><span>queued</span></div>
          <div className="row"><span className="badge">ship</span><span>Export buffer + attach preview artifact to design review</span><span>ready</span></div>
        </div>
      </div>

      <div className="intel-foot">Hermes terminal workspace · command, memory, and agent telemetry in one view</div>
    </aside>
  );
}

/* ── Sessions sidebar ───────────────────────────────────── */
function Sidebar({ terms, activeId, onActivate, collapsed, setCollapsed, onNew }) {
  if (collapsed) {
    return (
      <aside className="sb is-collapsed">
        <div className="sb-head" style={{ justifyContent:'center' }}>
          <span className="ico-btn active" onClick={() => setCollapsed(false)} title="Expand">{Ico.unfold}</span>
        </div>
        <div className="sb-rail">
          <span className="badge-n">{terms.length}</span>
          <span className="vlabel">Terminals</span>
        </div>
        <div/>
      </aside>
    );
  }
  return (
    <aside className="sb">
      <div className="sb-head">
        <h3>Sessions</h3><span className="ct">{terms.length}</span>
        <span className="actions">
          <span className="ico-btn" title="New session" onClick={onNew}>{Ico.plus}</span>
          <span className="ico-btn" title="Collapse" onClick={() => setCollapsed(true)}>{Ico.fold}</span>
        </span>
      </div>
      <div className="sb-grp" style={{ padding:'10px 14px 6px', borderBottom:'1px solid var(--m-border-subtle)' }}>
        <div className="m-input" style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px' }}>
          {Ico.search}
          <input style={{ flex:1, background:'transparent', border:'none', outline:'none', color:'var(--m-text)', font:'500 12.5px var(--m-font-mono)' }} placeholder="filter sessions…"/>
        </div>
      </div>
      <div className="sb-body">
        <div className="sb-grp">
          <h4>Local <span className="ct">3</span></h4>
          {terms.filter(t => t.host.includes('Mac-mini')).map(t => (
            <div key={t.id} className={`term-row ${t.state} ${t.id===activeId?'on':''}`} onClick={() => onActivate(t.id)}>
              <span className="d"/>
              <span className="name">{t.name}<span className="pwd">{t.pwd} · {t.shell}</span></span>
              <span className="meta">{t.state==='live'?'live':t.state==='warn'?'warn':'idle'}</span>
            </div>
          ))}
        </div>
        <div className="sb-grp">
          <h4>Remote <span className="ct">1</span></h4>
          {terms.filter(t => !t.host.includes('Mac-mini')).map(t => (
            <div key={t.id} className={`term-row ${t.state} ${t.id===activeId?'on':''}`} onClick={() => onActivate(t.id)}>
              <span className="d"/>
              <span className="name">{t.name}<span className="pwd">{t.host} · {t.shell}</span></span>
              <span className="meta">{t.state==='live'?'live':t.state==='warn'?'warn':'idle'}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="sb-foot">
        <button className="m-btn m-btn-sm m-btn-primary" style={{ display:'inline-flex', alignItems:'center', gap:6, justifyContent:'center' }} onClick={onNew}>{Ico.plus} New session</button>
        <span style={{ font:'500 10px var(--m-font-mono)', color:'var(--m-text-faint)', textAlign:'center', textTransform:'uppercase', letterSpacing:'.18em' }}>⌘T new · ⌘K palette</span>
      </div>
    </aside>
  );
}

/* ── App ────────────────────────────────────────────────── */
function App() {
  const [terms, setTerms] = React.useState(TERMS);
  const [openIds, setOpenIds] = React.useState(['t1','t2','t3']);  // tabs open
  const [activeId, setActiveId] = React.useState('t1');
  const [splitId, setSplitId]   = React.useState('t3'); // pane B
  const [split, setSplit]       = React.useState('h');  // 'none' | 'h' | 'v'
  const [lastExit, setLastExit] = React.useState(0);
  const [focused, setFocused]   = React.useState('A');  // 'A' | 'B'
  const [collapsed, setCollapsed] = React.useState(false);
  const [rain, setRain]   = React.useState(true);
  const [rainDim, setDim] = React.useState(true);
  const [palette, setPalette] = React.useState(false);
  const [palQuery, setPalQuery] = React.useState('');
  const [palSel, setPalSel] = React.useState(0);

  const open = (id) => {
    setOpenIds(prev => prev.includes(id) ? prev : [...prev, id]);
    setActiveId(id);
    setFocused('A');
  };
  const close = (id) => {
    setOpenIds(prev => {
      const next = prev.filter(x => x !== id);
      if (id === activeId) setActiveId(next[0] || null);
      return next;
    });
  };
  const newSession = () => {
    const id = 't' + Math.floor(Math.random()*9999);
    const fresh = { id, name:'Terminal '+(terms.length+1), pwd:'~', host:'rohits@Rohits-Mac-mini', shell:'zsh', state:'idle', history:[{k:'dim',t:'[new session — type help]'}] };
    setTerms(p => [...p, fresh]);
    setOpenIds(p => [...p, id]); setActiveId(id);
  };
  const runCmd = (termId, raw) => {
    const cmd = (raw || '').trim();
    if (!cmd) return;
    setTerms(prev => prev.map(t => {
      if (t.id !== termId) return t;
      const res = evalCommand(cmd, t);
      setLastExit(res.exit ?? 0);
      const cmdLine = { k:'cmd', t:t.pwd, cmd };
      const nextHist = res.clear ? [] : [...t.history, cmdLine, ...res.lines];
      return { ...t, history: nextHist, state: res.exit === 0 ? t.state : 'warn' };
    }));
  };
  const togglePalette = () => { setPalette(p => !p); setPalQuery(''); setPalSel(0); };
  const runPalette = (id) => {
    setPalette(false);
    if (id === 'split-h') { setSplit('h'); setSplitId(activeId === 't2' ? 't1' : 't2'); }
    if (id === 'split-v') { setSplit('v'); setSplitId(activeId === 't2' ? 't1' : 't2'); }
    if (id === 'close')   { setSplit('none'); }
    if (id === 'rain-on') { setRain(r => !r); }
    if (id === 'rain-dim'){ setDim(d => !d); }
  };
  React.useEffect(() => {
    const onKey = e => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); togglePalette(); }
      if (e.key === 'Escape' && palette) setPalette(false);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [palette]);

  const active = terms.find(t => t.id === activeId);
  const splitTerm = terms.find(t => t.id === splitId);

  const filtered = PALETTE_ITEMS.filter(p => !palQuery || p.label.toLowerCase().includes(palQuery.toLowerCase()) || p.desc.toLowerCase().includes(palQuery.toLowerCase()));

  return (
    <div className={`shell ${collapsed ? 'sidebar-collapsed' : ''}`}>
      <nav className="nav"><PrimaryNavV2 active="terminal" sessionsBadge={9} /></nav>
      <Sidebar terms={terms} activeId={activeId} onActivate={open} collapsed={collapsed} setCollapsed={setCollapsed} onNew={newSession}/>
      <main className="main">
        <div className="workspace-strip">
          <div className="title">
            <span className="signal"/>
            <div style={{ minWidth:0 }}>
              <div className="eyebrow">Runtime workspace · /terminal</div>
              <h1>Persistent operator terminal with live agent context</h1>
              <p>Split panes, command palette actions, runtime status, and automation queues stay visible without losing the shell-first feel.</p>
            </div>
          </div>
          <div className="chips">
            <span className="chip"><span className="dot"/> <b>8</b> workers ready</span>
            <span className="chip"><span className="dot"/> <b>3</b> MCP attached</span>
            <span className="chip"><span className="dot"/> <b>23%</b> cpu stable</span>
          </div>
        </div>
        <div className="tabs">
          {openIds.map(id => {
            const t = terms.find(x => x.id === id); if (!t) return null;
            return (
              <div key={id} className={`tab ${t.state} ${id===activeId?'on':''}`} onClick={() => { setActiveId(id); setFocused('A'); }}>
                <span className="d"/>
                <span className="ic">{Ico.term}</span>
                <span className="name">{t.name}</span>
                <span className="x" onClick={e => { e.stopPropagation(); close(id); }}>{Ico.x}</span>
              </div>
            );
          })}
          <span className="add" title="New tab (⌘T)" onClick={newSession}>{Ico.plus}</span>
          <div className="right-cluster">
            <span className={`ico-btn ${rain?'active':''}`} title="Toggle Matrix rain (⌃M)" onClick={() => setRain(r => !r)}>{Ico.matrix}</span>
            <span className={`ico-btn ${rainDim?'active':''}`} title="Dim rain (⌃⇧M)" onClick={() => setDim(d => !d)} style={{ opacity: rain?1:.4 }}>·dim</span>
            <span className="ico-btn" title="Split right (⌘D)" onClick={() => setSplit('h')}>{Ico.splitH}</span>
            <span className="ico-btn" title="Split down (⇧⌘D)" onClick={() => setSplit('v')}>{Ico.splitV}</span>
            <span className="ico-btn" title="Single pane" onClick={() => setSplit('none')}>{Ico.unsplit}</span>
            <span style={{ width: 1, height: 18, background: 'var(--m-border-subtle)', margin: '0 4px' }}/>
            <span className="ico-btn" title="Command palette (⌘K)" onClick={togglePalette}>{Ico.cmd}</span>
            <span className="ico-btn" title="Record session">{Ico.rec}</span>
            <span className="ico-btn" title="Export buffer">{Ico.dl}</span>
          </div>
        </div>

        <div className="overview">
          <div className="metric">
            <div className="k">Active host</div>
            <div className="v">{active?.host || '—'}</div>
            <div className="sub">Focused pane pinned to the current operator machine.</div>
          </div>
          <div className="metric">
            <div className="k">Session mode</div>
            <div className="v">{split === 'none' ? 'Single pane' : split === 'h' ? 'Dual pane' : 'Stacked pane'}</div>
            <div className="sub">Designed to keep source logs and agent runtime visible together.</div>
          </div>
          <div className="metric">
            <div className="k">Primary command</div>
            <div className="v">pnpm dev</div>
            <div className="sub">Local app loop stays foregrounded while support terminals stream side data.</div>
          </div>
          <div className="metric">
            <div className="k">Promptable actions</div>
            <div className="v">⌘K palette</div>
            <div className="sub">Run skills, split panes, export logs, or hand output to Hermes.</div>
          </div>
        </div>

        <div className={`term-area ${split==='h'?'split-h':split==='v'?'split-v':''}`}>
          {active && (
            <TermPane term={active} focused={focused==='A'} rain={rain} rainDim={rainDim} onFocus={() => setFocused('A')} onRun={runCmd}/>
          )}
          {split !== 'none' && splitTerm && (
            <TermPane term={splitTerm} focused={focused==='B'} rain={rain} rainDim={rainDim} onFocus={() => setFocused('B')} onRun={runCmd}/>
          )}

          {/* command palette */}
          <div className={`palette ${palette?'open':''}`}>
            <div className="pinp">
              <span className="pmt">⌘K</span>
              <input autoFocus={palette} placeholder="run a terminal command, action or skill…" value={palQuery}
                onChange={e => { setPalQuery(e.target.value); setPalSel(0); }}
                onKeyDown={e => {
                  if (e.key === 'ArrowDown') { e.preventDefault(); setPalSel(s => Math.min(filtered.length-1, s+1)); }
                  if (e.key === 'ArrowUp')   { e.preventDefault(); setPalSel(s => Math.max(0, s-1)); }
                  if (e.key === 'Enter' && filtered[palSel]) runPalette(filtered[palSel].id);
                }}/>
              <span style={{ font:'500 10px var(--m-font-mono)', color:'var(--m-text-faint)', textTransform:'uppercase', letterSpacing:'.14em' }}>{filtered.length} actions</span>
            </div>
            <div className="plist">
              {filtered.map((p, i) => (
                <div key={p.id} className={`pitem ${i===palSel?'on':''}`} onClick={() => runPalette(p.id)} onMouseEnter={() => setPalSel(i)}>
                  <span className="ic">{p.ic}</span>
                  <div>
                    <div>{p.label}</div>
                    <div className="desc">{p.desc}</div>
                  </div>
                  <kbd>{p.k}</kbd>
                </div>
              ))}
              {filtered.length === 0 && <div style={{ padding:'18px 14px', color:'var(--m-text-faint)', font:'500 12px var(--m-font-mono)', textAlign:'center' }}>no actions match</div>}
            </div>
          </div>
        </div>

        <footer className="pg-foot">
          <span><b>{openIds.length}</b> tabs open</span>
          <span className="sep"/>
          <span>active <b style={{ color:'var(--m-green-500)' }}>{active?.name}</b></span>
          <span className="sep"/>
          <span>{active?.shell} · {active?.host}</span>
          <span className="sep"/>
          <span>exit <b className={lastExit===0?'ok':''} style={{ color: lastExit===0 ? 'var(--m-green-500)' : '#ff5fa2' }}>{lastExit}</b></span>
          <span className="sep"/>
          <span>rain <b className={rain?'ok':''}>{rain?(rainDim?'dim':'on'):'off'}</b></span>
          <span style={{ marginLeft:'auto' }}>cpu <b>23%</b></span>
          <span className="sep"/>
          <span>mem <b>4.1G/16G</b></span>
        </footer>
      </main>
      <IntelligenceRail terms={terms} openIds={openIds} active={active} split={split} rain={rain} rainDim={rainDim}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
