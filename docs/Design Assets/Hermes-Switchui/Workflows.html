<!--
  DESIGN RATIONALE
  ================
  Workflows is a YAML template management surface — distinct from Conductor (which manages
  Workflow Runs: living instances with a 5-phase lifecycle). The separation matters because
  templates are static artifacts that exist independently of any execution; Runs are ephemeral
  and disposable. A single workflow template may spawn hundreds of runs over its lifetime.

  The three-region layout mirrors VS Code's Explorer → Editor → Panel pattern, which maps
  cleanly onto the Browse → Edit → Act model: the library lets you find and compare workflow
  definitions; the editor exposes all five facets of a definition (overview, DAG, YAML,
  when-to-use guidance, and run history); the actions panel is the primary conversion point
  — the Launch CTA is the handoff from this static surface to the Conductor's dynamic one.

  The Launch Wizard (4 steps: Plan → Route → Schedule → Confirm) mirrors the first half of
  Conductor's own 5-phase model, giving the user a preview of what the engine will do before
  committing. On submit it creates a Workflow Run and navigates to Conductor with that run
  pre-selected, making the page boundary invisible to the user.

  Chrome continuity with Conductor and Operations is achieved through the shared matrix-system.css
  token set, primary-nav-v2 rail, and identical top-bar geometry (56px, crumbs + stats + actions).
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Workflows · Hermes</title>
<link rel="stylesheet" href="matrix-system.css"/>
<link rel="stylesheet" href="primary-nav-v2.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── Tokens (workflows-scoped additions) ─────────────── */
[data-screen="workflows"] {
  --wf-lib-w: 290px;
  --wf-act-w: 224px;
}

html, body { height: 100%; margin: 0; overflow: hidden; }
body { background: var(--m-bg); }
.nav-slot { background: transparent !important; border: none !important; padding: 0 !important; }

/* ── Shell ───────────────────────────────────────────── */
.wf-shell {
  display: grid;
  grid-template-columns: 232px var(--wf-lib-w, 290px) 1fr var(--wf-act-w, 224px);
  grid-template-rows: 56px 1fr;
  height: 100vh;
  overflow: hidden;
  transition: grid-template-columns var(--m-dur-base) var(--m-ease-out);
}
#wf-root { display: contents; }

/* ── Top bar ─────────────────────────────────────────── */
.wf-topbar {
  grid-column: 2 / -1;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  border-bottom: 1px solid var(--m-border);
  background: var(--m-sidebar);
}
.wf-topbar .crumbs {
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px;
  font: 500 11px var(--m-font-mono);
  text-transform: uppercase; letter-spacing: .18em;
  color: var(--m-text-faint);
}
.wf-topbar .crumbs .cur { color: var(--m-green-500); }
.wf-topbar .crumbs .sep { color: var(--m-text-ghost); }
.wf-topbar .top-right {
  display: flex; align-items: center; gap: 18px;
  height: 100%;
  padding: 0 16px;
  border-left: 1px solid var(--m-border-subtle);
}
.wf-topbar .top-stat {
  display: flex; flex-direction: column; gap: 1px;
  font: 500 10px var(--m-font-mono);
  color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .15em;
}
.wf-topbar .top-stat .sv {
  font: 600 14px var(--m-font-mono); color: var(--m-text-strong);
}
.wf-topbar .top-stat .sv.ok { color: var(--m-green-500); text-shadow: var(--m-text-glow); }

/* ── Library ─────────────────────────────────────────── */
.wf-library {
  grid-row: 2;
  background: var(--m-panel);
  border-right: 1px solid var(--m-border);
  display: grid;
  grid-template-rows: auto auto auto 1fr;
  overflow: hidden;
}
.lib-head {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--m-border-subtle);
  display: flex; align-items: center; gap: 8px;
}
.lib-title { display: flex; align-items: center; gap: 6px; flex: 1; }
.lib-label { font: 600 11px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-text-strong); }
.lib-ct {
  font: 500 10px var(--m-font-mono); color: var(--m-text-faint);
  padding: 1px 6px; border: 1px solid var(--m-border-subtle); border-radius: 9999px;
}
.lib-ctas { display: flex; gap: 5px; }
.lib-search { padding: 10px 14px; border-bottom: 1px solid var(--m-border-subtle); }
.lib-scope-tabs {
  display: flex; border-bottom: 1px solid var(--m-border-subtle);
}
.lib-scope-tabs button {
  flex: 1; background: transparent; border: none;
  color: var(--m-text-faint); font: 500 9.5px var(--m-font-mono);
  text-transform: uppercase; letter-spacing: .14em;
  padding: 6px 2px; cursor: pointer;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: all var(--m-dur-fast) var(--m-ease-out);
}
.lib-scope-tabs button:hover { color: var(--m-text); }
.lib-scope-tabs button.on { color: var(--m-green-500); border-bottom-color: var(--m-green-500); }
.scope-ct {
  font: 500 9px var(--m-font-mono); color: var(--m-text-ghost);
  padding: 0 4px; border: 1px solid var(--m-border-subtle); border-radius: 9999px;
}
.lib-scope-tabs button.on .scope-ct { color: var(--m-green-500); border-color: var(--m-border); }
.lib-list { overflow-y: auto; }
.lib-list::-webkit-scrollbar { width: 4px; }
.lib-list::-webkit-scrollbar-thumb { background: var(--m-border-subtle); border-radius: 2px; }
.lib-empty { padding: 18px 14px; text-align: center; font: 500 11px var(--m-font-mono); color: var(--m-text-faint); }
.lib-row {
  display: flex; gap: 10px; padding: 9px 12px;
  cursor: pointer; border-left: 2px solid transparent;
  border-bottom: 1px solid var(--m-border-subtle);
  transition: background var(--m-dur-fast) var(--m-ease-out);
}
.lib-row:hover { background: var(--m-fill-subtle); }
.lib-row.sel { background: var(--m-fill); border-left-color: var(--wc, var(--m-green-500)); }
.lib-pip {
  width: 6px; height: 6px; border-radius: 50%; flex: none; margin-top: 5px;
  background: var(--wc, var(--m-green-500));
  box-shadow: 0 0 5px var(--wc, var(--m-green-500));
}
.lib-row-body { flex: 1; min-width: 0; display: grid; gap: 3px; }
.lib-row-top { display: flex; align-items: baseline; gap: 7px; }
.lib-row-name { font: 600 12px var(--m-font-mono); color: var(--m-text-strong); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.lib-row-desc { font: 400 11px var(--m-font-sans); color: var(--m-text-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lib-row-foot { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.lib-meta { font: 500 9.5px var(--m-font-mono); color: var(--m-text-ghost); letter-spacing: .1em; }
.lib-tag {
  font: 500 9px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .1em;
  padding: 1px 5px; border: 1px solid var(--m-border-subtle); border-radius: 3px; background: var(--m-bg-deep);
}
.lib-last { margin-left: auto; font: 500 9.5px var(--m-font-mono); color: var(--m-text-ghost); }

/* ── Library collapsed rail ──────────────────────────── */
.wf-library.is-collapsed {
  grid-template-rows: auto 1fr auto;
}
.lib-rail {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding: 12px 0; overflow: hidden;
}
.lib-rail .vlabel {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .3em;
  color: var(--m-text-faint); margin-top: 8px; white-space: nowrap;
}
.lib-rail .rail-ct {
  font: 500 10px var(--m-font-mono); color: var(--m-green-500);
  border: 1px solid var(--m-border); border-radius: 9999px;
  padding: 1px 6px;
}

/* Source badges */
.src-badge {
  font: 600 8.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .14em;
  padding: 1px 5px; border-radius: 3px; border: 1px solid; white-space: nowrap; flex: none;
}
.src-bundled { color: var(--m-text-faint); border-color: var(--m-border-subtle); background: var(--m-bg-deep); }
.src-user    { color: #5ad3ff; border-color: rgba(90,211,255,.35); background: rgba(90,211,255,.08); }
.src-project { color: #b07cff; border-color: rgba(176,124,255,.35); background: rgba(176,124,255,.08); }

/* Node type badge */
.node-type-badge {
  font: 500 9px var(--m-font-mono); text-transform: uppercase; letter-spacing: .12em;
  padding: 1px 6px; border-radius: 3px; border: 1px solid;
  background: rgba(0,0,0,.3);
}

/* ── Editor ──────────────────────────────────────────── */
.wf-editor {
  grid-row: 2;
  display: grid; grid-template-rows: auto 1fr;
  overflow: hidden; background: var(--m-bg);
  border-right: 1px solid var(--m-border);
}
.wf-editor-empty { grid-template-rows: 1fr; }
.ed-topbar {
  border-bottom: 1px solid var(--m-border-subtle);
  background: var(--m-bg-deep);
}
.ed-crumbs {
  padding: 8px 20px 0;
  font: 500 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .18em;
  color: var(--m-text-faint);
  display: flex; align-items: center; gap: 10px;
}
.ed-crumbs .sep { color: var(--m-text-ghost); }
.ed-crumbs .cur { color: var(--m-green-500); }
.ed-tabs {
  display: flex; padding: 0 20px; gap: 0;
}
.ed-tabs button {
  background: transparent; border: none; color: var(--m-text-faint);
  font: 500 11px var(--m-font-mono); text-transform: uppercase; letter-spacing: .14em;
  padding: 9px 14px; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--m-dur-fast) var(--m-ease-out);
}
.ed-tabs button:hover { color: var(--m-text); }
.ed-tabs button.on { color: var(--m-green-500); border-bottom-color: var(--m-green-500); }
.ed-body { overflow-y: auto; }
.ed-body::-webkit-scrollbar { width: 6px; }
.ed-body::-webkit-scrollbar-thumb { background: var(--m-border); border-radius: 3px; }

/* empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; padding: 40px; text-align: center; gap: 12px;
}
.es-title { font: 600 13px var(--m-font-mono); color: var(--m-text-muted); text-transform: uppercase; letter-spacing: .1em; }
.es-sub { font: 400 12px var(--m-font-sans); color: var(--m-text-faint); max-width: 260px; }

/* ── Overview tab ────────────────────────────────────── */
.overview-tab { padding: 20px 24px; display: grid; gap: 16px; }
.ov-hero { display: flex; align-items: center; gap: 14px; }
.ov-icon {
  width: 44px; height: 44px; flex: none; border-radius: 8px;
  border: 1px solid var(--wc, var(--m-green-500));
  background: var(--m-bg-deep); color: var(--wc, var(--m-green-500));
  display: grid; place-items: center;
  font: 700 16px var(--m-font-mono);
  box-shadow: 0 0 14px color-mix(in srgb, var(--wc, var(--m-green-500)) 35%, transparent);
}
.ov-name { margin: 0; font: 600 20px var(--m-font-mono); color: var(--m-text-strong); text-shadow: var(--m-text-glow); letter-spacing: .03em; }
.ov-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.ov-cat { font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .18em; }
.ov-sep { color: var(--m-text-ghost); font-size: 10px; }
.ov-desc { font: 400 13px var(--m-font-sans); color: var(--m-text-muted); margin: 0; line-height: 1.6; }
.ov-stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
.ov-stat {
  background: var(--m-bg-deep); border: 1px solid var(--m-border-subtle); border-radius: 5px;
  padding: 10px 12px; display: flex; flex-direction: column; gap: 3px;
}
.ov-sv { font: 600 20px var(--m-font-mono); color: var(--m-text-strong); }
.ov-sv.ok { color: var(--m-green-500); text-shadow: var(--m-text-glow); }
.ov-sl { font: 500 9.5px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .18em; }
.ov-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.panel-card { background: var(--m-bg-deep); border: 1px solid var(--m-border); border-radius: var(--m-radius-md); overflow: hidden; }
.pc-head {
  padding: 8px 12px; border-bottom: 1px solid var(--m-border-subtle);
  display: flex; align-items: center; gap: 8px;
  font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em;
  color: var(--m-text-faint); background: var(--m-panel);
}
.pc-body { padding: 10px 12px; }
.input-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px; margin: 3px 0;
  border: 1px solid var(--m-border-subtle); border-radius: 4px; background: var(--m-bg);
}
.input-row.req { border-left: 2px solid var(--m-green-500); }
.ir-name { flex: 1; font: 500 11.5px var(--m-font-mono); color: var(--m-text); }
.ir-badge {
  font: 500 9px var(--m-font-mono); text-transform: uppercase; letter-spacing: .12em;
  padding: 1px 6px; border-radius: 3px;
  color: var(--m-text-faint); border: 1px solid var(--m-border-subtle); background: var(--m-bg-deep);
}
.ir-badge.req { color: var(--m-green-500); border-color: var(--m-border); }
.node-breakdown { display: grid; gap: 6px; }
.nb-row { display: flex; align-items: center; gap: 8px; font: 500 11.5px var(--m-font-mono); color: var(--m-text); }
.nb-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.nb-type { flex: 1; color: var(--m-text-muted); }
.nb-n { font: 600 13px var(--m-font-mono); color: var(--m-text-strong); }
.tag-list { display: flex; flex-wrap: wrap; gap: 5px; }
.tag-chip {
  font: 500 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .12em;
  padding: 3px 8px; border: 1px solid var(--m-border-subtle); border-radius: 4px;
  color: var(--m-text-muted); background: var(--m-bg);
}

/* ── DAG tab ─────────────────────────────────────────── */
.dag-canvas { padding: 20px 24px; overflow: auto; }
.dag-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 200px;
}
.dag-legend {
  display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px;
  font: 500 10px var(--m-font-mono); color: var(--m-text-faint);
  text-transform: uppercase; letter-spacing: .12em;
}
.dag-leg-item { display: flex; align-items: center; }
.dag-node rect { transition: filter 120ms; }
.dag-node:hover rect { filter: brightness(1.2); }

/* ── YAML tab ────────────────────────────────────────── */
.yaml-tab { display: grid; grid-template-rows: auto 1fr; height: 100%; }
.yaml-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-bottom: 1px solid var(--m-border-subtle);
  background: var(--m-bg-deep);
}
.yt-left { display: flex; align-items: center; gap: 10px; }
.yt-right { display: flex; gap: 5px; }
.bundled-lock {
  font: 500 11px var(--m-font-mono); color: var(--m-text-faint);
  padding: 3px 9px; border: 1px solid var(--m-border-subtle); border-radius: 4px;
  background: var(--m-bg);
}
.yaml-editor {
  display: grid; grid-template-columns: 40px 1fr;
  overflow: auto; background: var(--m-bg-deep);
}
.yaml-editor::-webkit-scrollbar { width: 6px; }
.yaml-editor::-webkit-scrollbar-thumb { background: var(--m-border); border-radius: 3px; }
.yaml-gutter {
  background: var(--m-panel); border-right: 1px solid var(--m-border-subtle);
  padding: 14px 0; user-select: none;
}
.yn {
  display: block; text-align: right; padding: 0 8px;
  font: 400 12px/1.75 var(--m-font-mono); color: var(--m-text-ghost);
}
.yaml-code {
  margin: 0; padding: 14px 16px;
  font: 400 12px/1.75 var(--m-font-mono);
  white-space: pre; overflow-x: auto;
  background: transparent;
  color: var(--m-text);
}
.yl { display: block; min-height: 1.75em; }

/* ── When-to-Use tab ─────────────────────────────────── */
.wtu-tab { padding: 20px 24px; display: grid; gap: 14px; }
.wtu-info {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border: 1px solid rgba(95,207,255,.3);
  border-left: 2px solid #5fcfff; border-radius: 4px;
  background: rgba(95,207,255,.04);
  font: 400 12px var(--m-font-sans); color: var(--m-text-muted); line-height: 1.55;
}
.wtu-info code { font-family: var(--m-font-mono); color: #5fcfff; font-size: 11px; }
.wtu-editor {
  width: 100%; box-sizing: border-box; min-height: 120px; resize: vertical;
  background: var(--m-bg); border: 1px solid var(--m-border);
  border-radius: 5px; color: var(--m-text);
  font: 400 13px/1.6 var(--m-font-sans); padding: 10px 12px; outline: none;
}
.wtu-editor:focus { border-color: var(--m-green-500); }

/* ── History tab ─────────────────────────────────────── */
.history-tab { padding: 0; }
.history-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--m-border-subtle);
}
.link-out {
  font: 500 11px var(--m-font-mono); color: var(--m-green-500);
  text-decoration: none; letter-spacing: .1em; text-transform: uppercase;
}
.link-out:hover { text-shadow: var(--m-text-glow); }
.hist-table {
  width: 100%; border-collapse: collapse;
  font: 400 12px var(--m-font-mono);
}
.hist-table thead th {
  position: sticky; top: 0; z-index: 1;
  background: var(--m-bg-deep); text-align: left;
  font: 600 9.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .2em;
  color: var(--m-text-faint); padding: 9px 14px;
  border-bottom: 1px solid var(--m-border);
}
.hist-table tbody td { padding: 9px 14px; border-bottom: 1px solid var(--m-border-subtle); vertical-align: middle; }
.hist-table tbody tr:hover { background: var(--m-fill-subtle); cursor: pointer; }
.run-id { font: 600 11px var(--m-font-mono); color: var(--m-text-strong); }
.run-who {
  font: 500 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .12em;
  padding: 2px 6px; border: 1px solid var(--m-border-subtle); border-radius: 3px;
  color: var(--m-text-muted); background: var(--m-bg-deep);
}

/* ── Actions panel ───────────────────────────────────── */
.wf-actions {
  grid-row: 2;
  background: var(--m-panel);
  border-left: 1px solid var(--m-border);
  overflow-y: auto; display: grid; align-content: start;
}
.wf-actions::-webkit-scrollbar { width: 4px; }
.wf-actions::-webkit-scrollbar-thumb { background: var(--m-border-subtle); }
.wf-actions-empty { place-items: start; }
.act-section { padding: 14px; }
.act-divider { border-top: 1px solid var(--m-border-subtle); }
.act-lbl { font: 600 9.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-text-faint); margin-bottom: 8px; }
.act-sub-note { font: 400 11px var(--m-font-sans); color: var(--m-text-ghost); margin-top: 7px; line-height: 1.45; }
.launch-btn {
  width: 100%; padding: 12px 16px;
  background: var(--wc, var(--m-green-500)); color: #021204;
  border: none; border-radius: 6px;
  font: 700 12px var(--m-font-mono); letter-spacing: .16em; text-transform: uppercase;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 0 18px color-mix(in srgb, var(--wc, var(--m-green-500)) 40%, transparent);
  transition: box-shadow var(--m-dur-fast) var(--m-ease-out);
}
.launch-btn:hover { box-shadow: 0 0 30px color-mix(in srgb, var(--wc, var(--m-green-500)) 60%, transparent); }
.full-w { width: 100%; justify-content: flex-start; margin-bottom: 5px; }
.live-panel {
  background: var(--m-bg-deep); border: 1px solid var(--m-border-subtle);
  border-radius: 5px; padding: 9px 10px;
}
.live-row { display: flex; align-items: center; gap: 8px; font: 500 11px var(--m-font-mono); color: var(--m-text-muted); }
.live-pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500);
  animation: pulse 1.6s ease-in-out infinite; flex: none;
}
@keyframes pulse { 50% { opacity: .25; } }
.live-text { font: 500 11px var(--m-font-mono); color: var(--m-text); }
.live-sub { font: 500 9.5px var(--m-font-mono); color: var(--m-text-ghost); letter-spacing: .1em; margin-top: 4px; }
.act-meta { padding-bottom: 20px; }
.meta-kv { display: grid; grid-template-columns: 72px 1fr; gap: 6px; padding: 4px 0; font: 500 10.5px var(--m-font-mono); align-items: baseline; }
.mk { color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .14em; font-size: 9.5px; }
.mv { color: var(--m-text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Shared buttons ──────────────────────────────────── */
.btn-mini {
  font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .14em;
  padding: 5px 10px; border: 1px solid var(--m-border); border-radius: 4px;
  color: var(--m-text); background: var(--m-bg-deep); cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all var(--m-dur-fast) var(--m-ease-out);
  white-space: nowrap;
}
.btn-mini:hover { color: var(--m-green-500); border-color: var(--m-green-500); box-shadow: var(--m-glow-sm); }
.btn-mini.prim { background: var(--m-green-500); color: #021204; border-color: var(--m-green-500); font-weight: 700; box-shadow: 0 0 10px rgba(0,255,65,.28); }
.btn-mini.prim:hover { box-shadow: 0 0 20px rgba(0,255,65,.5); }
.btn-mini.danger { color: #ff5fa2; border-color: rgba(255,95,162,.35); }
.btn-mini.danger:hover { background: rgba(255,95,162,.08); }
.ico-btn {
  display: inline-grid; place-items: center; width: 26px; height: 26px;
  border-radius: var(--m-radius-md); color: var(--m-text-muted);
  cursor: pointer; border: 1px solid transparent; background: transparent;
  transition: all var(--m-dur-fast) var(--m-ease-out);
}
.ico-btn:hover { background: var(--m-fill-subtle); color: var(--m-green-500); border-color: var(--m-border-subtle); }
.ico-btn svg { width: 14px; height: 14px; }

/* ── Search ──────────────────────────────────────────── */
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--m-text-faint); pointer-events: none; width: 13px; height: 13px; }
.search-inp {
  width: 100%; box-sizing: border-box;
  background: var(--m-bg); border: 1px solid var(--m-border-subtle);
  border-radius: var(--m-radius-md); color: var(--m-text);
  font: 500 12px var(--m-font-mono); padding: 7px 12px 7px 30px;
  outline: none; transition: border-color var(--m-dur-fast) var(--m-ease-out);
}
.search-inp:focus { border-color: var(--m-green-500); box-shadow: 0 0 0 2px rgba(0,255,65,.08); }
.search-inp::placeholder { color: var(--m-text-ghost); }

/* ── Wizard ──────────────────────────────────────────── */
.wizard-scrim {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(0,10,4,.8); backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
}
.wizard-modal {
  width: min(860px, 96vw); height: min(680px, 94vh);
  background: var(--m-panel);
  border: 1px solid var(--m-border); border-top: 2px solid var(--m-green-500);
  border-radius: 8px;
  box-shadow: 0 28px 80px rgba(0,0,0,.85), 0 0 40px rgba(0,255,65,.1);
  display: grid; grid-template-rows: auto auto 1fr auto; overflow: hidden;
  animation: wzIn var(--m-dur-base) var(--m-ease-out) both;
}
@keyframes wzIn { from { transform: translateY(14px); opacity: 0; } }
.wz-head {
  padding: 16px 22px 14px; border-bottom: 1px solid var(--m-border-subtle);
  display: flex; align-items: center; gap: 14px;
}
.wz-icon {
  width: 36px; height: 36px; flex: none;
  border: 1px solid var(--wc, var(--m-green-500)); border-radius: 6px;
  display: grid; place-items: center;
  background: rgba(0,255,65,.08); color: var(--wc, var(--m-green-500));
  box-shadow: 0 0 10px color-mix(in srgb, var(--wc, var(--m-green-500)) 40%, transparent);
}
.wz-head h2 { margin: 0; font: 600 16px var(--m-font-mono); color: var(--m-text-strong); letter-spacing: .04em; text-shadow: var(--m-text-glow); }
.wz-sub { margin-top: 2px; font: 500 11px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .14em; }
.wz-close {
  margin-left: auto; background: transparent; border: none; color: var(--m-text-muted);
  cursor: pointer; width: 28px; height: 28px; display: grid; place-items: center; border-radius: 4px;
}
.wz-close:hover { background: var(--m-fill-subtle); color: var(--m-text); }
.wz-steps {
  display: grid; grid-template-columns: repeat(4,1fr);
  padding: 14px 30px 10px; position: relative;
}
.wz-steps-line {
  position: absolute; top: 28px; left: calc(30px + 14px); right: calc(30px + 14px);
  height: 1px; background: var(--m-border-subtle); z-index: 0;
}
.wz-step { display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; z-index: 1; }
.wz-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--m-border-subtle); background: var(--m-bg-deep);
  display: grid; place-items: center;
  font: 600 11px var(--m-font-mono); color: var(--m-text-faint);
  transition: all var(--m-dur-fast) var(--m-ease-out);
}
.wz-step.done .wz-dot { background: rgba(0,255,65,.1); border-color: var(--m-green-500); color: var(--m-green-500); }
.wz-step.cur .wz-dot { background: var(--m-green-500); border-color: var(--m-green-500); color: #021204; font-weight: 700; box-shadow: 0 0 14px rgba(0,255,65,.5); }
.wz-lbl { font: 500 9.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .14em; color: var(--m-text-faint); }
.wz-step.cur .wz-lbl { color: var(--m-green-500); }
.wz-step.done .wz-lbl { color: var(--m-text-muted); }
.wz-body { overflow-y: auto; }
.wz-body::-webkit-scrollbar { width: 4px; }
.wz-body::-webkit-scrollbar-thumb { background: var(--m-border-subtle); }
.wz-foot {
  padding: 12px 22px; border-top: 1px solid var(--m-border-subtle);
  display: flex; align-items: center; gap: 8px; background: var(--m-panel);
}
.wz-foot-step { font: 500 10px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .14em; }
.wz-nav { margin-left: auto; display: flex; gap: 8px; }

/* step 1: plan */
.wz-plan { display: grid; grid-template-columns: 220px 1fr; height: 100%; }
.plan-summary {
  padding: 16px 14px; border-right: 1px solid var(--m-border-subtle);
  background: var(--m-bg-deep); display: grid; align-content: start; gap: 10px;
}
.ps-title { font: 600 14px var(--m-font-mono); color: var(--m-text-strong); }
.ps-meta { font: 500 10px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .12em; display: flex; align-items: center; gap: 6px; }
.ps-inputs { display: grid; gap: 5px; margin-top: 4px; }
.ps-inp { display: flex; align-items: center; justify-content: space-between; gap: 8px; font: 500 11px var(--m-font-mono); color: var(--m-text); padding: 5px 7px; border: 1px solid var(--m-border-subtle); border-radius: 4px; background: var(--m-bg); }
.ps-inp.req { border-left: 2px solid var(--m-green-500); }
.plan-chat { display: grid; grid-template-rows: 1fr auto; overflow: hidden; }
.chat-msgs { overflow-y: auto; padding: 14px 16px; display: grid; gap: 12px; align-content: start; }
.chat-msg { display: grid; gap: 4px; }
.chat-who { font: 600 9.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .18em; color: var(--m-text-faint); }
.chat-msg.assistant .chat-who { color: var(--m-green-500); }
.chat-text p { margin: 0; font: 400 13px var(--m-font-sans); color: var(--m-text-muted); line-height: 1.55; }
.chat-msg.assistant .chat-text p { color: var(--m-text); }
.chat-input-row { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--m-border-subtle); }
.chat-inp { flex: 1; background: var(--m-bg-deep); border: 1px solid var(--m-border); border-radius: 5px; color: var(--m-text); font: 500 13px var(--m-font-mono); padding: 8px 12px; outline: none; }
.chat-inp:focus { border-color: var(--m-green-500); }

/* step 2: route */
.wz-route { padding: 16px 20px; display: grid; gap: 14px; }
.route-note { font: 400 12px var(--m-font-sans); color: var(--m-text-faint); }
.route-dag { display: flex; flex-wrap: wrap; gap: 8px; }
.route-node {
  padding: 8px 10px; border: 1px solid var(--nc, var(--m-border));
  border-left: 3px solid var(--nc, var(--m-green-500));
  border-radius: 5px; background: var(--m-bg-deep);
  display: grid; gap: 6px; min-width: 130px;
}
.rn-head { display: flex; align-items: center; gap: 6px; }
.rn-name { font: 600 11.5px var(--m-font-mono); color: var(--m-text-strong); flex: 1; }
.rn-agent { display: flex; align-items: center; gap: 6px; font: 500 10px var(--m-font-mono); color: var(--m-text-muted); text-transform: uppercase; letter-spacing: .12em; }
.rn-av { width: 16px; height: 16px; border-radius: 50%; background: rgba(0,255,65,.1); border: 1px solid var(--m-green-500); color: var(--m-green-500); display: grid; place-items: center; font: 700 8px var(--m-font-mono); flex: none; }
.rn-aname { flex: 1; }
.rn-override { background: transparent; border: 1px solid var(--m-border-subtle); border-radius: 3px; color: var(--m-text-faint); font: 500 9px var(--m-font-mono); padding: 1px 4px; cursor: pointer; }
.rn-override:hover { color: var(--m-green-500); border-color: var(--m-border); }
.route-vars { margin-top: 4px; }
.var-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--m-border-subtle); font: 500 12px var(--m-font-mono); }
.var-k { color: var(--m-green-500); min-width: 180px; }
.var-v { color: #5fcfff; }

/* step 3: schedule */
.wz-schedule { padding: 16px 20px; display: grid; gap: 14px; }
.sched-options { display: grid; gap: 8px; }
.sched-opt {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px; border: 1px solid var(--m-border-subtle);
  border-radius: 6px; background: var(--m-bg-deep); cursor: pointer;
  transition: all var(--m-dur-fast) var(--m-ease-out);
}
.sched-opt:hover { border-color: var(--m-border); }
.sched-opt.sel { border-color: var(--m-green-500); background: rgba(0,255,65,.05); box-shadow: inset 2px 0 0 var(--m-green-500); }
.sched-opt input[type="radio"] { accent-color: var(--m-green-500); margin-top: 2px; flex: none; }
.so-label { font: 600 12px var(--m-font-mono); color: var(--m-text); }
.so-desc { font: 400 11px var(--m-font-sans); color: var(--m-text-faint); margin-top: 2px; }
.sched-dt, .sched-cron { display: grid; gap: 7px; }
.cron-preview { font: 500 11px var(--m-font-mono); color: var(--m-text-faint); padding: 6px 10px; border: 1px solid var(--m-border-subtle); border-radius: 4px; background: var(--m-bg); }
.sched-priority { display: flex; align-items: center; gap: 12px; }
.sched-priority label { font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .18em; color: var(--m-text-faint); }
.form-inp, .form-sel {
  background: var(--m-bg-deep); border: 1px solid var(--m-border); border-radius: 5px;
  color: var(--m-text); font: 500 13px var(--m-font-mono); padding: 8px 12px;
  outline: none; transition: border-color var(--m-dur-fast) var(--m-ease-out);
  box-sizing: border-box;
}
.form-inp:focus, .form-sel:focus { border-color: var(--m-green-500); }

/* step 4: confirm */
.wz-confirm { padding: 16px 20px; display: grid; gap: 14px; }
.confirm-card { border: 1px solid var(--m-border-subtle); border-radius: 6px; overflow: hidden; }
.cc-row { display: grid; grid-template-columns: 160px 1fr; padding: 9px 14px; border-bottom: 1px solid var(--m-border-subtle); gap: 12px; align-items: baseline; }
.cc-row:last-child { border-bottom: none; }
.cc-k { font: 600 9.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .18em; color: var(--m-text-faint); }
.cc-v { font: 500 12px var(--m-font-mono); color: var(--m-text); }
.confirm-note { font: 400 12px var(--m-font-sans); color: var(--m-text-faint); padding: 10px 14px; border: 1px solid var(--m-border-subtle); border-left: 2px solid var(--m-green-500); border-radius: 4px; background: rgba(0,255,65,.03); line-height: 1.55; }
.confirm-note b { color: var(--m-text-muted); font-weight: 600; }
</style>
</head>
