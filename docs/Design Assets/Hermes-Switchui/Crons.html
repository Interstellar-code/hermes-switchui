<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cron Jobs · Hermes</title>
<link rel="stylesheet" href="matrix-system.css"/>
<link rel="stylesheet" href="primary-nav-v2.css"/>
<style>
  html, body { height: 100%; }
  body { background: var(--m-bg); overflow: hidden; }
  .nav { background: transparent !important; border: none !important; padding: 0 !important; }

  .shell {
    display: grid;
    grid-template-columns: 232px 1fr;
    height: 100vh; overflow: hidden;
  }
  .nav { display: block; min-width: 0; }
  .main { display: grid; grid-template-rows: auto auto 1fr auto; min-width: 0; overflow: hidden; background: var(--m-bg); }

  /* Top bar */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 0 22px;
    height: 56px;
    border-bottom: 1px solid var(--m-border);
    background: var(--m-sidebar);
  }
  .topbar h1 {
    margin: 0;
    font: 600 13px var(--m-font-mono);
    text-transform: uppercase;
    letter-spacing: .26em;
    color: var(--m-text-strong);
    display: flex; align-items: center; gap: 12px;
  }
  .topbar h1 .crumb { color: var(--m-text-faint); font-weight: 500; }
  .topbar h1 .sep { color: var(--m-text-ghost); }
  .topbar h1 .cur { color: var(--m-green-500); text-shadow: 0 0 6px rgba(0,255,65,.4); }
  .topbar .stats {
    display: flex; align-items: center; gap: 22px;
    font: 500 11px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .18em;
  }
  .topbar .stats b { color: var(--m-text-strong); font-weight: 600; }
  .topbar .stats .ok { color: var(--m-green-500); }
  .topbar .stats .sep { width: 1px; height: 16px; background: var(--m-border-subtle); }

  /* Filter bar */
  .filterbar {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    border-bottom: 1px solid var(--m-border);
    background: var(--m-panel);
  }
  .search-input {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    background: var(--m-bg-deep);
    max-width: 420px;
  }
  .search-input input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--m-text); font: 500 12.5px var(--m-font-mono);
  }
  .search-input svg { width: 14px; height: 14px; color: var(--m-text-faint); }

  .tier-chips { display: flex; gap: 4px; }
  .chip {
    padding: 6px 12px;
    border: 1px solid var(--m-border);
    border-radius: 9999px;
    background: var(--m-bg-deep);
    font: 500 10.5px var(--m-font-mono);
    color: var(--m-text-muted);
    text-transform: uppercase; letter-spacing: .14em;
    cursor: pointer;
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .chip:hover { color: var(--m-text); border-color: var(--m-border-subtle); }
  .chip.on {
    background: var(--m-fill);
    color: var(--m-green-500);
    border-color: var(--m-green-500);
    box-shadow: var(--m-glow-sm);
  }

  .view-toggle { display: flex; border: 1px solid var(--m-border); border-radius: var(--m-radius-md); overflow: hidden; }
  .view-toggle button {
    display: inline-grid; place-items: center;
    width: 32px; height: 30px;
    background: var(--m-bg-deep);
    border: none;
    color: var(--m-text-faint);
    cursor: pointer;
    border-right: 1px solid var(--m-border);
  }
  .view-toggle button:last-child { border-right: none; }
  .view-toggle button:hover { color: var(--m-text); }
  .view-toggle button.on { background: var(--m-fill); color: var(--m-green-500); }
  .view-toggle svg { width: 14px; height: 14px; }

  /* Body */
  .body {
    overflow: auto;
    padding: 22px;
  }

  /* Card grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .card {
    position: relative;
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    background: var(--m-panel);
    padding: 16px;
    transition: all var(--m-dur-fast) var(--m-ease-out);
    cursor: pointer;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 12px;
    min-height: 200px;
  }
  .card:hover {
    border-color: var(--m-green-500);
    box-shadow: var(--m-glow-sm);
    transform: translateY(-1px);
  }
  .card.tier-1 { background: linear-gradient(180deg, rgba(0,255,65,.04) 0%, var(--m-panel) 60%); border-color: rgba(0,255,65,.3); }
  .card.tier-2 { background: linear-gradient(180deg, rgba(95,207,255,.04) 0%, var(--m-panel) 60%); border-color: rgba(95,207,255,.22); }

  .card-head { display: flex; align-items: center; gap: 12px; }
  .glyph {
    width: 40px; height: 40px;
    display: grid; place-items: center;
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    background: var(--m-bg-deep);
    font: 700 16px var(--m-font-mono);
    color: var(--m-green-500);
    text-shadow: 0 0 8px rgba(0,255,65,.4);
    flex: none;
  }
  .card.tier-1 .glyph { color: var(--m-green-500); border-color: var(--m-green-500); box-shadow: var(--m-glow-sm); }
  .card.tier-2 .glyph { color: #5fcfff; border-color: rgba(95,207,255,.5); text-shadow: 0 0 8px rgba(95,207,255,.4); }
  .card-name {
    font: 600 13px var(--m-font-mono);
    color: var(--m-text-strong);
    margin: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-role {
    font: 500 10.5px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .14em;
    margin-top: 2px;
  }
  .card-tier {
    margin-left: auto;
    font: 500 9px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .2em;
    padding: 2px 6px;
    border: 1px solid var(--m-border-subtle);
    border-radius: 3px;
  }
  .card.tier-1 .card-tier { color: var(--m-green-500); border-color: var(--m-green-500); }
  .card.tier-2 .card-tier { color: #5fcfff; border-color: rgba(95,207,255,.5); }

  .card-status {
    display: flex; align-items: center; gap: 6px;
    font: 500 10.5px var(--m-font-mono);
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .14em;
  }
  .card-status .d { width: 7px; height: 7px; border-radius: 50%; background: var(--m-text-faint); }
  .card-status.active { color: var(--m-green-500); }
  .card-status.active .d { background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); animation: pulse 2s infinite; }
  .card-status.idle .d { background: #888; }
  .card-status.draft { color: #ffb347; }
  .card-status.draft .d { background: #ffb347; box-shadow: 0 0 6px #ffb347; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .card-persona {
    font: 500 12px/1.5 var(--m-font-mono);
    color: var(--m-text-muted);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    padding-left: 8px;
    border-left: 2px solid var(--m-border);
  }
  .card-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
  }
  .card-meta .model {
    color: var(--m-green-500);
    border: 1px solid var(--m-border);
    background: var(--m-bg-deep);
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase; letter-spacing: .12em;
  }
  .card-meta .tag {
    padding: 2px 6px;
    border: 1px solid var(--m-border-subtle);
    border-radius: 3px;
    color: var(--m-text-muted);
  }
  .card-meta .last {
    margin-left: auto;
    color: var(--m-text-faint);
    text-transform: uppercase; letter-spacing: .14em;
  }

  /* Table view */
  .table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--m-panel);
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    overflow: hidden;
  }
  .table th {
    text-align: left;
    padding: 12px 14px;
    font: 600 10px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
    background: var(--m-bg-deep);
    border-bottom: 1px solid var(--m-border);
  }
  .table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--m-border-subtle);
    font: 500 12px var(--m-font-mono);
    color: var(--m-text);
    vertical-align: middle;
  }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--m-fill-subtle); cursor: pointer; }
  .table .name-cell { display: flex; align-items: center; gap: 10px; }
  .table .name-cell .glyph { width: 28px; height: 28px; font-size: 13px; }
  .table .name-cell b { color: var(--m-text-strong); font-weight: 600; }
  .table .name-cell .role { font-size: 10px; color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .14em; margin-top: 2px; }
  .table .model {
    color: var(--m-green-500);
    border: 1px solid var(--m-border);
    background: var(--m-bg-deep);
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase; letter-spacing: .12em;
    font-size: 10px;
  }
  .table .pill-tier {
    padding: 2px 8px;
    border-radius: 9999px;
    font-size: 9.5px;
    text-transform: uppercase; letter-spacing: .18em;
    border: 1px solid var(--m-border-subtle);
    color: var(--m-text-muted);
  }
  .table .pill-tier.t1 { color: var(--m-green-500); border-color: var(--m-green-500); }
  .table .pill-tier.t2 { color: #5fcfff; border-color: rgba(95,207,255,.5); }
  .table .pill-tier.t3 { color: var(--m-text-faint); }

  /* Footer */
  .footer {
    border-top: 1px solid var(--m-border);
    background: var(--m-sidebar);
    display: flex; align-items: center; gap: 22px;
    padding: 0 22px;
    height: 30px;
    font: 500 10px var(--m-font-mono);
    color: var(--m-text-faint);
    letter-spacing: .14em; text-transform: uppercase;
  }
  .footer b { color: var(--m-text-strong); font-weight: 600; }
  .footer .ok { color: var(--m-green-500); }
  .footer .sep { width: 1px; height: 14px; background: var(--m-border-subtle); }

  /* CTA new agent */
  .btn-new {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px;
    background: var(--m-green-500);
    color: var(--m-bg-deep);
    border: 1px solid var(--m-green-500);
    border-radius: var(--m-radius-md);
    font: 600 11.5px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .16em;
    cursor: pointer;
    box-shadow: var(--m-glow-sm);
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .btn-new:hover { background: var(--m-green-400, #5cff8a); box-shadow: var(--m-glow); }
  .btn-new svg { width: 12px; height: 12px; }

  /* Modal / wizard */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,8,2,.78);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    padding: 40px;
  }
  .modal-bg.open { display: flex; animation: fade var(--m-dur-base) var(--m-ease-out); }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .wizard {
    width: min(960px, 100%);
    max-height: 90vh;
    background: var(--m-panel);
    border: 1px solid var(--m-green-500);
    border-radius: var(--m-radius-lg, 8px);
    box-shadow: 0 16px 64px rgba(0,255,65,.18), 0 0 0 1px rgba(0,255,65,.3);
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    overflow: hidden;
    animation: pop var(--m-dur-base) var(--m-ease-out);
  }
  @keyframes pop { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .wiz-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px;
    border-bottom: 1px solid var(--m-border);
    background: var(--m-bg-deep);
  }
  .wiz-head h2 {
    margin: 0;
    font: 600 13px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .26em;
    color: var(--m-green-500);
  }
  .wiz-head .x {
    width: 28px; height: 28px;
    display: grid; place-items: center;
    border-radius: var(--m-radius-md);
    color: var(--m-text-faint);
    cursor: pointer;
    border: 1px solid transparent;
  }
  .wiz-head .x:hover { background: var(--m-fill); color: var(--m-text); border-color: var(--m-border); }
  .wiz-head .x svg { width: 14px; height: 14px; }

  .wiz-steps {
    display: flex; align-items: center;
    padding: 14px 22px;
    border-bottom: 1px solid var(--m-border);
    background: var(--m-panel);
    overflow-x: auto;
  }
  .wiz-step {
    display: flex; align-items: center; gap: 8px;
    font: 500 10.5px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .14em;
    color: var(--m-text-faint);
    white-space: nowrap;
    flex: none;
  }
  .wiz-step .n {
    width: 22px; height: 22px;
    display: grid; place-items: center;
    border-radius: 50%;
    border: 1px solid var(--m-border);
    background: var(--m-bg-deep);
    font: 600 10px var(--m-font-mono);
    color: var(--m-text-faint);
  }
  .wiz-step.done .n {
    background: var(--m-fill);
    color: var(--m-green-500);
    border-color: var(--m-green-500);
  }
  .wiz-step.on { color: var(--m-green-500); }
  .wiz-step.on .n {
    background: var(--m-green-500);
    color: var(--m-bg-deep);
    border-color: var(--m-green-500);
    box-shadow: var(--m-glow-sm);
  }
  .wiz-step-sep {
    flex: 1; min-width: 12px;
    height: 1px;
    background: var(--m-border);
    margin: 0 10px;
  }
  .wiz-step.done + .wiz-step-sep { background: rgba(0,255,65,.4); }

  .wiz-body {
    padding: 24px 28px;
    overflow: auto;
    color: var(--m-text);
  }
  .wiz-body h3 {
    margin: 0 0 6px;
    font: 600 18px var(--m-font-mono);
    color: var(--m-text-strong);
  }
  .wiz-body .lead {
    margin: 0 0 22px;
    font: 500 12.5px/1.6 var(--m-font-mono);
    color: var(--m-text-muted);
  }
  .field { margin-bottom: 18px; }
  .field > label {
    display: block;
    font: 600 10.5px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--m-text-faint);
    margin-bottom: 8px;
  }
  .field > label .opt { color: var(--m-text-ghost); font-weight: 500; margin-left: 6px; }
  .input, textarea, select {
    width: 100%;
    padding: 10px 12px;
    background: var(--m-bg-deep);
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    color: var(--m-text);
    font: 500 13px var(--m-font-mono);
    outline: none;
    transition: border-color var(--m-dur-fast) var(--m-ease-out);
  }
  .input:focus, textarea:focus, select:focus {
    border-color: var(--m-green-500);
    box-shadow: 0 0 0 2px rgba(0,255,65,.18);
  }
  textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  /* Glyph picker */
  .glyph-pick { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .glyph-opt {
    display: grid; place-items: center;
    aspect-ratio: 1;
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    background: var(--m-bg-deep);
    font: 700 16px var(--m-font-mono);
    color: var(--m-text-muted);
    cursor: pointer;
  }
  .glyph-opt:hover { color: var(--m-text); border-color: var(--m-border-subtle); }
  .glyph-opt.on { color: var(--m-green-500); border-color: var(--m-green-500); background: var(--m-fill); box-shadow: var(--m-glow-sm); }

  /* Persona gallery */
  .persona-cats { display: grid; grid-template-columns: 160px 1fr; gap: 16px; }
  .persona-cat-list { display: flex; flex-direction: column; gap: 2px; }
  .persona-cat {
    padding: 8px 10px;
    font: 500 11px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .16em;
    color: var(--m-text-muted);
    border-radius: var(--m-radius-md);
    cursor: pointer;
    border: 1px solid transparent;
    display: flex; align-items: center; gap: 8px;
  }
  .persona-cat:hover { background: var(--m-fill-subtle); color: var(--m-text); }
  .persona-cat.on {
    background: var(--m-fill);
    color: var(--m-green-500);
    border-color: var(--m-border);
    box-shadow: inset 2px 0 0 var(--m-green-500);
  }
  .persona-cat .ct {
    margin-left: auto;
    font-size: 9.5px;
    color: var(--m-text-faint);
  }
  .persona-cat.on .ct { color: var(--m-green-500); }

  .persona-list { display: flex; flex-direction: column; gap: 8px; max-height: 380px; overflow: auto; padding-right: 4px; }
  .persona-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px;
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    background: var(--m-bg-deep);
    cursor: pointer;
    transition: all var(--m-dur-fast) var(--m-ease-out);
  }
  .persona-row:hover { border-color: var(--m-border-subtle); }
  .persona-row.on {
    border-color: var(--m-green-500);
    background: var(--m-fill);
    box-shadow: var(--m-glow-sm);
  }
  .persona-row .glyph { width: 36px; height: 36px; font-size: 15px; }
  .persona-row .pname { font: 600 12.5px var(--m-font-mono); color: var(--m-text-strong); }
  .persona-row .pdesc { font: 500 11px var(--m-font-mono); color: var(--m-text-muted); margin-top: 3px; line-height: 1.5; }
  .persona-row .ptag { font: 500 9.5px var(--m-font-mono); color: var(--m-green-500); text-transform: uppercase; letter-spacing: .16em; }

  /* Skill chips */
  .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .skill {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    background: var(--m-bg-deep);
    cursor: pointer;
    font: 500 12px var(--m-font-mono);
    color: var(--m-text);
  }
  .skill:hover { border-color: var(--m-border-subtle); }
  .skill.on {
    border-color: var(--m-green-500);
    background: var(--m-fill);
    color: var(--m-green-500);
    box-shadow: var(--m-glow-sm);
  }
  .skill .chk {
    width: 14px; height: 14px;
    border: 1px solid var(--m-border);
    border-radius: 3px;
    display: grid; place-items: center;
    flex: none;
  }
  .skill.on .chk { background: var(--m-green-500); border-color: var(--m-green-500); }
  .skill.on .chk::after { content: ""; width: 4px; height: 7px; border: 1px solid var(--m-bg-deep); border-top: 0; border-left: 0; transform: rotate(45deg) translate(-1px,-1px); }

  /* Slider */
  .slider-row {
    display: grid;
    grid-template-columns: 1fr 80px;
    gap: 14px;
    align-items: center;
  }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px;
    background: var(--m-border);
    border-radius: 9999px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px;
    background: var(--m-green-500);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: var(--m-glow-sm);
  }
  .slider-val {
    text-align: right;
    font: 600 13px var(--m-font-mono);
    color: var(--m-green-500);
  }

  /* Review pane */
  .review-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .review-block {
    border: 1px solid var(--m-border);
    border-radius: var(--m-radius-md);
    background: var(--m-bg-deep);
    padding: 14px 16px;
  }
  .review-block h4 {
    margin: 0 0 10px;
    font: 600 10.5px var(--m-font-mono);
    text-transform: uppercase; letter-spacing: .22em;

            <td style={{ color:'var(--m-text-muted)' }}>{humanizeCron(j.cron)}</td>
            <td>{j.nextRunIn}</td>
            <td style={{ color:'var(--m-text-muted)' }}>{j.lastRunAgo}</td>
            <td style={{ fontVariantNumeric:'tabular-nums' }}>{j.totalRuns.toLocaleString()}</td>
            <td><StatusPill s={j.status}/></td>
            <td>
              <button className="btn" style={{ padding:'4px 10px', fontSize:10 }} onClick={e => { e.stopPropagation(); onToggle(j.id); }}>{j.status === 'paused' ? 'Resume' : 'Pause'}</button>
            </td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function Wizard({ open, onClose, onCreate }) {
  const [step, setStep] = React.useState(0);
  const [draft, setDraft] = React.useState({
    name:'', glyph:'◇', tags:'', agent:'operator',
    cron:'*/15 * * * *', tz:'UTC', preset:'15m',
    prompt:'', status:'active',
  });
  React.useEffect(() => { if (!open) { setStep(0); setDraft(d => ({ ...d, name:'', prompt:'', tags:'' })); } }, [open]);
  if (!open) return null;
  const set = (k,v) => setDraft(d => ({ ...d, [k]:v }));
  const valid = step === 0 ? draft.name.trim().length > 1
              : step === 1 ? draft.cron.trim().length > 0
              : step === 2 ? !!draft.agent
              : step === 3 ? draft.prompt.trim().length > 5
              : true;

  return (
    <div className="modal-bg open" onClick={onClose}>
      <div className="wizard" onClick={e => e.stopPropagation()}>
        <div className="wiz-head">
          <h2>New cron job</h2>
          <div className="x" onClick={onClose}>{Ico.x}</div>
        </div>
        <div className="wiz-steps">
          {WIZ_STEPS.map((s,i) => (
            <React.Fragment key={s}>
              <div className={`wiz-step ${i===step?'on':i<step?'done':''}`} onClick={() => i<=step && setStep(i)}>
                <span className="n">{i+1}</span>{s}
              </div>
              {i < WIZ_STEPS.length-1 && <div className="wiz-step-sep"/>}
            </React.Fragment>
          ))}
        </div>
        <div className="wiz-body">
          {step === 0 && (<>
            <h3>Identity</h3>
            <p className="lead">Give the job a short, machine-friendly name. Pick a glyph for the list view.</p>
            <div className="field">
              <label>Job name</label>
              <input className="input" placeholder="e.g. nightly-backup" value={draft.name} onChange={e => set('name', e.target.value.replace(/[^a-z0-9-_]/gi,'-').toLowerCase())}/>
            </div>
            <div className="field">
              <label>Glyph</label>
              <div className="glyph-pick">
                {['◇','◆','◈','◉','▲','▼','★','✦','Λ','Δ','Σ','Ω','Ψ','Φ','Ξ','Θ'].map(g => (
                  <div key={g} className={`glyph-opt ${draft.glyph===g?'on':''}`} onClick={() => set('glyph', g)}>{g}</div>
                ))}
              </div>
            </div>
            <div className="field">
              <label>Status on create</label>
              <div style={{ display:'flex', gap:8 }}>
                {['active','paused','draft'].map(s => (
                  <div key={s} className={`chip ${draft.status===s?'on':''}`} onClick={() => set('status', s)}>{s}</div>
                ))}
              </div>
            </div>
          </>)}
          {step === 1 && (<>
            <h3>Schedule</h3>
            <p className="lead">Pick a preset or write a raw cron expression. UTC unless overridden.</p>
            <div className="field">
              <label>Presets</label>
              <div className="persona-list" style={{ maxHeight: 220 }}>
                {CRON_PRESETS.map(p => (
                  <div key={p.id} className={`persona-row ${draft.preset===p.id?'on':''}`} onClick={() => { set('preset', p.id); set('cron', p.expr); }}>
                    <span className="glyph">{Ico.clock}</span>
                    <div><div className="pname">{p.label}</div><div className="pdesc">{p.desc}</div></div>
                    <span className="ptag" style={{ fontFamily:'var(--m-font-mono)', color:'var(--m-green-500)' }}>{p.expr}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="grid-2">
              <div className="field" style={{ margin:0 }}>
                <label>Cron expression</label>
                <input className="input" value={draft.cron} onChange={e => { set('cron', e.target.value); set('preset','custom'); }}/>
              </div>
              <div className="field" style={{ margin:0 }}>
                <label>Timezone</label>
                <select className="input" value={draft.tz} onChange={e => set('tz', e.target.value)}>
                  {['UTC','America/New_York','America/Los_Angeles','Europe/Berlin','Asia/Tokyo','Asia/Kolkata'].map(t => <option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
          </>)}
          {step === 2 && (<>
            <h3>Run as agent</h3>
            <p className="lead">Pick which Hermes agent will execute this job each tick.</p>
            <div className="persona-list">
              {AGENT_OPTIONS.map(a => (
                <div key={a.id} className={`persona-row ${draft.agent===a.id?'on':''}`} onClick={() => set('agent', a.id)}>
                  <div className="glyph" style={{ color: a.tier===1?'var(--m-green-500)': a.tier===2?'#5fcfff':'var(--m-text-muted)' }}>{a.glyph}</div>
                  <div>
                    <div className="pname">{a.name}</div>
                    <div className="pdesc">Tier {a.tier} {a.tier===1?'orchestrator': a.tier===2?'sub-agent':'specialist persona'}</div>
                  </div>
                  <span className="ptag">T{a.tier}</span>
                </div>
              ))}
            </div>
          </>)}
          {step === 3 && (<>
            <h3>Prompt</h3>
            <p className="lead">What should the agent do each time the cron fires? Write it like a prompt — first principles, no template required.</p>
            <div className="field">
              <textarea placeholder="e.g. Scan production logs for error spikes. Page on-call if ERROR rate exceeds 50/min for 3 consecutive windows..." value={draft.prompt} onChange={e => set('prompt', e.target.value)}/>
            </div>
          </>)}
          {step === 4 && (<>
            <h3>Tags</h3>
            <p className="lead">Comma-separated tags for filtering and grouping. Optional.</p>
            <div className="field">
              <input className="input" placeholder="e.g. observability, alerts, infra" value={draft.tags} onChange={e => set('tags', e.target.value)}/>
            </div>
          </>)}
          {step === 5 && (<>
            <h3>Review</h3>
            <p className="lead">Confirm and create. You can edit anything after.</p>
            <div className="review-grid">
              <div className="review-block">
                <h4>Identity</h4>
                <div className="review-row"><span className="k">Name</span><span className="v">{draft.name || '—'}</span></div>
                <div className="review-row"><span className="k">Glyph</span><span className="v">{draft.glyph}</span></div>
                <div className="review-row"><span className="k">Status</span><span className="v">{draft.status}</span></div>
                <div className="review-row"><span className="k">Tags</span><span className="v muted">{draft.tags || '—'}</span></div>
              </div>
              <div className="review-block">
                <h4>Schedule</h4>
                <div className="review-row"><span className="k">Cron</span><span className="v" style={{ color:'var(--m-green-500)', fontWeight:700 }}>{draft.cron}</span></div>
                <div className="review-row"><span className="k">Human</span><span className="v muted">{humanizeCron(draft.cron)}</span></div>
                <div className="review-row"><span className="k">Timezone</span><span className="v">{draft.tz}</span></div>
                <div className="review-row"><span className="k">Agent</span><span className="v">{draft.agent}</span></div>
              </div>
            </div>
            <div className="review-block" style={{ marginTop: 14 }}>
              <h4>Prompt</h4>
              <div className="review-prompt">{draft.prompt || '(empty)'}</div>
            </div>
          </>)}
        </div>
        <div className="wiz-foot">
          <div className="lhs">Step <b>{step+1}</b> / {WIZ_STEPS.length}</div>
          <div className="actions">
            <button className="btn" onClick={onClose}>Cancel</button>
            <button className="btn" disabled={step===0} onClick={() => setStep(s => Math.max(0, s-1))}>Back</button>
            {step < WIZ_STEPS.length - 1 ? (
              <button className="btn btn-primary" disabled={!valid} onClick={() => setStep(s => s+1)}>Next</button>
            ) : (
              <button className="btn btn-primary" disabled={!valid} onClick={() => {
                const ag = AGENT_OPTIONS.find(a => a.id === draft.agent) || AGENT_OPTIONS[0];
                onCreate({
                  id: 'j-' + Math.random().toString(36).slice(2,7),
                  name: draft.name,
                  agent: ag.name,
                  glyph: draft.glyph,
                  cron: draft.cron,
                  tz: draft.tz,
                  status: draft.status,
                  nextRunIn: draft.status === 'active' ? 'queued' : '(paused)',
                  lastRunAgo: 'never',
                  totalRuns: 0,
                  tags: draft.tags.split(',').map(t => t.trim()).filter(Boolean),
                  prompt: draft.prompt,
                });
              }}>Create cron job</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function Pager({ page, pageCount, pageSize, setPage, setPageSize, start, end, total }) {
  if (pageCount <= 1 && total <= pageSize) return null;
  const nums = [];
  for (let i = 1; i <= pageCount; i++) {
    if (i === 1 || i === pageCount || Math.abs(i - page) <= 1) nums.push(i);
    else if (nums[nums.length-1] !== '…') nums.push('…');
  }
  return (
    <div className="pager">
      <div className="pager-info">Showing <b>{start}</b>–<b>{end}</b> of <b>{total}</b></div>
      <div className="pager-ctrls">
        <button className="pg-btn" disabled={page===1} onClick={() => setPage(1)}>«</button>
        <button className="pg-btn" disabled={page===1} onClick={() => setPage(p => Math.max(1,p-1))}>‹</button>
        {nums.map((n,i) => n === '…' ? <span key={i} className="pg-gap">…</span> :
          <button key={i} className={`pg-num ${n===page?'on':''}`} onClick={() => setPage(n)}>{n}</button>
        )}
        <button className="pg-btn" disabled={page===pageCount} onClick={() => setPage(p => Math.min(pageCount,p+1))}>›</button>
        <button className="pg-btn" disabled={page===pageCount} onClick={() => setPage(pageCount)}>»</button>
      </div>
      <div className="pager-size">Rows
        <select value={pageSize} onChange={e => setPageSize(Number(e.target.value))}>
          {[8,12,16,24,48].map(n => <option key={n} value={n}>{n}</option>)}
        </select>
      </div>
    </div>
  );
}

function App() {
  const [jobs, setJobs]     = React.useState(SEED_JOBS);
  const [filter, setFilter] = React.useState('all');
  const [query, setQuery]   = React.useState('');
  const [view, setView]     = React.useState('grid');
  const [wizOpen, setWizOpen] = React.useState(false);
  const [page, setPage]     = React.useState(1);
  const [pageSize, setPageSize] = React.useState(8);

  const filtered = jobs.filter(j => {
    if (filter !== 'all' && j.status !== filter) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!j.name.toLowerCase().includes(q) && !j.agent.toLowerCase().includes(q) && !j.tags.join(' ').toLowerCase().includes(q) && !j.cron.includes(q)) return false;
    }
    return true;
  });

  React.useEffect(() => { setPage(1); }, [filter, query, view, pageSize]);

  const pageCount = Math.max(1, Math.ceil(filtered.length / pageSize));
  const start = filtered.length ? (page - 1) * pageSize + 1 : 0;
  const end   = Math.min(filtered.length, page * pageSize);
  const paged = filtered.slice((page-1)*pageSize, page*pageSize);

  const counts = {
    all: jobs.length,
    active: jobs.filter(j => j.status==='active').length,
    paused: jobs.filter(j => j.status==='paused').length,
    draft:  jobs.filter(j => j.status==='draft').length,
  };

  const toggleJob = (id) => setJobs(prev => prev.map(j => j.id === id ? { ...j, status: j.status === 'active' ? 'paused' : 'active' } : j));
  const runJob = (id) => setJobs(prev => prev.map(j => j.id === id ? { ...j, lastRunAgo:'just now', totalRuns: j.totalRuns + 1 } : j));

  return (
    <div className="shell">
      <nav className="nav"><PrimaryNavV2 active="jobs" sessionsBadge={9} /></nav>
      <main className="main">
        <div className="topbar">
          <h1>
            <span className="crumb">Hermes</span>
            <span className="sep">/</span>
            <span className="cur">Cron Jobs</span>
          </h1>
          <div className="stats">
            <span><b>{counts.all}</b> routines</span>
            <span className="sep"/>
            <span className="ok"><b>{counts.active}</b> active</span>
            <span className="sep"/>
            <span><b>{counts.paused}</b> paused</span>
            <span className="sep"/>
            <span>last sync <b>12s</b> ago</span>
          </div>
        </div>

        <div className="filterbar">
          <div className="search-input">
            {Ico.search}
            <input placeholder="filter routines, agents, tags, cron…" value={query} onChange={e => setQuery(e.target.value)}/>
          </div>
          <div className="tier-chips">
            {STATUS_FILTERS.map(s => (
              <div key={s.id} className={`chip ${filter===s.id?'on':''}`} onClick={() => setFilter(s.id)}>
                {s.label} <span style={{ opacity:.6, marginLeft:4 }}>{counts[s.id]}</span>
              </div>
            ))}
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <div className="view-toggle">
              <button className={view==='grid'?'on':''} onClick={() => setView('grid')} title="Grid">{Ico.grid}</button>
              <button className={view==='table'?'on':''} onClick={() => setView('table')} title="Table">{Ico.list}</button>
            </div>
            <button className="btn-new" onClick={() => setWizOpen(true)}>{Ico.plus}New cron job</button>
          </div>
        </div>

        <div className="body">
          {filtered.length === 0 ? (
            <div className="empty">No jobs match — clear filter or try a different query.</div>
          ) : view === 'grid' ? (
            <div className="grid">
              {paged.map(j => <JobCard key={j.id} j={j} onClick={() => {}} onToggle={toggleJob} onRun={runJob}/>)}
            </div>
          ) : (
            <JobTable jobs={paged} onRowClick={() => {}} onToggle={toggleJob}/>
          )}
          <Pager page={page} pageCount={pageCount} pageSize={pageSize} setPage={setPage} setPageSize={setPageSize} start={start} end={end} total={filtered.length}/>
        </div>

        <footer className="footer">
          <span><b>{counts.all}</b> routines</span><span className="sep"/>
          <span className="ok"><b>{counts.active}</b> active</span><span className="sep"/>
          <span><b>{counts.paused}</b> paused</span><span className="sep"/>
          <span>uptime <b>14d 4h</b></span>
          <span style={{ marginLeft:'auto' }}>UTC <b>{new Date().toUTCString().slice(17,25)}</b></span>
        </footer>

        <Wizard open={wizOpen} onClose={() => setWizOpen(false)} onCreate={(j) => { setJobs(p => [j, ...p]); setWizOpen(false); }}/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
