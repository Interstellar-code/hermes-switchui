<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix3D Office · Hermes</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── MATRIX DESIGN TOKENS ─────────────────────────────── */
:root {
  --m-bg:           #020804;
  --m-bg-deep:      #010402;
  --m-sidebar:      #030d06;
  --m-panel:        #041008;
  --m-card:         #07130a;
  --m-card-2:       #0a1c0f;
  --m-card-3:       #0e2614;
  --m-green-500:    #00ff41;
  --m-green-300:    #7cff9b;
  --m-text:         #d8ffe3;
  --m-text-strong:  #eaffef;
  --m-text-muted:   rgba(216,255,227,.58);
  --m-text-faint:   rgba(216,255,227,.34);
  --m-text-ghost:   rgba(216,255,227,.18);
  --m-border:       rgba(0,255,65,.28);
  --m-border-sub:   rgba(0,255,65,.13);
  --m-border-faint: rgba(0,255,65,.06);
  --m-border-strong:rgba(0,255,65,.50);
  --m-fill-sub:     rgba(0,255,65,.06);
  --m-fill:         rgba(0,255,65,.11);
  --m-fill-strong:  rgba(0,255,65,.20);
  --m-info:         #5fcfff;
  --m-warning:      #d6ff5f;
  --m-danger:       #ff5f6d;
  --m-pink:         #ff5fa2;
  --m-purple:       #a78bfa;
  --m-amber:        #d6ff5f;
  --m-font-mono:    'JetBrains Mono', ui-monospace, monospace;
  --m-font-sans:    'Inter', ui-sans-serif, sans-serif;
  --m-glow-sm:      0 0 8px  rgba(0,255,65,.35);
  --m-glow-md:      0 0 16px rgba(0,255,65,.45);
  --m-text-glow:    0 0 8px  rgba(0,255,65,.6);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--m-bg); color: var(--m-text); font-family: var(--m-font-sans); -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh; }

/* ── SHELL ─────────────────────────────────────────────── */
.shell { display: grid; grid-template-columns: 196px 1fr; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ──────────────────────────────────────────── */
.sb { display: flex; flex-direction: column; background: var(--m-sidebar); border-right: 1px solid var(--m-border-sub); height: 100vh; overflow: hidden; }
.sb-hdr { display: flex; align-items: center; justify-content: space-between; padding: 11px 12px 8px; border-bottom: 1px solid var(--m-border-faint); flex-shrink: 0; }
.sb-brand { display: flex; align-items: center; gap: 8px; }
.sb-logo { width: 26px; height: 26px; border: 1px solid var(--m-border-sub); border-radius: 5px; display: grid; place-items: center; background: var(--m-fill-sub); color: var(--m-green-500); font: 700 11px var(--m-font-mono); text-shadow: var(--m-text-glow); }
.sb-info { display: flex; flex-direction: column; }
.sb-name { font: 700 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .2em; color: var(--m-text-strong); line-height: 1.1; }
.sb-ver  { font: 400 9px var(--m-font-mono); color: var(--m-text-ghost); }
.sb-chevron { width: 20px; height: 20px; border: 1px solid var(--m-border-faint); border-radius: 4px; display: grid; place-items: center; color: var(--m-text-ghost); cursor: pointer; background: transparent; font-size: 11px; }
.sb-search { margin: 6px 10px; display: flex; align-items: center; gap: 6px; background: var(--m-card); border: 1px solid var(--m-border-faint); border-radius: 5px; padding: 5px 8px; }
.sb-search input { background: transparent; border: none; outline: none; font: 400 11px var(--m-font-mono); color: var(--m-text); flex: 1; min-width: 0; }
.sb-search input::placeholder { color: var(--m-text-ghost); }
.sb-search-ico { font-size: 12px; color: var(--m-text-ghost); }
.sb-search-cmd { font: 500 8.5px var(--m-font-mono); color: var(--m-text-ghost); border: 1px solid var(--m-border-faint); border-radius: 3px; padding: 1px 4px; }
.sb-new { margin: 2px 10px 6px; display: flex; align-items: center; gap: 5px; padding: 6px 10px; background: var(--m-fill); border: 1px solid var(--m-border-sub); border-radius: 5px; color: var(--m-green-500); font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .1em; cursor: pointer; transition: background .12s, box-shadow .12s; }
.sb-new:hover { background: var(--m-fill-strong); box-shadow: var(--m-glow-sm); }
.sb-nav { flex: 1; overflow-y: auto; padding: 0 0 6px; scrollbar-width: none; }
.sb-nav::-webkit-scrollbar { display: none; }
.sb-section { padding: 9px 12px 3px; font: 600 8px var(--m-font-mono); text-transform: uppercase; letter-spacing: .28em; color: var(--m-text-ghost); }
.sb-item { display: flex; align-items: center; gap: 8px; padding: 5px 12px; cursor: pointer; border-left: 2px solid transparent; transition: background .1s, color .1s; }
.sb-item:hover { background: var(--m-fill-sub); color: var(--m-text-strong); }
.sb-item.active { color: var(--m-green-500); background: var(--m-fill); border-left-color: var(--m-green-500); }
.sb-item-ico { font-size: 13px; opacity: .75; flex-shrink: 0; width: 16px; }
.sb-item-lbl { font: 500 11.5px var(--m-font-mono); color: inherit; }
.sb-footer { border-top: 1px solid var(--m-border-faint); padding: 6px 10px; display: flex; flex-wrap: wrap; gap: 8px; flex-shrink: 0; }
.sb-stat { font: 500 9px var(--m-font-mono); color: var(--m-text-ghost); white-space: nowrap; }
.sb-stat b { font-weight: 600; }

/* ── MAIN ─────────────────────────────────────────────── */
.main { display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

/* ── CANVAS ZONE ─────────────────────────────────────── */
.canvas-zone { flex: 0 0 auto; height: calc((100vh - 20px) * 0.46); min-height: 250px; margin: 10px 14px 0; border-radius: 22px; overflow: hidden; position: relative; border: 1px solid rgba(0,255,65,.15); background: #020617; }
.canvas-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,255,65,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,65,.03) 1px, transparent 1px); background-size: 44px 44px; }
.canvas-glow { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 35%, rgba(0,255,65,.04) 0%, transparent 70%); }
.canvas-title-bar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 14px; padding: 11px 20px; z-index: 2; }
.canvas-title { font: 500 10.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .38em; color: var(--m-warning); text-shadow: 0 0 14px rgba(214,255,95,.5); white-space: nowrap; }
.canvas-title-line { flex: 1; max-width: 100px; height: 1px; background: linear-gradient(90deg, transparent, var(--m-border-sub)); }
.canvas-title-line.r { background: linear-gradient(270deg, transparent, var(--m-border-sub)); }
.canvas-bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; display: flex; align-items: center; gap: 7px; padding: 8px 16px; font: 500 10px var(--m-font-mono); color: var(--m-text-ghost); background: linear-gradient(0deg, rgba(2,6,23,.95) 0%, transparent 100%); z-index: 2; }
.canvas-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); }
.canvas-sep { opacity: .25; margin: 0 2px; }
.canvas-ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.canvas-ph-ico { opacity: .1; }

/* ── BOTTOM ZONE ──────────────────────────────────────── */
.bottom-zone { flex: 1; min-height: 0; margin: 8px 14px 10px; border-radius: 14px; border: 1px solid var(--m-border-sub); background: var(--m-card); display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* ── ROSTER ──────────────────────────────────────────── */
.roster { flex: 0 0 auto; }
.roster-bar { display: flex; align-items: center; gap: 8px; padding: 6px 14px 4px; border-bottom: 1px solid var(--m-border-faint); }
.roster-pulse { width: 5px; height: 5px; border-radius: 50%; background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); animation: m-pulse 2s ease-in-out infinite; }
.roster-lbl { font: 600 9px var(--m-font-mono); text-transform: uppercase; letter-spacing: .26em; color: var(--m-text-faint); }
.roster-summary { font: 400 9.5px var(--m-font-mono); color: var(--m-text-ghost); }
.roster-rail { display: flex; gap: 8px; padding: 7px 14px 9px; overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--m-border-faint) transparent; }
.roster-rail::-webkit-scrollbar { height: 3px; }
.roster-rail::-webkit-scrollbar-thumb { background: var(--m-border-faint); border-radius: 2px; }

/* ── AGENT CARD ──────────────────────────────────────── */
.acard { flex: 0 0 116px; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 6px 8px; border-radius: 10px; border: 1px solid var(--m-border-faint); background: var(--m-card-2); cursor: pointer; position: relative; transition: border-color .15s, box-shadow .15s, background .15s; user-select: none; }
.acard:hover { background: var(--m-card-3); border-color: var(--m-border-sub); }
.acard.sel { background: var(--m-card-3); }
.acard-t1 { position: absolute; top: 5px; right: 7px; font: 700 7.5px var(--m-font-mono); letter-spacing: .1em; opacity: .7; }
.acard-bubble { max-width: 104px; background: rgba(7,19,10,.92); border: 1px solid; border-radius: 7px 7px 7px 2px; padding: 3px 7px; font: 400 8.5px var(--m-font-mono); line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; text-align: left; }
.acard-sprite { width: 44px; height: 52px; display: flex; align-items: flex-end; justify-content: center; }
.acard-name { font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .1em; margin-top: 3px; text-align: center; }
.acard-role { font: 400 8.5px var(--m-font-mono); color: var(--m-text-ghost); text-transform: uppercase; letter-spacing: .1em; }
.acard-status { display: flex; align-items: center; gap: 4px; margin-top: 1px; }
.acard-sdot { width: 5px; height: 5px; border-radius: 50%; }
.acard-slbl { font: 400 8.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .12em; }

/* ── SPRITE ANIMATIONS ───────────────────────────────── */
@keyframes m-pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(1.2)} }
@keyframes sp-idle  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes sp-work  { 0%,100%{transform:translateY(0) rotate(0deg)} 30%{transform:translateY(-5px) rotate(-2deg)} 70%{transform:translateY(-3px) rotate(1.5deg)} }
@keyframes sp-err   { 0%,100%{filter:none} 50%{filter:hue-rotate(150deg) brightness(1.4)} }
@keyframes sp-glow  { 0%,100%{opacity:.6} 50%{opacity:1} }

.sp-idle { animation: sp-idle 3s ease-in-out infinite; }
.sp-working { animation: sp-work .85s ease-in-out infinite; }
.sp-error { animation: sp-err 1.1s ease-in-out infinite; }

/* ── CONSOLE ──────────────────────────────────────────── */
.console { flex: 1; min-height: 0; display: flex; flex-direction: column; border-top: 1px solid var(--m-border-faint); position: relative; overflow: hidden; }
.c-rain { position: absolute; inset: 0; pointer-events: none; opacity: .45; }
.c-head { flex: 0 0 auto; display: flex; align-items: center; gap: 5px; padding: 5px 14px; border-bottom: 1px solid var(--m-border-faint); background: linear-gradient(180deg, rgba(4,16,8,.9) 0%, transparent 100%); position: relative; z-index: 2; }
.c-head-lbl { font: 600 9px var(--m-font-mono); text-transform: uppercase; letter-spacing: .26em; color: var(--m-text-ghost); margin-right: 4px; }
.c-tab { font: 500 8.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .12em; padding: 2px 7px; border-radius: 999px; border: 1px solid transparent; color: var(--m-text-ghost); cursor: pointer; transition: all .1s; background: transparent; }
.c-tab:hover { color: var(--m-text-muted); border-color: var(--m-border-faint); }
.c-tab.on { color: var(--m-green-500); border-color: var(--m-border-sub); background: var(--m-fill-sub); }
.c-live { display: flex; align-items: center; gap: 4px; margin-left: auto; font: 500 8.5px var(--m-font-mono); color: var(--m-green-500); text-transform: uppercase; letter-spacing: .16em; }
.c-live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--m-green-500); animation: m-pulse 1.6s ease-in-out infinite; }
.c-body { flex: 1; overflow-y: auto; position: relative; z-index: 1; scrollbar-width: thin; scrollbar-color: rgba(0,255,65,.12) transparent; }
.c-body::-webkit-scrollbar { width: 4px; }
.c-body::-webkit-scrollbar-thumb { background: rgba(0,255,65,.12); border-radius: 2px; }
.c-row { display: grid; grid-template-columns: 56px 72px 46px 1fr auto; gap: 0 9px; align-items: baseline; padding: 2px 14px; font: 400 10px var(--m-font-mono); line-height: 1.65; transition: background .08s; }
.c-row:hover { background: rgba(0,255,65,.04); }
.c-ts { color: var(--m-text-ghost); white-space: nowrap; font-size: 9.5px; }
.c-who { font-weight: 600; white-space: nowrap; font-size: 10px; }
.c-type { font: 600 8.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .1em; padding: 1px 5px; border-radius: 3px; white-space: nowrap; align-self: center; }
.c-msg  { color: var(--m-text-muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10.5px; }
.c-dur  { color: var(--m-text-ghost); font-size: 9px; white-space: nowrap; }
.c-type.sys     { color: var(--m-text-faint);  background: rgba(216,255,227,.04); }
.c-type.route   { color: var(--m-green-500);   background: rgba(0,255,65,.10); }
.c-type.tool    { color: var(--m-warning);      background: rgba(214,255,95,.10); }
.c-type.trace   { color: var(--m-info);         background: rgba(95,207,255,.10); }
.c-type.review  { color: var(--m-purple);       background: rgba(167,139,250,.10); }
.c-type.msg     { color: var(--m-text-muted);   background: rgba(216,255,227,.04); }
.c-type.err     { color: var(--m-danger);       background: rgba(255,95,109,.10); }
.c-type.dispatch{ color: var(--m-pink);         background: rgba(255,95,162,.10); }
@keyframes c-in { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
.c-row.new { animation: c-in .18s ease-out both; }

/* ── SIDE PANEL ──────────────────────────────────────── */
.sp { position: absolute; top: 0; right: 0; bottom: 0; width: 356px; background: var(--m-panel); border-left: 1px solid var(--m-border-sub); z-index: 20; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .26s cubic-bezier(.22,1,.36,1); box-shadow: -8px 0 40px rgba(0,0,0,.7); }
.sp.open { transform: translateX(0); }
.sp-accent-bar { height: 2px; flex-shrink: 0; }
.sp-hdr { display: grid; grid-template-columns: 52px 1fr auto; gap: 12px; align-items: center; padding: 13px 14px 11px; border-bottom: 1px solid var(--m-border-sub); flex-shrink: 0; }
.sp-av { width: 52px; height: 52px; border-radius: 10px; border: 1px solid; display: flex; align-items: center; justify-content: center; position: relative; }
.sp-av-glyph { font: 700 17px var(--m-font-mono); }
.sp-av-pulse { position: absolute; bottom: -3px; right: -3px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--m-panel); }
.sp-title { }
.sp-name { font: 700 15px var(--m-font-mono); color: var(--m-text-strong); line-height: 1.1; margin-bottom: 3px; letter-spacing: -.2px; }
.sp-badge { display: inline-flex; align-items: center; gap: 4px; font: 600 8.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .14em; padding: 2px 7px; border-radius: 999px; margin-bottom: 3px; }
.sp-model { font: 400 9px var(--m-font-mono); color: var(--m-text-ghost); }
.sp-close { width: 26px; height: 26px; border: 1px solid var(--m-border-sub); border-radius: 5px; display: grid; place-items: center; color: var(--m-text-faint); cursor: pointer; background: transparent; font-size: 11px; align-self: flex-start; transition: all .1s; }
.sp-close:hover { color: var(--m-text-muted); border-color: var(--m-border); }
.sp-body { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: rgba(0,255,65,.1) transparent; }
.sp-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
.sp-stat-cell { background: var(--m-card); border: 1px solid var(--m-border-faint); border-radius: 7px; padding: 8px 10px; }
.sp-stat-v { font: 700 13px var(--m-font-mono); color: var(--m-text-strong); letter-spacing: -.2px; }
.sp-stat-l { font: 500 8px var(--m-font-mono); text-transform: uppercase; letter-spacing: .18em; color: var(--m-text-ghost); margin-top: 1px; }
.sp-sec { }
.sp-sec-lbl { font: 600 8.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-text-ghost); margin-bottom: 6px; }
.sp-task { background: var(--m-card); border: 1px solid var(--m-border-faint); border-radius: 7px; padding: 9px 11px; font: 400 10.5px/1.5 var(--m-font-mono); color: var(--m-text-muted); }
.sp-task::before { content: "▸ "; color: var(--m-green-500); }
.sp-tl { display: flex; flex-direction: column; }
.sp-tl-row { display: grid; grid-template-columns: 10px 1fr auto; gap: 8px; align-items: baseline; padding: 3px 0; }
.sp-tl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.sp-tl-msg { font: 400 10.5px/1.4 var(--m-font-mono); color: var(--m-text-muted); }
.sp-tl-ts  { font: 400 9px var(--m-font-mono); color: var(--m-text-ghost); white-space: nowrap; }
.sp-quick { display: flex; gap: 4px; }
.sp-qbtn { flex: 1; padding: 6px 0; background: var(--m-card); border: 1px solid var(--m-border-faint); border-radius: 6px; font: 500 9px var(--m-font-mono); text-transform: uppercase; letter-spacing: .1em; color: var(--m-text-faint); cursor: pointer; transition: all .12s; text-align: center; }
.sp-qbtn:hover { color: var(--m-text-muted); border-color: var(--m-border-sub); background: var(--m-card-2); }
.sp-footer { flex-shrink: 0; padding: 9px 14px; border-top: 1px solid var(--m-border-sub); background: rgba(4,16,8,.6); }
.sp-textarea { width: 100%; height: 64px; background: var(--m-card); border: 1px solid var(--m-border-sub); border-radius: 7px; padding: 8px 10px; font: 400 10.5px var(--m-font-mono); color: var(--m-text); resize: none; outline: none; line-height: 1.5; transition: border-color .12s; }
.sp-textarea::placeholder { color: var(--m-text-ghost); }
.sp-textarea:focus { border-color: var(--m-border); }
.sp-send-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.sp-hint { font: 400 9px var(--m-font-mono); color: var(--m-text-ghost); text-transform: uppercase; letter-spacing: .1em; }
.sp-send { display: flex; align-items: center; gap: 5px; padding: 6px 13px; background: var(--m-green-500); color: #010402; font: 700 9.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .12em; border: none; border-radius: 5px; cursor: pointer; transition: box-shadow .15s; }
.sp-send:hover { box-shadow: var(--m-glow-sm); }

/* ── TWEAKS ──────────────────────────────────────────── */
.tw-fab { position: fixed; bottom: 14px; right: 14px; width: 32px; height: 32px; border-radius: 7px; background: var(--m-card-2); border: 1px solid var(--m-border-sub); color: var(--m-text-faint); cursor: pointer; display: grid; place-items: center; z-index: 100; transition: all .15s; }
.tw-fab:hover { color: var(--m-green-500); border-color: var(--m-border); box-shadow: var(--m-glow-sm); }
.tw-panel { position: fixed; bottom: 52px; right: 14px; width: 210px; background: var(--m-panel); border: 1px solid var(--m-border); border-radius: 10px; padding: 11px 13px; z-index: 100; box-shadow: 0 8px 36px rgba(0,0,0,.75); }
.tw-title { font: 600 9.5px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-text-ghost); margin-bottom: 10px; }
.tw-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.tw-lbl { font: 500 10px var(--m-font-mono); color: var(--m-text-muted); }
.tw-seg { display: flex; border: 1px solid var(--m-border-sub); border-radius: 5px; overflow: hidden; }
.tw-seg button { flex: 1; padding: 3px 5px; background: transparent; border: none; border-right: 1px solid var(--m-border-faint); font: 500 8.5px var(--m-font-mono); color: var(--m-text-ghost); cursor: pointer; text-transform: uppercase; letter-spacing: .06em; transition: all .1s; }

/* ── MATRIX RAIN ─────────────────────────────────────── */
function MatrixRain() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize();
    const cols = Math.floor(canvas.width / 13);
    const drops = Array.from({length:cols}, () => Math.random() * (canvas.height/13));
    const chars = '01アイウエカキサシスタチナニハヒ<>{}[]|∑∆∇∂';
    let frame = 0, raf;
    const draw = () => {
      frame++;
      if (frame % 3 === 0) {
        ctx.fillStyle = 'rgba(2,8,4,0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = '11px JetBrains Mono, monospace';
        drops.forEach((y, i) => {
          const ch = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillStyle = `rgba(0,255,65,${0.04 + Math.random()*0.07})`;
          ctx.fillText(ch, i*13, y*13);
          drops[i] = y*13 > canvas.height && Math.random()>.975 ? 0 : y + 0.35;
        });
      }
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    window.addEventListener('resize', resize);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} className="c-rain" style={{width:'100%',height:'100%'}}/>;
}

      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">

        <line x1="6.5" y1="1" x2="6.5" y2="3.2" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
        <line x1="6.5" y1="9.8" x2="6.5" y2="12" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
        <line x1="1" y1="6.5" x2="3.2" y2="6.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
        <line x1="9.8" y1="6.5" x2="12" y2="6.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
      </svg>
    </button>
    {open && <div className="tw-panel">
      <div className="tw-title">Tweaks</div>
      {seg('speed',['1×','2×','5×'])}
      {seg('bubbles',['On','Off'])}
      {seg('accent',['Green','Amber','Ice'])}
    </div>}
  </>;
}

/* ── PAGE ────────────────────────────────────────────── */
function Page() {
  const [sel, setSel] = useState(null);
  const [logs, setLogs] = useState(()=>LOG_SEED.map((e,i)=>({...e,id:i,ts:`14:2${i}:${String(i*3%60).padStart(2,'0')}`,isNew:false})));
  const [tw, setTw] = useState({speed:'1×',bubbles:'On',accent:'Green'});
  const poolRef = useRef(0);

  const speedMs = tw.speed==='5×'?600:tw.speed==='2×'?1400:3200;

  useEffect(()=>{
    const id = setInterval(()=>{
      const e = LOG_POOL[poolRef.current % LOG_POOL.length];
      poolRef.current++;
      const ne = {...e, id:mkId(), ts:ts(), isNew:true};
      setLogs(p=>[...p.slice(-90), ne]);
      setTimeout(()=>setLogs(p=>p.map(l=>l.isNew?{...l,isNew:false}:l)),250);
    }, speedMs);
    return ()=>clearInterval(id);
  },[speedMs]);

  useEffect(()=>{
    const c = tw.accent==='Amber'?'#d6ff5f':tw.accent==='Ice'?'#5fcfff':'#00ff41';
    document.documentElement.style.setProperty('--m-green-500',c);
    document.documentElement.style.setProperty('--m-text-glow',`0 0 8px ${c}99`);
    document.documentElement.style.setProperty('--m-glow-sm',`0 0 8px ${c}59`);
  },[tw.accent]);

  const dispatch = (agent, text) => {
    const e = {agent:agent.name.split(' ')[0].toUpperCase(), aC:agent.color, type:'dispatch',
      msg:`[YOU → ${agent.name}] "${text}"`, dur:'', id:mkId(), ts:ts(), isNew:true};
    setLogs(p=>[...p.slice(-90), e]);
    setTimeout(()=>setLogs(p=>p.map(l=>l.isNew?{...l,isNew:false}:l)),250);
  };

  return (
    <div className="shell">
      <Sidebar/>
      <div className="main">
        <CanvasZone agentCount={AGENTS.length}/>
        <div className="bottom-zone">
          <Roster agents={AGENTS} sel={sel} onSel={setSel} showBubble={tw.bubbles==='On'}/>
          <Console logs={logs}/>
          <SidePanel agent={sel} onClose={()=>setSel(null)} onDispatch={dispatch}/>
        </div>
      </div>
      <Tweaks tw={tw} set={setTw}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
