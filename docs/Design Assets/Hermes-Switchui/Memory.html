<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Memory · Hermes</title>
<link rel="stylesheet" href="matrix-system.css"/>
<link rel="stylesheet" href="primary-nav-v2.css"/>
<style>
  html, body { height: 100%; }
  body { background: var(--m-bg); overflow: hidden; }
  .nav { background: transparent !important; border: none !important; padding: 0 !important; }

  .shell { display: grid; grid-template-columns: 232px 1fr; height: 100vh; overflow: hidden; }
  .main  { display: grid; grid-template-rows: auto auto 1fr auto; min-width: 0; overflow: hidden; background: var(--m-bg); }

  /* Top bar */
  .topbar { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 0 22px; height: 56px; border-bottom: 1px solid var(--m-border); background: var(--m-sidebar); }
  .topbar h1 { margin: 0; font: 600 13px var(--m-font-mono); text-transform: uppercase; letter-spacing: .26em; color: var(--m-text-strong); display: flex; align-items: center; gap: 12px; }
  .topbar h1 .crumb { color: var(--m-text-faint); font-weight: 500; }
  .topbar h1 .sep { color: var(--m-text-ghost); }
  .topbar h1 .cur { color: var(--m-green-500); text-shadow: 0 0 6px rgba(0,255,65,.4); }
  .topbar .stats { display: flex; align-items: center; gap: 22px; font: 500 11px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .18em; }
  .topbar .stats b { color: var(--m-text-strong); font-weight: 600; }
  .topbar .stats .ok { color: var(--m-green-500); }
  .topbar .stats .sep { width: 1px; height: 16px; background: var(--m-border-subtle); }

  /* Tab bar */
  .tabbar { display: flex; align-items: stretch; padding: 0 22px; height: 44px; border-bottom: 1px solid var(--m-border); background: var(--m-panel); gap: 4px; }
  .tabbar .tab { display: inline-flex; align-items: center; gap: 8px; padding: 0 14px; font: 500 12px var(--m-font-mono); color: var(--m-text-muted); text-transform: uppercase; letter-spacing: .18em; cursor: pointer; border-bottom: 2px solid transparent; }
  .tabbar .tab:hover { color: var(--m-text); }
  .tabbar .tab.on { color: var(--m-green-500); border-bottom-color: var(--m-green-500); text-shadow: 0 0 6px rgba(0,255,65,.35); }
  .tabbar .tab svg { width: 14px; height: 14px; }
  svg { width: 14px; height: 14px; flex: none; }
  .graph-wrap > svg { width: 100%; height: 100%; }
  .graph-controls svg, .chat-input svg { width: 14px; height: 14px; }
  .big-glyph svg { width: 22px; height: 22px; }
  .tabbar .spacer { flex: 1; }
  .tabbar .right { display: flex; align-items: center; gap: 10px; font: 500 11px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .16em; }
  .tabbar .right .chat-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border: 1px solid var(--m-border); border-radius: var(--m-radius-md); color: var(--m-text-muted); cursor: pointer; }
  .tabbar .right .chat-toggle:hover { color: var(--m-green-500); border-color: var(--m-green-500); }
  .tabbar .right .chat-toggle.on { color: var(--m-green-500); border-color: var(--m-green-500); background: rgba(0,255,65,.06); }

  .body-wrap { position: relative; overflow: hidden; display: grid; grid-template-columns: 1fr auto; }
  .body { overflow: auto; min-width: 0; }
  .body.with-chat { border-right: 1px solid var(--m-border); }

  /* ===== Memory tab ===== */
  .mem-grid { display: grid; grid-template-columns: 280px 1fr; height: 100%; }
  .mem-list { border-right: 1px solid var(--m-border); background: var(--m-panel); overflow: auto; padding: 12px 8px; }
  .mem-list .grp { padding: 8px 8px 6px; font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-text-faint); display: flex; align-items: center; gap: 6px; }
  .mem-list .grp .ct { margin-left: auto; color: var(--m-text-ghost); }
  .agent-row { display: grid; grid-template-columns: 32px 1fr auto; gap: 10px; align-items: center; padding: 8px 10px; border-radius: var(--m-radius-md); cursor: pointer; border: 1px solid transparent; }
  .agent-row:hover { background: var(--m-fill-subtle); }
  .agent-row.on { background: var(--m-fill); border-color: var(--m-border); box-shadow: inset 2px 0 0 var(--m-green-500); }
  .agent-glyph { width: 32px; height: 32px; display: grid; place-items: center; border-radius: var(--m-radius-md); background: var(--m-bg-deep); border: 1px solid var(--m-border); font: 700 13px var(--m-font-mono); color: var(--m-green-500); text-shadow: 0 0 6px rgba(0,255,65,.4); }
  .agent-row .name { font: 500 13px var(--m-font-mono); color: var(--m-text); display: block; }
  .agent-row .role { font: 500 10.5px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .14em; margin-top: 2px; }
  .agent-row.on .name { color: var(--m-green-500); }
  .agent-row .tier { font: 500 9.5px var(--m-font-mono); padding: 2px 6px; border: 1px solid var(--m-border-subtle); border-radius: 9999px; color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .14em; }
  .agent-row.on .tier { border-color: var(--m-green-500); color: var(--m-green-500); }

  .mem-pane { display: grid; grid-template-rows: auto auto 1fr; min-width: 0; overflow: hidden; }
  .mem-head { padding: 16px 22px; border-bottom: 1px solid var(--m-border); background: var(--m-sidebar); display: grid; grid-template-columns: 48px 1fr auto; gap: 14px; align-items: center; }
  .mem-head .big-glyph { width: 48px; height: 48px; display: grid; place-items: center; border-radius: var(--m-radius-md); background: var(--m-bg-deep); border: 1px solid var(--m-green-500); color: var(--m-green-500); font: 700 18px var(--m-font-mono); text-shadow: 0 0 8px rgba(0,255,65,.5); box-shadow: var(--m-glow-sm); }
  .mem-head .title { font: 600 18px var(--m-font-mono); color: var(--m-text-strong); letter-spacing: .04em; }
  .mem-head .sub { font: 500 11px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .2em; margin-top: 4px; }
  .mem-head .actions { display: flex; gap: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--m-border); border-radius: var(--m-radius-md); background: var(--m-bg-deep); color: var(--m-text); font: 500 11px var(--m-font-mono); text-transform: uppercase; letter-spacing: .14em; cursor: pointer; }
  .btn:hover { color: var(--m-green-500); border-color: var(--m-green-500); }
  .btn.primary { background: rgba(0,255,65,.08); color: var(--m-green-500); border-color: var(--m-green-500); }
  .btn svg { width: 12px; height: 12px; }

  .file-tabs { display: flex; border-bottom: 1px solid var(--m-border); padding: 0 22px; background: var(--m-panel); }
  .file-tabs .ft { padding: 10px 14px; font: 500 12px var(--m-font-mono); color: var(--m-text-muted); cursor: pointer; border-bottom: 2px solid transparent; display: inline-flex; align-items: center; gap: 8px; }
  .file-tabs .ft:hover { color: var(--m-text); }
  .file-tabs .ft.on { color: var(--m-green-500); border-bottom-color: var(--m-green-500); }
  .file-tabs .ft .sz { font-size: 9.5px; color: var(--m-text-faint); padding: 1px 5px; border: 1px solid var(--m-border-subtle); border-radius: 9999px; }
  .file-tabs .ft.on .sz { color: var(--m-green-500); border-color: var(--m-green-500); }

  .editor { padding: 22px 28px; overflow: auto; font: 500 14px/1.7 var(--m-font-mono); color: #c5ffd0; }
  .editor h1 { font: 700 22px var(--m-font-mono); color: var(--m-text-strong); margin: 0 0 14px; letter-spacing: .04em; }
  .editor h2 { font: 600 14px var(--m-font-mono); color: var(--m-green-500); margin: 22px 0 10px; text-transform: uppercase; letter-spacing: .22em; text-shadow: 0 0 6px rgba(0,255,65,.3); }
  .editor h3 { font: 600 13px var(--m-font-mono); color: var(--m-text-strong); margin: 16px 0 8px; }
  .editor p  { margin: 0 0 12px; color: var(--m-text); }
  .editor ul { margin: 0 0 12px; padding-left: 20px; }
  .editor li { margin-bottom: 4px; color: var(--m-text); }
  .editor blockquote { border-left: 2px solid var(--m-green-500); padding: 4px 0 4px 14px; margin: 12px 0; color: var(--m-text-muted); font-style: italic; background: rgba(0,255,65,.03); }
  .editor code { background: var(--m-bg-deep); padding: 1px 6px; border-radius: 3px; color: var(--m-green-500); font-size: 13px; }
  .editor .meta-card { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 14px 0 22px; padding: 14px; background: var(--m-panel); border: 1px solid var(--m-border); border-radius: var(--m-radius-md); }
  .editor .meta-card .k { font: 500 9.5px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .2em; }
  .editor .meta-card .v { font: 600 13px var(--m-font-mono); color: var(--m-green-500); margin-top: 4px; }
  .editor.editing { background: rgba(0,255,65,.02); }
  .editor textarea { width: 100%; min-height: 80vh; background: var(--m-bg-deep); border: 1px solid var(--m-green-500); border-radius: var(--m-radius-md); padding: 16px; font: 500 13px/1.7 var(--m-font-mono); color: #c5ffd0; outline: none; resize: vertical; box-shadow: 0 0 12px rgba(0,255,65,.15); }

  /* ===== Wiki tab ===== */
  .wiki-grid { display: grid; grid-template-columns: 300px 1fr; height: 100%; }
  .wiki-tree { border-right: 1px solid var(--m-border); background: var(--m-panel); overflow: auto; padding: 12px 8px; }
  .wiki-tree .search { display: flex; align-items: center; gap: 8px; padding: 6px 10px; margin: 0 6px 12px; border: 1px solid var(--m-border); border-radius: var(--m-radius-md); background: var(--m-bg-deep); }
  .wiki-tree .search input { flex: 1; background: transparent; border: none; outline: none; color: var(--m-text); font: 500 12px var(--m-font-mono); }
  .wiki-tree .search svg { width: 12px; height: 12px; color: var(--m-text-faint); }
  .node { display: grid; grid-template-columns: 14px 14px 1fr auto; gap: 6px; align-items: center; padding: 4px 8px; border-radius: 4px; cursor: pointer; font: 500 13px var(--m-font-mono); color: var(--m-text-muted); }
  .node:hover { background: var(--m-fill-subtle); color: var(--m-text); }
  .node.on { background: var(--m-fill); color: var(--m-green-500); }
  .node .chev { color: var(--m-text-faint); width: 10px; height: 10px; transition: transform .15s ease; }
  .node.open .chev { transform: rotate(90deg); }
  .node .ic { color: var(--m-text-faint); width: 12px; height: 12px; }
  .node.on .ic { color: var(--m-green-500); }
  .node .ct { font-size: 10px; color: var(--m-text-ghost); }
  .node.indent { padding-left: 28px; }

  .wiki-reader { overflow: auto; padding: 32px 48px; max-width: 880px; margin: 0 auto; }
  .wiki-reader .crumbs { font: 500 10.5px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .2em; margin-bottom: 12px; }
  .wiki-reader .crumbs span { color: var(--m-text-ghost); }
  .wiki-reader h1 { font: 700 28px var(--m-font-mono); color: var(--m-text-strong); margin: 0 0 8px; letter-spacing: .02em; }
  .wiki-reader .meta { font: 500 10.5px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .2em; margin-bottom: 24px; display: flex; gap: 18px; }
  .wiki-reader .meta b { color: var(--m-green-500); font-weight: 600; }
  .wiki-reader h2 { font: 600 14px var(--m-font-mono); color: var(--m-green-500); margin: 24px 0 10px; text-transform: uppercase; letter-spacing: .22em; text-shadow: 0 0 6px rgba(0,255,65,.3); }
  .wiki-reader p, .wiki-reader li { font: 400 14.5px/1.75 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; color: var(--m-text); }
  .wiki-reader code { background: var(--m-bg-deep); padding: 1px 6px; border-radius: 3px; color: var(--m-green-500); font: 500 13px var(--m-font-mono); }
  .wiki-reader .backlinks { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--m-border); }
  .wiki-reader .backlinks h3 { font: 600 11px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .22em; margin: 0 0 10px; }
  .wiki-reader .backlinks a { display: inline-block; padding: 4px 10px; margin: 0 6px 6px 0; border: 1px solid var(--m-border); border-radius: 9999px; color: var(--m-text-muted); font: 500 12px var(--m-font-mono); text-decoration: none; }
  .wiki-reader .backlinks a:hover { color: var(--m-green-500); border-color: var(--m-green-500); }

  /* ===== Graph tab ===== */
  .graph-wrap { position: relative; width: 100%; height: 100%; background: radial-gradient(ellipse at center, rgba(0,255,65,.05), transparent 60%); overflow: hidden; }
  .graph-wrap > svg { width: 100%; height: 100%; display: block; }
  .graph-legend { position: absolute; top: 16px; left: 16px; background: rgba(0,12,4,.85); border: 1px solid var(--m-border); border-radius: var(--m-radius-md); padding: 12px 14px; font: 500 11px var(--m-font-mono); color: var(--m-text-muted); text-transform: uppercase; letter-spacing: .18em; backdrop-filter: blur(4px); }
  .graph-legend .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .graph-legend .row:last-child { margin-bottom: 0; }
  .graph-legend .d { width: 10px; height: 10px; border-radius: 50%; }
  .graph-controls { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; }
  .graph-controls .btn { background: rgba(0,12,4,.85); backdrop-filter: blur(4px); }

  /* ===== Chat drawer ===== */
  .chat-drawer { width: 380px; border-left: 1px solid var(--m-border); background: var(--m-panel); display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; transition: width var(--m-dur-base) var(--m-ease-out); }
  .chat-drawer.closed { width: 0; border-left: none; }
  .chat-head { padding: 14px 18px; border-bottom: 1px solid var(--m-border); display: flex; align-items: center; gap: 10px; }
  .chat-head .t { font: 600 11px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-green-500); }
  .chat-head .sub { font: 500 10px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .16em; margin-left: auto; }
  .chat-body { overflow: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .msg { font: 500 13px/1.6 var(--m-font-mono); color: var(--m-text); }
  .msg .who { font: 500 9.5px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .22em; margin-bottom: 4px; }
  .msg.bot .who { color: var(--m-green-500); }
  .msg .bubble { padding: 10px 12px; border-radius: var(--m-radius-md); border: 1px solid var(--m-border); background: var(--m-bg-deep); }
  .msg.bot .bubble { border-color: rgba(0,255,65,.3); background: rgba(0,255,65,.04); color: #c5ffd0; }
  .msg .cites { font: 500 10px var(--m-font-mono); color: var(--m-text-faint); margin-top: 6px; text-transform: uppercase; letter-spacing: .16em; }
  .msg .cites a { color: var(--m-green-500); text-decoration: none; margin-right: 8px; }
  .chat-foot { padding: 12px 14px; border-top: 1px solid var(--m-border); }
  .chat-input { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 8px 10px; border: 1px solid var(--m-border); border-radius: var(--m-radius-md); background: var(--m-bg-deep); }
  .chat-input input { background: transparent; border: none; outline: none; color: var(--m-text); font: 500 13px var(--m-font-mono); }
  .chat-input button { background: var(--m-green-500); color: #000; border: none; padding: 4px 12px; border-radius: var(--m-radius-md); font: 600 11px var(--m-font-mono); text-transform: uppercase; letter-spacing: .14em; cursor: pointer; }

  /* ===== Settings ===== */
  .settings { padding: 32px 48px; max-width: 760px; margin: 0 auto; overflow: auto; }
  .settings h2 { font: 600 12px var(--m-font-mono); color: var(--m-green-500); text-transform: uppercase; letter-spacing: .24em; margin: 0 0 14px; }
  .settings .card { background: var(--m-panel); border: 1px solid var(--m-border); border-radius: var(--m-radius-md); padding: 20px; margin-bottom: 18px; }
  .settings .row { display: grid; grid-template-columns: 240px 1fr; align-items: center; gap: 18px; padding: 12px 0; border-bottom: 1px solid var(--m-border-subtle); }
  .settings .row:last-child { border-bottom: none; }
  .settings .row .lbl { font: 500 12px var(--m-font-mono); color: var(--m-text); }
  .settings .row .lbl .desc { font-size: 10.5px; color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .16em; margin-top: 4px; }
  .settings input[type="text"], .settings select { width: 100%; padding: 8px 12px; border: 1px solid var(--m-border); border-radius: var(--m-radius-md); background: var(--m-bg-deep); color: var(--m-text); font: 500 12.5px var(--m-font-mono); outline: none; }
  .settings input[type="text"]:focus, .settings select:focus { border-color: var(--m-green-500); box-shadow: 0 0 0 1px rgba(0,255,65,.3); }
  .settings input[type="range"] { width: 100%; }
  .toggle { width: 38px; height: 20px; border-radius: 9999px; background: var(--m-bg-deep); border: 1px solid var(--m-border); position: relative; cursor: pointer; }
  .toggle::after { content: ""; position: absolute; top: 1px; left: 1px; width: 16px; height: 16px; border-radius: 50%; background: var(--m-text-faint); transition: all var(--m-dur-fast) var(--m-ease-out); }
  .toggle.on { background: rgba(0,255,65,.18); border-color: var(--m-green-500); }
  .toggle.on::after { left: 19px; background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); }

  /* Footer */
  .pg-foot { border-top: 1px solid var(--m-border); background: var(--m-sidebar); display: flex; align-items: center; gap: 22px; padding: 0 24px; height: 30px; font: 500 10px var(--m-font-mono); color: var(--m-text-faint); letter-spacing: .14em; text-transform: uppercase; }
  .pg-foot b { color: var(--m-text-strong); font-weight: 600; }
  .pg-foot .ok { color: var(--m-green-500); }
  .pg-foot .sep { width: 1px; height: 14px; background: var(--m-border-subtle); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
/* Hermes Primary Nav v2 — inlined for file:// CORS safety */
const PNV2_ICONS = {
  dashboard:'M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z',
  chat:'M2 3h12a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H5l-3 2V4a1 1 0 0 1 1-1z',
  files:'M3 2h6l4 4v9H3V2zM9 2v4h4',
  terminal:'M2 3h12v10H2V3zM5 7l3-2-3-2M8 11h4',
  jobs:'M8 2a6 6 0 1 0 0 12A6 6 0 0 0 8 2zM8 5v3.5l2.5 1.5',
  tasks:'M3 4h10M3 8h7M3 12h5',
  conductor:'M8 2L2 14h12L8 2zM8 8v3',
  operations:'M3 5a2 2 0 1 0 4 0 2 2 0 0 0-4 0zM9 5a2 2 0 1 0 4 0 2 2 0 0 0-4 0zM1 14c0-2.5 2-4 5-4s5 1.5 5 4M11 11c1.5 0 3 .8 3 3',
  swarm:'M5 5a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM11 5a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM8 13a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM5 5l3 4M11 5L8 9',
  memory:'M5 3h6a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM6 7h4M6 9h2',
  skills:'M8 2l1.8 3.8 4.2.6-3 3 .7 4.1L8 11.5l-3.7 2L5 9.4l-3-3 4.2-.6z',
  mcp:'M4 8h8M8 4v8M3 3l10 10M13 3L3 13',
  profiles:'M8 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM2 14c0-3 2.7-5 6-5s6 2 6 5',
  search:'M6.5 1.5a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM10.5 10.5l4 4',
  newchat:'M3 8h10M8 3v10',
  cog:'M8 5a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4',
  collapse:'M10 3L5 8l5 5',
  expand:'M6 3l5 5-5 5',
};
function PNVIcon({d, size=15}) { return <svg width={size} height={size} viewBox="0 0 16 16" fill="none" aria-hidden style={{flexShrink:0}}><path d={d} stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>; }
function PNVItem({label, iconKey, active, badge}) {

/* ============ MARKDOWN MINI-RENDERER (just enough) ============ */
function renderMd(md) {
  const lines = md.split('\n');
  const out = [];
  let inList = false;
  for (const ln of lines) {
    if (/^# /.test(ln))      { if(inList){out.push('</ul>');inList=false;} out.push(`<h1>${ln.slice(2)}</h1>`); }
    else if (/^## /.test(ln)){ if(inList){out.push('</ul>');inList=false;} out.push(`<h2>${ln.slice(3)}</h2>`); }
    else if (/^### /.test(ln)){if(inList){out.push('</ul>');inList=false;} out.push(`<h3>${ln.slice(4)}</h3>`); }
    else if (/^- /.test(ln)) { if(!inList){out.push('<ul>');inList=true;} out.push(`<li>${inline(ln.slice(2))}</li>`); }
    else if (/^> /.test(ln)) { if(inList){out.push('</ul>');inList=false;} out.push(`<blockquote>${inline(ln.slice(2))}</blockquote>`); }
    else if (ln.trim()==='') { if(inList){out.push('</ul>');inList=false;} }
    else                     { if(inList){out.push('</ul>');inList=false;} out.push(`<p>${inline(ln)}</p>`); }
  }
  if (inList) out.push('</ul>');
  return out.join('');
}
function inline(s) {
  return s.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>').replace(/\*([^*]+)\*/g, '<i>$1</i>');
}

      </aside>
      <section className="wiki-reader">
        <div className="crumbs">{page.crumbs}</div>
        <h1>{page.title}</h1>
        <div className="meta">{page.meta.map(m => <span key={m.k}>{m.k} <b>{m.v}</b></span>)}</div>
        <div dangerouslySetInnerHTML={{ __html: page.body }}/>
        <div className="backlinks">
          <h3>Backlinks · {page.backlinks.length}</h3>
          {page.backlinks.map(b => <a key={b} href="#">{b}</a>)}
        </div>
      </section>
    </div>
  );
}

function GraphTab() {
  const [zoom, setZoom] = React.useState(1);
  const [hover, setHover] = React.useState(null);
  return (
    <div className="graph-wrap">
      <svg viewBox="0 0 1000 560" preserveAspectRatio="xMidYMid meet">
        <defs>
          <radialGradient id="halo" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="rgba(0,255,65,.5)"/>
            <stop offset="100%" stopColor="rgba(0,255,65,0)"/>
          </radialGradient>
        </defs>
        <g transform={`scale(${zoom}) translate(${(1-zoom)*500/zoom}, ${(1-zoom)*280/zoom})`}>
          {GRAPH_EDGES.map(([a,b], i) => {
            const na = GRAPH_NODES.find(n=>n.id===a), nb = GRAPH_NODES.find(n=>n.id===b);
            if (!na || !nb) return null;
            const on = hover && (hover===a || hover===b);
            return <line key={i} x1={na.x} y1={na.y} x2={nb.x} y2={nb.y}
              stroke={on?'#00ff41':'rgba(0,255,65,.2)'} strokeWidth={on?1.4:0.8}/>;
          })}
          {GRAPH_NODES.map(n => {
            const on = hover === n.id;
            const color = GRAPH_COLORS[n.kind] || '#00ff41';
            return (
              <g key={n.id} onMouseEnter={() => setHover(n.id)} onMouseLeave={() => setHover(null)} style={{ cursor:'pointer' }}>
                {on && <circle cx={n.x} cy={n.y} r={n.r+14} fill="url(#halo)"/>}
                <circle cx={n.x} cy={n.y} r={n.r} fill="rgba(0,8,2,.95)" stroke={color} strokeWidth={on?2:1.2}
                  style={{ filter: on ? `drop-shadow(0 0 8px ${color})` : `drop-shadow(0 0 3px ${color}88)` }}/>
                <text x={n.x} y={n.y + n.r + 14} textAnchor="middle"
                  fill={on ? '#fff' : 'rgba(220,255,230,.75)'}
                  style={{ font:'500 11px JetBrains Mono, monospace', letterSpacing:'.04em', pointerEvents:'none' }}>
                  {n.lbl}
                </text>
              </g>
            );
          })}
        </g>
      </svg>
      <div className="graph-legend">
        {Object.entries(GRAPH_COLORS).map(([k,v]) => (
          <div className="row" key={k}><span className="d" style={{ background:v, boxShadow:`0 0 6px ${v}` }}/><span>{k}</span></div>
        ))}
      </div>
      <div className="graph-controls">
        <button className="btn" onClick={() => setZoom(z => Math.min(2, z+0.2))}>{Icon.plus} Zoom in</button>
        <button className="btn" onClick={() => setZoom(z => Math.max(0.5, z-0.2))}>{Icon.zoom} Zoom out</button>
        <button className="btn" onClick={() => setZoom(1)}>{Icon.refresh} Reset</button>
      </div>
    </div>
  );
}

function ChatDrawer({ open, messages, setMessages, draft, setDraft }) {
  const send = () => {
    const q = draft.trim(); if (!q) return;
    const userMsg = { who:'You', text:q, bot:false };
    const fake = pickAnswer(q);
    setMessages(m => [...m, userMsg, fake]);
    setDraft('');
  };
  return (
    <div className={`chat-drawer ${open?'':'closed'}`}>
      <div className="chat-head">
        <span style={{ color:'var(--m-green-500)' }}>{Icon.chat}</span>
        <div className="t">Chat with Wiki</div>
        <div className="sub">grounded · 11 pages</div>
      </div>
      <div className="chat-body">
        {messages.map((m, i) => (
          <div key={i} className={`msg ${m.bot?'bot':''}`}>
            <div className="who">{m.who}</div>
            <div className="bubble">{m.text}</div>
            {m.cites && <div className="cites">cites: {m.cites.map(c => <a key={c} href="#">{c}</a>)}</div>}
          </div>
        ))}
      </div>
      <div className="chat-foot">
        <div className="chat-input">
          <input placeholder="ask the wiki — try: how does memory work?" value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => e.key==='Enter' && send()}/>
          <button onClick={send}>{Icon.send}</button>
        </div>
      </div>
    </div>
  );
}

function pickAnswer(q) {
  const l = q.toLowerCase();
  if (/memory|soul|user\.md/.test(l)) return { who:'Wiki', bot:true, text:'Each Tier-1/Tier-2 agent has 3 layered files: soul.md (identity, rarely edited), memory.md (long-term episodic), user.md (the agent\'s model of you). Tier-3 personas are stateless.', cites:['Layered memory model','Three-tier agents'] };
  if (/karpathy|wiki|llm-os/.test(l)) return { who:'Wiki', bot:true, text:'Karpathy\'s model: the wiki is plain markdown — human-curated, greppable, versionable. No vector store. The model reads pages like a runbook.', cites:['LLM Wiki — Karpathy concept'] };
  if (/cron|schedule/.test(l)) return { who:'Wiki', bot:true, text:'Active routines live in ops/cron-jobs. babysit-prs runs every 15m, log-monitor every 5m, weekly-cleanup Sun 04:00 UTC.', cites:['Active cron routines','Cron expressions'] };
  if (/matrix|rain|canvas/.test(l)) return { who:'Wiki', bot:true, text:'Matrix Rain canvas must size from the parent .term-pane\'s clientHeight/Width — observed via ResizeObserver. Otherwise it collapses to content height.', cites:['Matrix Rain canvas','React patterns'] };
  return { who:'Wiki', bot:true, text:'Hmm — that\'s not in the corpus yet. I\'d suggest creating a page or pointing me at a source URL.', cites:[] };
}

function SettingsTab({ settings, setSettings }) {
  const upd = (k,v) => setSettings({...settings, [k]: v});
  return (
    <div className="settings">
      <div className="card">
        <h2>LLM</h2>
        <div className="row">
          <div className="lbl">Provider<div className="desc">embedding + completion backend</div></div>
          <select value={settings.provider} onChange={e => upd('provider', e.target.value)}>
            <option>Anthropic · Claude</option><option>OpenAI · GPT-4o</option><option>Ollama · Local</option>
          </select>
        </div>
        <div className="row">
          <div className="lbl">Model<div className="desc">for chat-with-wiki + memory rollups</div></div>
          <select value={settings.model} onChange={e => upd('model', e.target.value)}>
            <option>claude-opus-4-7</option><option>claude-sonnet-4-6</option><option>claude-haiku-4-5</option>
          </select>
        </div>
        <div className="row">
          <div className="lbl">Temperature<div className="desc">{settings.temp.toFixed(2)} · lower = more grounded</div></div>
          <input type="range" min="0" max="1" step="0.05" value={settings.temp} onChange={e => upd('temp', parseFloat(e.target.value))}/>
        </div>
      </div>
      <div className="card">
        <h2>Retrieval</h2>
        <div className="row">
          <div className="lbl">Citations always on<div className="desc">refuse to answer without a source</div></div>
          <div className={`toggle ${settings.cites?'on':''}`} onClick={() => upd('cites', !settings.cites)}/>
        </div>
        <div className="row">
          <div className="lbl">Auto-summarize new pages<div className="desc">generate TL;DR on every wiki write</div></div>
          <div className={`toggle ${settings.summarize?'on':''}`} onClick={() => upd('summarize', !settings.summarize)}/>
        </div>
        <div className="row">
          <div className="lbl">Top-K context pages<div className="desc">{settings.topK} pages per query</div></div>
          <input type="range" min="3" max="20" step="1" value={settings.topK} onChange={e => upd('topK', parseInt(e.target.value))}/>
        </div>
      </div>
      <div className="card">
        <h2>Storage</h2>
        <div className="row">
          <div className="lbl">Wiki root<div className="desc">where markdown files live</div></div>
          <input type="text" value={settings.root} onChange={e => upd('root', e.target.value)}/>
        </div>
        <div className="row">
          <div className="lbl">Sync to git<div className="desc">every memory write is a commit</div></div>
          <div className={`toggle ${settings.git?'on':''}`} onClick={() => upd('git', !settings.git)}/>
        </div>
      </div>
    </div>
  );
}

/* ============ APP ============ */
function App() {
  const [tab, setTab] = React.useState('memory');
  const [activeAgent, setActiveAgent] = React.useState('hermes');
  const [fileKey, setFileKey] = React.useState('soul');
  const [editing, setEditing] = React.useState(false);
  const [drafts, setDrafts] = React.useState({});

  const [tree, setTree] = React.useState(WIKI_TREE);
  const [pageId, setPageId] = React.useState('prod/wiki');
  const [wikiQuery, setWikiQuery] = React.useState('');

  const [chatOpen, setChatOpen] = React.useState(false);
  const [chatMessages, setChatMessages] = React.useState([
    { who:'Wiki', bot:true, text:'Wiki ready — 11 pages indexed across Engineering · Product · Design · Ops. Ask anything.', cites:[] },
  ]);
  const [chatDraft, setChatDraft] = React.useState('');

  const [settings, setSettings] = React.useState({
    provider:'Anthropic · Claude', model:'claude-opus-4-7', temp:0.2,
    cites:true, summarize:true, topK:8, root:'~/.hermes/wiki', git:true,
  });

  return (
    <div className="shell">
      <nav className="nav"><PrimaryNavV2 active="memory" sessionsBadge={9}/></nav>
      <main className="main">
        <header className="topbar">
          <h1>
            <span className="crumb">Hermes</span><span className="sep">/</span>
            <span className="crumb">Knowledge</span><span className="sep">/</span>
            <span className="cur">Memory & Wiki</span>
          </h1>
          <div className="stats">
            <span><b>4</b> agents · <b>12</b> memory files</span>
            <span className="sep"/>
            <span><b>11</b> wiki pages · <b>43</b> backlinks</span>
            <span className="sep"/>
            <span>last sync <b className="ok">14s</b></span>
          </div>
        </header>
        <div className="tabbar">
          <span className={`tab ${tab==='memory'?'on':''}`} onClick={() => setTab('memory')}>{Icon.mem} Agent Memory</span>
          <span className={`tab ${tab==='wiki'?'on':''}`}   onClick={() => setTab('wiki')}>{Icon.book} Wiki</span>
          <span className={`tab ${tab==='graph'?'on':''}`}  onClick={() => setTab('graph')}>{Icon.graph} Graph</span>
          <span className={`tab ${tab==='settings'?'on':''}`} onClick={() => setTab('settings')}>{Icon.cog} Settings</span>
          <div className="spacer"/>
          <div className="right">
            <span className={`chat-toggle ${chatOpen?'on':''}`} onClick={() => setChatOpen(o => !o)}>{Icon.chat} Chat with Wiki</span>
          </div>
        </div>
        <div className="body-wrap">
          <div className={`body ${chatOpen?'with-chat':''}`}>
            {tab==='memory'   && <MemoryTab agents={AGENTS} activeId={activeAgent} setActiveId={setActiveAgent} fileKey={fileKey} setFileKey={setFileKey} editing={editing} setEditing={setEditing} drafts={drafts} setDrafts={setDrafts}/>}
            {tab==='wiki'     && <WikiTab tree={tree} setTree={setTree} pageId={pageId} setPageId={setPageId} query={wikiQuery} setQuery={setWikiQuery}/>}
            {tab==='graph'    && <GraphTab/>}
            {tab==='settings' && <SettingsTab settings={settings} setSettings={setSettings}/>}
          </div>
          <ChatDrawer open={chatOpen} messages={chatMessages} setMessages={setChatMessages} draft={chatDraft} setDraft={setChatDraft}/>
        </div>
        <footer className="pg-foot">
          <span><b>4</b> agents</span>
          <span className="sep"/>
          <span><b>11</b> wiki pages</span>
          <span className="sep"/>
          <span>provider <b className="ok">{settings.provider.split(' · ')[0]}</b></span>
          <span className="sep"/>
          <span>model <b>{settings.model}</b></span>
          <span className="sep"/>
          <span>top-k <b>{settings.topK}</b></span>
          <span style={{ marginLeft:'auto' }}>sync <b className="ok">on</b></span>
          <span className="sep"/>
          <span>git <b className={settings.git?'ok':''}>{settings.git?'on':'off'}</b></span>
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
