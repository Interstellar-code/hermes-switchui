<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Settings · Hermes</title>
<link rel="stylesheet" href="matrix-system.css"/>
<link rel="stylesheet" href="primary-nav-v2.css"/>
<style>
  html, body { height: 100%; }
  body { background: var(--m-bg); overflow: hidden; }
  .nav { background: transparent !important; border: none !important; padding: 0 !important; }

  .shell { display: grid; grid-template-columns: 232px 1fr; height: 100vh; overflow: hidden; }
  .main  { display: grid; grid-template-rows: auto auto 1fr auto; min-width: 0; overflow: hidden; background: var(--m-bg); }

  /* Top bar */
  .topbar { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 0 22px; height: 56px; border-bottom: 1px solid var(--m-border); background: var(--m-sidebar); }
  .topbar h1 { margin: 0; font: 600 13px var(--m-font-mono); text-transform: uppercase; letter-spacing: .26em; color: var(--m-text-strong); display: flex; align-items: center; gap: 12px; }
  .topbar h1 .crumb { color: var(--m-text-faint); font-weight: 500; }
  .topbar h1 .sep { color: var(--m-text-ghost); }
  .topbar h1 .cur { color: var(--m-green-500); text-shadow: 0 0 6px rgba(0,255,65,.4); }
  .topbar .stats { display: flex; align-items: center; gap: 14px; font: 500 11px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .18em; }
  .topbar .stats b { color: var(--m-text-strong); font-weight: 600; }
  .topbar .stats .ok { color: var(--m-green-500); }
  .topbar .stats .warn { color: #ffb347; }
  .topbar .stats .sep { width: 1px; height: 16px; background: var(--m-border-subtle); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--m-border); border-radius: var(--m-radius-md); background: var(--m-bg-deep); color: var(--m-text); font: 500 11px var(--m-font-mono); text-transform: uppercase; letter-spacing: .14em; cursor: pointer; }
  .btn:hover { color: var(--m-green-500); border-color: var(--m-green-500); }
  .btn.primary { background: rgba(0,255,65,.08); color: var(--m-green-500); border-color: var(--m-green-500); }
  .btn.danger { color: #ff5fa2; border-color: rgba(255,95,162,.4); }
  .btn.danger:hover { background: rgba(255,95,162,.06); border-color: #ff5fa2; }
  .btn svg { width: 12px; height: 12px; }
  svg { width: 14px; height: 14px; flex: none; }
  .big-glyph svg { width: 22px; height: 22px; }

  /* Tab bar */
  .tabbar { display: flex; align-items: stretch; padding: 0 22px; height: 44px; border-bottom: 1px solid var(--m-border); background: var(--m-panel); gap: 4px; }
  .tabbar .tab { display: inline-flex; align-items: center; gap: 8px; padding: 0 14px; font: 500 12px var(--m-font-mono); color: var(--m-text-muted); text-transform: uppercase; letter-spacing: .18em; cursor: pointer; border-bottom: 2px solid transparent; }
  .tabbar .tab:hover { color: var(--m-text); }
  .tabbar .tab.on { color: var(--m-green-500); border-bottom-color: var(--m-green-500); text-shadow: 0 0 6px rgba(0,255,65,.35); }
  .tabbar .tab .ct { font-size: 9.5px; color: var(--m-text-faint); padding: 1px 6px; border: 1px solid var(--m-border-subtle); border-radius: 9999px; }
  .tabbar .tab.on .ct { color: var(--m-green-500); border-color: var(--m-green-500); }
  .tabbar .spacer { flex: 1; }
  .tabbar .right { display: flex; align-items: center; gap: 8px; }

  /* Two-col body */
  .body { display: grid; grid-template-columns: 260px 1fr; overflow: hidden; }

  /* Sidebar tree */
  .side { border-right: 1px solid var(--m-border); background: var(--m-panel); overflow: auto; padding: 12px 6px; }
  .side .search { display: flex; align-items: center; gap: 8px; padding: 6px 10px; margin: 4px 6px 10px; border: 1px solid var(--m-border); border-radius: var(--m-radius-md); background: var(--m-bg-deep); }
  .side .search input { flex: 1; background: transparent; border: none; outline: none; color: var(--m-text); font: 500 12px var(--m-font-mono); }
  .side .grp { padding: 10px 12px 4px; font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .22em; color: var(--m-text-faint); display: flex; align-items: center; gap: 6px; }
  .side .grp .ct { margin-left: auto; color: var(--m-text-ghost); }
  .side .item { display: grid; grid-template-columns: 18px 1fr auto; gap: 8px; align-items: center; padding: 7px 10px; margin: 0 4px; border-radius: var(--m-radius-md); cursor: pointer; font: 500 12.5px var(--m-font-mono); color: var(--m-text-muted); border: 1px solid transparent; }
  .side .item:hover { background: var(--m-fill-subtle); color: var(--m-text); }
  .side .item.on { background: var(--m-fill); color: var(--m-green-500); border-color: var(--m-border); box-shadow: inset 2px 0 0 var(--m-green-500); }
  .side .item .badge { font: 500 9.5px var(--m-font-mono); padding: 1px 6px; border: 1px solid var(--m-border-subtle); border-radius: 9999px; color: var(--m-text-faint); }
  .side .item.on .badge { color: var(--m-green-500); border-color: var(--m-green-500); }
  .side .item.dirty .badge { color: #ffb347; border-color: rgba(255,179,71,.5); }

  /* Content */
  .content { overflow: auto; padding: 22px 26px 80px; }
  .section-head { display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--m-border-subtle); }
  .section-head h2 { margin: 0; font: 600 18px var(--m-font-mono); color: var(--m-text-strong); letter-spacing: .04em; }
  .section-head .desc { margin-top: 4px; font: 500 12px var(--m-font-mono); color: var(--m-text-faint); }
  .section-head .meta { font: 500 10.5px var(--m-font-mono); color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .18em; }
  .section-head .meta b { color: var(--m-green-500); }

  .card { border: 1px solid var(--m-border); border-radius: var(--m-radius-md); background: var(--m-panel); margin-bottom: 16px; overflow: hidden; }
  .card > h3 { margin: 0; padding: 14px 18px 10px; font: 600 13px var(--m-font-mono); color: var(--m-text-strong); text-transform: uppercase; letter-spacing: .2em; border-bottom: 1px solid var(--m-border-subtle); display: flex; align-items: center; gap: 8px; }
  .card > h3 .ic { color: var(--m-green-500); }
  .card > h3 .sub { margin-left: auto; font: 500 10.5px var(--m-font-mono); color: var(--m-text-faint); letter-spacing: .16em; }

  .row { display: grid; grid-template-columns: 1fr 320px; gap: 22px; align-items: start; padding: 14px 18px; border-bottom: 1px solid var(--m-border-subtle); }
  .row:last-child { border-bottom: none; }
  .row .lbl { font: 500 13px var(--m-font-mono); color: var(--m-text); }
  .row .lbl .desc { display: block; margin-top: 4px; font: 500 11.5px var(--m-font-mono); color: var(--m-text-faint); line-height: 1.5; }
  .row .lbl .pill { display: inline-block; margin-left: 6px; font: 500 9px var(--m-font-mono); padding: 1px 5px; border: 1px solid var(--m-border-subtle); border-radius: 9999px; color: var(--m-text-faint); text-transform: uppercase; letter-spacing: .12em; vertical-align: 2px; }
  .row .lbl .pill.dirty { color: #ffb347; border-color: rgba(255,179,71,.5); }
  .row .lbl .pill.req { color: #ff5fa2; border-color: rgba(255,95,162,.5); }
  .row .ctl { display: flex; flex-direction: column; gap: 6px; align-items: stretch; }
  .row .ctl.row-end { align-items: flex-end; }

  /* Inputs */
  input[type=text], input[type=number], input[type=password], textarea, select {
    width: 100%; padding: 8px 10px; background: var(--m-bg-deep); border: 1px solid var(--m-border); color: var(--m-text);
    font: 500 12.5px var(--m-font-mono); border-radius: var(--m-radius-md); outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--m-green-500); box-shadow: 0 0 0 3px rgba(0,255,65,.08); }
  textarea { resize: vertical; min-height: 90px; line-height: 1.55; }
  .hint { font: 500 10.5px var(--m-font-mono); color: var(--m-text-faint); }
  .err { font: 500 10.5px var(--m-font-mono); color: #ff5fa2; }

  /* Toggle */
  .toggle { width: 38px; height: 22px; border-radius: 9999px; background: var(--m-bg-deep); border: 1px solid var(--m-border); position: relative; cursor: pointer; transition: all .15s; }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--m-text-faint); transition: all .15s; }
  .toggle.on { background: rgba(0,255,65,.15); border-color: var(--m-green-500); }
  .toggle.on::after { left: 18px; background: var(--m-green-500); box-shadow: 0 0 8px var(--m-green-500); }

  /* Slider */
  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--m-border); border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--m-green-500); cursor: pointer; box-shadow: 0 0 6px var(--m-green-500); }

  /* Chip group */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 4px 10px; border: 1px solid var(--m-border); border-radius: 9999px; font: 500 11px var(--m-font-mono); color: var(--m-text-muted); cursor: pointer; background: var(--m-bg-deep); }
  .chip:hover { color: var(--m-text); }
  .chip.on { color: var(--m-green-500); border-color: var(--m-green-500); background: rgba(0,255,65,.08); }

  /* Mini table */
  .mini-table { width: 100%; border-collapse: collapse; font: 500 12px var(--m-font-mono); }
  .mini-table th { text-align: left; padding: 8px 10px; font: 600 10px var(--m-font-mono); text-transform: uppercase; letter-spacing: .18em; color: var(--m-text-faint); border-bottom: 1px solid var(--m-border-subtle); }
  .mini-table td { padding: 8px 10px; border-bottom: 1px solid var(--m-border-subtle); color: var(--m-text); }
  .mini-table tr:last-child td { border-bottom: none; }
  .mini-table .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: 1px; }
  .mini-table .dot.ok { background: var(--m-green-500); box-shadow: 0 0 6px var(--m-green-500); }
  .mini-table .dot.warn { background: #ffb347; box-shadow: 0 0 6px #ffb347; }
  .mini-table .dot.off { background: var(--m-text-faint); }
  .mini-table .act { color: var(--m-text-faint); cursor: pointer; }
  .mini-table .act:hover { color: var(--m-green-500); }

  .kv { font: 500 11.5px var(--m-font-mono); color: var(--m-text-muted); }
  .kv code { color: var(--m-green-500); }
  .path { font: 500 11.5px var(--m-font-mono); color: #5fcfff; }

  .danger-zone { border-color: rgba(255,95,162,.35); }
  .danger-zone > h3 .ic { color: #ff5fa2; }

  /* Footer */
  .pg-foot { border-top: 1px solid var(--m-border); background: var(--m-sidebar); display: flex; align-items: center; gap: 22px; padding: 0 24px; height: 30px; font: 500 10px var(--m-font-mono); color: var(--m-text-faint); letter-spacing: .14em; text-transform: uppercase; }
  .pg-foot b { color: var(--m-text-strong); font-weight: 600; }
  .pg-foot .ok { color: var(--m-green-500); }
  .pg-foot .warn { color: #ffb347; }
  .pg-foot .sep { width: 1px; height: 14px; background: var(--m-border-subtle); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
/* Hermes Primary Nav v2 — inlined for file:// CORS safety */
const PNV2_ICONS = {
  dashboard:'M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z',
  chat:'M2 3h12a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H5l-3 2V4a1 1 0 0 1 1-1z',
  files:'M3 2h6l4 4v9H3V2zM9 2v4h4',
  terminal:'M2 3h12v10H2V3zM5 7l3-2-3-2M8 11h4',
  jobs:'M8 2a6 6 0 1 0 0 12A6 6 0 0 0 8 2zM8 5v3.5l2.5 1.5',
  tasks:'M3 4h10M3 8h7M3 12h5',
  conductor:'M8 2L2 14h12L8 2zM8 8v3',
  operations:'M3 5a2 2 0 1 0 4 0 2 2 0 0 0-4 0zM9 5a2 2 0 1 0 4 0 2 2 0 0 0-4 0zM1 14c0-2.5 2-4 5-4s5 1.5 5 4M11 11c1.5 0 3 .8 3 3',
  swarm:'M5 5a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM11 5a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM8 13a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM5 5l3 4M11 5L8 9',
  memory:'M5 3h6a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM6 7h4M6 9h2',
  skills:'M8 2l1.8 3.8 4.2.6-3 3 .7 4.1L8 11.5l-3.7 2L5 9.4l-3-3 4.2-.6z',
  mcp:'M4 8h8M8 4v8M3 3l10 10M13 3L3 13',
  profiles:'M8 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM2 14c0-3 2.7-5 6-5s6 2 6 5',
  search:'M6.5 1.5a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM10.5 10.5l4 4',
  newchat:'M3 8h10M8 3v10',
  cog:'M8 5a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4',
  collapse:'M10 3L5 8l5 5',
  expand:'M6 3l5 5-5 5',
};
function PNVIcon({d, size=15}) { return <svg width={size} height={size} viewBox="0 0 16 16" fill="none" aria-hidden style={{flexShrink:0}}><path d={d} stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>; }
function PNVItem({label, iconKey, active, badge}) {
  return (<a href="#" className="m-mono pnv-item" data-active={active?'true':undefined}>
    <PNVIcon d={PNV2_ICONS[iconKey]} /><span style={{flex:1}}>{label}</span>
    {badge!=null && <span className="pnv-badge">{badge}</span>}
  </a>);
}
function PNVGroup({label}) { return <div className="m-label pnv-group">{label}</div>; }
function PrimaryNavV2({active='memory', sessionsBadge=null}) {
  const items = [['dashboard','Dashboard'],['chat','Chat'],['files','Files'],['terminal','Terminal'],['jobs','Jobs'],['tasks','Tasks'],['conductor','Conductor'],['operations','Operations'],['swarm','Swarm']];
  const know  = [['memory','Memory'],['skills','Skills'],['mcp','MCP'],['profiles','Profiles']];
  return (
    <div className="pnv-root">
      <div className="pnv-brand">
        <div className="pnv-brand-l">
          <div className="pnv-glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M4 4 L20 4 L20 20 L4 20 Z M4 12 L20 12 M12 4 L12 20"/></svg></div>
          <div><div className="m-mono pnv-name">HERMES</div><div className="m-label pnv-ver">v2.3.0</div></div>
        </div>
        <button className="pnv-icon-btn" title="Collapse"><PNVIcon d={PNV2_ICONS.collapse}/></button>
      </div>
      <div className="pnv-body">
        <button className="m-mono pnv-search"><PNVIcon d={PNV2_ICONS.search}/><span style={{flex:1, textAlign:'left'}}>Search</span><span className="m-mono pnv-kbd">⌘K</span></button>
        <a href="#" className="m-mono pnv-newsess"><PNVIcon d={PNV2_ICONS.newchat}/>+ New Session</a>
        <PNVGroup label="Main"/>
        {items.map(([k,l]) => <PNVItem key={k} label={l} iconKey={k} active={active===k} badge={k===active && sessionsBadge!=null ? sessionsBadge : null}/>)}
        <PNVGroup label="Knowledge"/>
        {know.map(([k,l]) => <PNVItem key={k} label={l} iconKey={k} active={active===k} badge={k===active && sessionsBadge!=null ? sessionsBadge : null}/>)}
      </div>
      <div className="pnv-foot">
        <button className="pnv-foot-btn" data-active="true"><PNVIcon d={PNV2_ICONS.cog} size={14}/><span>Settings</span></button>
        <button className="pnv-foot-btn pnv-foot-theme" title="Toggle theme"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" strokeWidth="1.4"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg></button>
      </div>
    </div>
  );
}
window.PrimaryNavV2 = PrimaryNavV2;
</script>

  trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>,

    <Field label="Share anonymous metrics" desc="Counts of feature use. No content."><Toggle on={s.shareAnon} set={v => set('shareAnon', v)}/></Field>
    <Field label="Share crash reports" desc="Send stack traces on hard failures."><Toggle on={s.shareCrash} set={v => set('shareCrash', v)}/></Field>
    <Field label="Share usage analytics" desc="Aggregate latency + token counts."><Toggle on={s.shareUsage} set={v => set('shareUsage', v)}/></Field>
    <Field label="Scrub secrets from logs" desc="Replace API keys + tokens with •••." pill={{t:'recommended'}}><Toggle on={s.scrubSecrets} set={v => set('scrubSecrets', v)}/></Field>
    <Field label="Redact filesystem paths" desc="Replace $HOME with ~ in logs and shares."><Toggle on={s.redactPaths} set={v => set('redactPaths', v)}/></Field>
    <Field label="History retention" desc={`${s.retention} days — older sessions auto-purge.`}>
      <input type="range" min="7" max="365" step="1" value={s.retention} onChange={e => set('retention', parseInt(e.target.value))}/>
    </Field>
  </div>;
}

function S_telemetry({ s, set }) {
  return <div className="card">
    <h3><span className="ic">{Ic.tel}</span> Telemetry<span className="sub">4 settings</span></h3>
    <Field label="Metrics enabled" desc="Emit OpenTelemetry counters."><Toggle on={s.metricsEnabled} set={v => set('metricsEnabled', v)}/></Field>
    <Field label="Traces enabled" desc="Per-call spans (slower)."><Toggle on={s.tracesEnabled} set={v => set('tracesEnabled', v)}/></Field>
    <Field label="OTLP endpoint" desc="HTTP receiver URL.">
      <input value={s.metricsHost} onChange={e => set('metricsHost', e.target.value)}/>
    </Field>
    <Field label="Sample rate" desc={`${(s.sampleRate*100).toFixed(0)}% of spans exported.`}>
      <input type="range" min="0" max="1" step="0.05" value={s.sampleRate} onChange={e => set('sampleRate', parseFloat(e.target.value))}/>
    </Field>
  </div>;
}

function S_keys({ s, set }) {
  const [reveal, setReveal] = React.useState(false);
  return <div className="card">
    <h3><span className="ic">{Ic.key}</span> API keys<span className="sub">3 secrets · stored in OS keychain</span></h3>
    <Field label="Anthropic API key" desc="Used for all Claude calls." pill={{t:'set', k:''}}>
      <div style={{ display:'flex', gap:6 }}>
        <input type={reveal?'text':'password'} value={s.anthropicKey} onChange={e => set('anthropicKey', e.target.value)}/>
        <button className="btn" onClick={() => setReveal(r => !r)}>{Ic.eye}</button>
      </div>
    </Field>
    <Field label="OpenAI API key" desc="Optional — enables GPT-4o fallback." pill={{t:'missing', k:'dirty'}}>
      <input type="password" placeholder="sk-…" value={s.openaiKey} onChange={e => set('openaiKey', e.target.value)}/>
    </Field>
    <Field label="Rotate keys" desc="Generate fresh local tokens for hooks + daemon.">
      <button className="btn">{Ic.undo} Rotate now</button>
    </Field>
  </div>;
}

function S_network({ s, set }) {
  return <div className="card">
    <h3><span className="ic">{Ic.net}</span> Network<span className="sub">5 settings</span></h3>
    <Field label="HTTP proxy" desc="e.g. http://proxy.local:8080. Leave empty for direct.">
      <input value={s.proxy} placeholder="(none)" onChange={e => set('proxy', e.target.value)}/>
    </Field>
    <Field label="Allow insecure TLS" desc="Skip cert verification. Dev only." pill={{t:'danger', k:'req'}}><Toggle on={s.allowInsecure} set={v => set('allowInsecure', v)}/></Field>
    <Field label="Request timeout" desc={`${s.reqTimeout}s — outbound HTTP calls.`}>
      <input type="range" min="5" max="120" step="5" value={s.reqTimeout} onChange={e => set('reqTimeout', parseInt(e.target.value))}/>
    </Field>
    <Field label="Local daemon" desc="Used by skills and the CLI." pill={{t:'live'}}>
      <div className="kv"><code>http://127.0.0.1:64302</code> · uptime <code>4h 12m</code></div>
    </Field>
    <Field label="Offline mode" desc="Block all outbound calls. Useful on flights.">
      <Toggle on={false} set={()=>{}}/>
    </Field>
  </div>;
}

function S_perf({ s, set }) {
  return <div className="card">
    <h3><span className="ic">{Ic.tel}</span> Performance<span className="sub">4 settings</span></h3>
    <Field label="Hardware acceleration" desc="GPU-backed rendering. Restart required." pill={{t:'restart req'}}><Toggle on={s.hwAccel} set={v => set('hwAccel', v)}/></Field>
    <Field label="Prefetch on hover" desc="Warm caches before you click."><Toggle on={s.prefetch} set={v => set('prefetch', v)}/></Field>
    <Field label="Background behavior" desc="When the window isn't focused.">
      <div className="chips">
        {['keep-running','pause','suspend-after-5m'].map(o => (
          <span key={o} className={`chip ${s.backgroundIdle===o?'on':''}`} onClick={() => set('backgroundIdle', o)}>{o}</span>
        ))}
      </div>
    </Field>
    <Field label="Process snapshot" desc="" pill={{t:'live'}}>
      <div className="kv">cpu <code>23%</code> · mem <code>4.1 / 16 GB</code> · workers <code>8/8</code></div>
    </Field>
  </div>;
}

function S_shortcuts({ s, set }) {
  const rows = [
    ['shortcut_search','Global search'],
    ['shortcut_newsess','New session'],
    ['shortcut_term','Toggle terminal'],
    ['shortcut_palette','Command palette'],
    ['shortcut_save','Save changes'],
    ['shortcut_chat','Chat with wiki'],
  ];
  return <div className="card">
    <h3><span className="ic">{Ic.gen}</span> Keyboard shortcuts<span className="sub">6 bindings</span></h3>
    {rows.map(([k, l]) => (
      <Field key={k} label={l} desc="Click to rebind. Modifier + key.">
        <input value={s[k]} onChange={e => set(k, e.target.value)}/>
      </Field>
    ))}
  </div>;
}

function S_advanced({ s, set }) {
  return <div className="card">
    <h3><span className="ic">{Ic.adv}</span> Advanced<span className="sub">5 settings</span></h3>
    <Field label="Experimental features" desc="Opt-in to unstable workflows." pill={{t:'beta'}}><Toggle on={s.experimental} set={v => set('experimental', v)}/></Field>
    <Field label="Developer tools" desc="Show DevTools menu + JS console."><Toggle on={s.devTools} set={v => set('devTools', v)}/></Field>
    <Field label="CLI binary path" desc="Symlink target for the `hermes` command.">
      <input value={s.cliBin} onChange={e => set('cliBin', e.target.value)}/>
    </Field>
    <Field label="Log level" desc="">
      <select value={s.logLevel} onChange={e => set('logLevel', e.target.value)}>
        <option>error</option><option>warn</option><option>info</option><option>debug</option><option>trace</option>
      </select>
    </Field>
    <Field label="Open config folder" desc="Reveal ~/.hermes in Finder.">
      <button className="btn">{Ic.dl} Open folder</button>

function S_danger() {
  return <div className="card danger-zone">
    <h3><span className="ic">{Ic.trash}</span> Danger zone<span className="sub">irreversible</span></h3>
    <Field label="Clear all caches" desc="Drop transient files. Sessions and memory are preserved.">
      <button className="btn">{Ic.trash} Clear caches</button>
    </Field>
    <Field label="Reset settings to defaults" desc="All values revert. Keys and memory stay.">
      <button className="btn danger">{Ic.undo} Reset settings</button>
    </Field>
    <Field label="Delete workspace" desc="Removes all sessions, memory, wiki, and keys. This cannot be undone." pill={{t:'irreversible', k:'req'}}>
      <button className="btn danger">{Ic.trash} Delete workspace…</button>
    </Field>

/* ============ APP ============ */
const SECTION_RENDERERS = {
  general: S_general, account: S_account, appearance: S_appearance, notifications: S_notifications,
  models: S_models, agents: S_agents, memory: S_memory, skills: S_skills, mcp: S_mcp,
  storage: S_storage, privacy: S_privacy, telemetry: S_telemetry, keys: S_keys,
  network: S_network, perf: S_perf, shortcuts: S_shortcuts, advanced: S_advanced, danger: S_danger,
};
const SECTION_TITLES = {
  general:'General · Workspace', account:'General · Account', appearance:'General · Appearance', notifications:'General · Notifications',
  models:'Intelligence · Models', agents:'Intelligence · Agent runtime', memory:'Intelligence · Memory & wiki',
  skills:'Intelligence · Skills', mcp:'Intelligence · MCP servers',
  storage:'Data · Storage', privacy:'Data · Privacy', telemetry:'Data · Telemetry', keys:'Data · API keys',
  network:'System · Network', perf:'System · Performance', shortcuts:'System · Keyboard', advanced:'System · Advanced', danger:'System · Danger zone',
};
const SECTION_DESCS = {
  general:'Workspace identity, language, timezone, defaults.',
  account:'Sign-in, identity, security.',
  appearance:'Theme, density, fonts, motion.',
  notifications:'Where Hermes pings you and how loud.',
  models:'Provider, defaults, sampling, registry.',
  agents:'Concurrency, retries, verification gates.',
  memory:'Layered memory, retrieval, wiki sync.',
  skills:'Skill discovery, hooks, permissions.',
  mcp:'Model Context Protocol — external tool servers.',
  storage:'Where files live. How much disk is used.',
  privacy:'What leaves the machine and what doesn’t.',
  telemetry:'Metrics and traces for power users.',
  keys:'Provider tokens stored in your OS keychain.',
  network:'Proxy, TLS, daemon, offline.',
  perf:'Acceleration, prefetch, idle behavior.',
  shortcuts:'Rebind global hotkeys.',
  advanced:'Developer toggles. Be careful.',
  danger:'Irreversible operations.',
};

function App() {
  const [tab, setTab]     = React.useState('all');
  const [active, setActive] = React.useState('general');
  const [query, setQuery] = React.useState('');
  const [state, setState] = React.useState(INITIAL);
  const [saved, setSaved] = React.useState(INITIAL);
  const [dirty, setDirty] = React.useState(new Set());

  const set = (k, v) => {
    setState(s => ({ ...s, [k]: v }));
    setDirty(d => { const n = new Set(d); if (saved[k] !== v) n.add(k); else n.delete(k); return n; });
  };
  const save = () => { setSaved(state); setDirty(new Set()); };
  const reset = () => { setState(saved); setDirty(new Set()); };
  const exportCfg = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hermes-settings.json'; a.click();
  };

  const visibleGroups = React.useMemo(() => {
    const tabRow = TABS.find(t => t.id === tab);
    const allowed = new Set(tabRow.groups);
    return GROUPS.filter(g => allowed.has(g.id)).map(g => ({
      ...g,
      items: g.items.filter(it => !query || it.label.toLowerCase().includes(query.toLowerCase())),
    })).filter(g => g.items.length > 0);
  }, [tab, query]);

  React.useEffect(() => {
    const exists = visibleGroups.some(g => g.items.some(i => i.id === active));
    if (!exists && visibleGroups[0]) setActive(visibleGroups[0].items[0].id);
  }, [visibleGroups]);

  const Renderer = SECTION_RENDERERS[active] || (() => <div className="card"><h3>—</h3></div>);

  return (
    <div className="shell">
      <nav className="nav"><PrimaryNavV2 active="settings"/></nav>
      <main className="main">
        <header className="topbar">
          <h1>
            <span className="crumb">Hermes</span><span className="sep">/</span>
            <span className="cur">Settings</span>
          </h1>
          <div className="stats">
            <span><b>{Object.keys(state).length}</b> settings</span>
            <span className="sep"/>
            <span>dirty <b className={dirty.size>0?'warn':'ok'}>{dirty.size}</b></span>
            <span className="sep"/>
            <span>last save <b className="ok">just now</b></span>
            <span className="sep"/>
            <button className="btn" onClick={exportCfg}>{Ic.dl} Export</button>
            <button className="btn">{Ic.imp} Import</button>
            <button className="btn" onClick={reset} disabled={dirty.size===0}>{Ic.undo} Reset</button>
            <button className="btn primary" onClick={save} disabled={dirty.size===0}>{Ic.save} Save changes</button>
          </div>
        </header>
        <div className="tabbar">
          {TABS.map(t => (
            <span key={t.id} className={`tab ${tab===t.id?'on':''}`} onClick={() => setTab(t.id)}>
              {t.label} <span className="ct">{
                GROUPS.filter(g => t.groups.includes(g.id)).reduce((sum,g)=>sum+g.items.length,0)
              }</span>
            </span>
          ))}
          <div className="spacer"/>
          <div className="right">
            <span style={{ font:'500 10.5px var(--m-font-mono)', color:'var(--m-text-faint)', textTransform:'uppercase', letterSpacing:'.16em' }}>
              v2.3.0 · build 4127
            </span>
          </div>
        </div>
        <div className="body">
          <aside className="side">
            <div className="search">{Ic.search}<input placeholder="filter settings…" value={query} onChange={e => setQuery(e.target.value)}/></div>
            {visibleGroups.map(g => (
              <div key={g.id}>
                <div className="grp">{g.label}<span className="ct">{g.items.length}</span></div>
                {g.items.map(it => {
                  const isDirty = [...dirty].some(k => ITEM_KEYS[it.id]?.includes(k));
                  return (
                    <div key={it.id} className={`item ${active===it.id?'on':''} ${isDirty?'dirty':''}`} onClick={() => setActive(it.id)}>
                      <span style={{ display:'grid', placeItems:'center', color: active===it.id?'var(--m-green-500)':'var(--m-text-faint)' }}>{it.ic}</span>
                      <span>{it.label}</span>
                      <span className="badge">{isDirty ? '•' : it.ct}</span>
                    </div>
                  );
                })}
              </div>
            ))}
          </aside>
          <section className="content">
            <div className="section-head">
              <div>
                <h2>{SECTION_TITLES[active] || active}</h2>
                <div className="desc">{SECTION_DESCS[active] || ''}</div>
              </div>
              <div className="meta">
                {dirty.size>0 && <>unsaved <b>{dirty.size}</b> · </>}auto-saves to <b>~/.hermes/config.yaml</b>
              </div>
            </div>
            <Renderer s={state} set={set} mark={() => {}}/>
          </section>
        </div>
        <footer className="pg-foot">
          <span><b>{Object.keys(state).length}</b> settings</span>
          <span className="sep"/>
          <span>dirty <b className={dirty.size>0?'warn':'ok'}>{dirty.size}</b></span>
          <span className="sep"/>
          <span>provider <b className="ok">{state.provider.split(' · ')[0]}</b></span>
          <span className="sep"/>
          <span>model <b>{state.defaultModel}</b></span>
          <span className="sep"/>
          <span>theme <b>{state.theme}</b></span>
          <span style={{ marginLeft:'auto' }}>sync <b className="ok">on</b></span>
          <span className="sep"/>
          <span>build <b>4127</b></span>
        </footer>
      </main>
    </div>
  );
}

/* map of section -> setting keys (used to highlight sidebar dirty state) */
const ITEM_KEYS = {
  general: ['workspace_name','workspace_id','language','timezone','dateFormat','startupView'],
  account: ['display_name','email','org','twofa'],
  appearance: ['theme','density','monoFont','rainBg','rainDim'],
  notifications: ['notif_desktop','notif_sound','notif_email','notif_slack','notif_done','notif_error'],
  models: ['provider','defaultModel','fallbackModel','temp','topP','maxTokens','reasoning','cache','streamOutputs'],
  agents: ['workerPool','queueDepth','taskTimeout','retryCount','parallelTasks','autoCommit','verifyBeforeShip','agentLogs'],
  memory: ['memEnabled','memScope','autoSummarize','topK','citesAlwaysOn','memRoot','gitSync'],
  skills: ['skillsAutoload','skillsRoot','hooksEnabled','permPrompt','permTimeout'],
  mcp: ['mcpEnabled','mcpAutoStart','mcpTimeout','mcpLogVerbose'],
  storage: ['cachePath','cacheMaxGB','exportPath','attachmentCap'],
  privacy: ['shareAnon','shareCrash','shareUsage','scrubSecrets','redactPaths','retention'],
  telemetry: ['metricsEnabled','tracesEnabled','metricsHost','sampleRate'],
  keys: ['anthropicKey','openaiKey'],
  network: ['proxy','allowInsecure','reqTimeout'],
  perf: ['hwAccel','prefetch','backgroundIdle'],
  shortcuts: ['shortcut_search','shortcut_newsess','shortcut_term','shortcut_palette','shortcut_save','shortcut_chat'],
  advanced: ['experimental','devTools','cliBin','logLevel'],
  danger: [],
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
